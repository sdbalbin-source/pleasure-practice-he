<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050408">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pleasure HE">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>Pleasure Practice Studio - Hebrew</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050408;
      --panel: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.18);
      --text: #f3f2f7;
      --muted: #c6c2d5;
      --accent: #b786ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: "Assistant", "Segoe UI", sans-serif; }
    .studio-bg-layer {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; background: #000;
    }
    .studio-spiral {
      position: absolute; top: 50%; left: 50%;
      width: 120vmax; height: 120vmax;
      transform-origin: center;
      transform: translate(-50%, -50%);
      animation: spin 13s linear infinite;
      opacity: 0.72;
    }
    .vignette {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(circle, transparent 25%, #000 90%);
      pointer-events: none;
    }
    .glass-panel {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 15px 50px 0 rgba(0, 0, 0, 0.8);
      transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.2s ease;
    }
    button.glass-panel:hover {
      border-color: rgba(168, 85, 247, 0.5);
      box-shadow: 0 15px 50px 0 rgba(0,0,0,0.8), 0 0 30px rgba(147, 51, 234, 0.15);
    }
    .module-home-card {
      text-align: center;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.11) 0%, rgba(255, 255, 255, 0.07) 100%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }
    .module-home-card h3 { letter-spacing: 0.01em; }
    .module-home-card p { max-width: 28ch; margin: 0.35rem auto 0; }
    .trance-main-shell {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      padding: 1.25rem 1rem 0.85rem;
      background:
        radial-gradient(circle at 50% 50%, rgba(71, 24, 139, 0.2) 0 14%, transparent 15% 28%, rgba(71, 24, 139, 0.16) 29% 44%, transparent 45% 58%, rgba(71, 24, 139, 0.12) 59% 74%, transparent 75% 100%),
        linear-gradient(180deg, rgba(7, 5, 14, 0.92) 0%, rgba(3, 2, 8, 0.95) 100%);
      border-radius: 1rem;
    }
    .trance-main-card {
      width: 100%;
      border-radius: 1.1rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      text-align: center;
      padding: 1.2rem 1rem;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }
    .trance-main-card:hover {
      border-color: rgba(196, 136, 255, 0.46);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.07));
      transform: translateY(-1px);
    }
    .trance-main-card-title {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 2rem;
      color: #f5ecff;
      font-weight: 700;
      line-height: 1.05;
    }
    .trance-main-card-note {
      margin: 0.35rem auto 0;
      max-width: 30ch;
      color: rgba(227, 216, 245, 0.85);
      font-size: 0.95rem;
      line-height: 1.5;
      font-family: "Cormorant Garamond", serif;
    }
    .trance-about-btn {
      width: 100%;
      border-radius: 999px;
      border: 1px solid rgba(219, 192, 255, 0.22);
      background: rgba(0, 0, 0, 0.28);
      color: #e9d9ff;
      font-family: "Cormorant Garamond", serif;
      font-size: 1rem;
      padding: 0.52rem 0.9rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    .trance-about-btn:hover {
      border-color: rgba(219, 192, 255, 0.38);
      background: rgba(183, 134, 255, 0.12);
    }
    .trance-card-shell {
      perspective: 1200px;
      width: 100%;
      height: 100%;
      max-height: 100%;
      padding: 0.15rem 2.15rem 0.55rem;
      position: relative;
    }
    .trance-card-inner {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .trance-card-face,
    .trance-card-face-back {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 1.5rem;
      display: flex; flex-direction: column; overflow: hidden;
      border: 2px solid transparent;
    }
    .trance-card-face-back {
      transform: rotateY(180deg);
      background: rgba(20, 10, 40, 0.97);
      box-shadow: 0 15px 50px 0 rgba(0, 0, 0, 0.8);
    }
    .trance-card-header-fixed {
      min-height: 5.65rem;
      text-align: center;
      padding: 0.95rem 0.9rem 0.65rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }
    .trance-card-scroll-area {
      flex: 1; min-height: 0;
      overflow-y: auto;
      padding: 0.8rem 1.1rem 0.85rem;
      text-align: center;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.22) transparent;
    }
    .trance-card-scroll-area::-webkit-scrollbar { width: 6px; }
    .trance-card-scroll-area::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.22); border-radius: 10px; }
    .trance-example-divider {
      display: block;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.15), transparent);
      margin: 1.1rem auto;
      width: 60%;
    }
    .trance-pattern-hit {
      color: #f2c879;
      font-weight: 700;
      font-style: italic;
      text-shadow: 0 0 14px rgba(242, 200, 121, 0.18);
    }
    .trance-info-btn {
      position: absolute; top: 12px; inset-inline-end: 12px;
      width: 30px; height: 30px; border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(15, 12, 24, 0.8);
      color: #d1d5db; font-size: 0.95rem; font-family: "DM Mono", monospace;
      display: grid; place-items: center;
      z-index: 15;
    }
    .carousel-item {
      scroll-snap-align: center;
      flex: 0 0 auto;
      transition: all 0.3s ease;
      opacity: 0.5;
      transform: scale(0.9);
      padding: 0.5rem 1.2rem;
      border-radius: 999px;
      font-size: 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      color: #fff;
      white-space: nowrap;
    }
    .carousel-item.active {
      opacity: 1;
      transform: scale(1.05);
      border-color: currentColor;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
      font-weight: 700;
    }
    .mask-linear {
      -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
      mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
    }
    .trance-theme-viewport {
      overflow-x: hidden;
      overflow-y: visible;
      padding-top: 0.35rem;
      padding-bottom: 0.35rem;
    }
    .trance-slide-out-left { animation: tranceSlideOutLeft 0.3s forwards; }
    .trance-slide-in-right { animation: tranceSlideInRight 0.3s forwards; }
    .trance-slide-out-right { animation: tranceSlideOutRight 0.3s forwards; }
    .trance-slide-in-left { animation: tranceSlideInLeft 0.3s forwards; }
    @keyframes tranceSlideOutLeft { to { transform: translateX(-60px) rotate(-5deg); opacity: 0; } }
    @keyframes tranceSlideInRight { from { transform: translateX(60px) rotate(5deg); opacity: 0; } to { transform: translateX(0) rotate(0); opacity: 1; } }
    @keyframes tranceSlideOutRight { to { transform: translateX(60px) rotate(5deg); opacity: 0; } }
    @keyframes tranceSlideInLeft { from { transform: translateX(-60px) rotate(-5deg); opacity: 0; } to { transform: translateX(0) rotate(0); opacity: 1; } }
    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(-360deg); }
    }
    .app {
      position: relative; z-index: 2; width: 100%; height: 100%;
      max-width: 1240px; margin: 0 auto;
      display: flex; flex-direction: column;
    }
    .screen {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      padding: 1.25rem;
      gap: 1rem;
      overflow: hidden;
    }
    .title-wrap {
      text-align: center; margin-top: 0.5rem;
    }
    .title-main { margin: 0; font-size: 2.5rem; line-height: 1.04; font-family: "Frank Ruhl Libre", Georgia, serif; letter-spacing: 0.01em; }
    .title-sub { margin: 0.2rem 0 0; font-size: 2.1rem; color: var(--accent); font-family: "Frank Ruhl Libre", Georgia, serif; }
    .subtitle { margin: 0.8rem 0 0; font-size: 0.78rem; letter-spacing: 0.23em; color: var(--muted); text-transform: uppercase; }
    .actions {
      width: min(720px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 0.75rem;
    }
    .card-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 1rem;
      padding: 1rem 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 1.32rem;
      font-weight: 700;
      font-family: "Frank Ruhl Libre", Georgia, serif;
    }
    .card-btn:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-1px); }
    .card-note {
      margin-top: -0.2rem;
      font-size: 0.93rem;
      color: var(--muted);
      font-weight: 400;
      font-family: "Assistant", "Segoe UI", sans-serif;
    }
    .secondary-btn {
      border: 1px solid rgba(183, 134, 255, 0.35);
      background: transparent;
      color: #d8b8ff;
      border-radius: 0.9rem;
      padding: 0.72rem 1rem;
      text-align: center;
      cursor: pointer;
      font-size: 1.03rem;
    }
    .utility-row {
      width: min(720px, 100%);
      margin: 0.3rem auto 0;
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .update-banner {
      margin-top: 0.45rem;
      border: 1px solid rgba(183, 134, 255, 0.36);
      background: rgba(183, 134, 255, 0.12);
      border-radius: 0.9rem;
      padding: 0.55rem 0.7rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      font-size: 0.9rem;
    }
    .back-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .back-btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.14);
      color: var(--text);
      border-radius: 999px;
      min-width: 96px;
      height: 42px;
      padding: 0 0.85rem;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .screen-title {
      margin: 0;
      font-size: 1.35rem;
      font-family: "Frank Ruhl Libre", Georgia, serif;
    }
    .frame-wrap {
      flex: 1; min-height: 0;
      border-radius: 1rem;
      border: 1px solid var(--border);
      overflow: hidden;
      background: #000;
      position: relative;
    }
    iframe {
      width: 100%; height: 100%;
      border: 0; background: #000;
    }
    .embed-status {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1rem;
      background: rgba(6, 5, 12, 0.88);
      color: #ddd8eb;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .embed-status.hidden { display: none; }
    .panel {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 1rem;
      padding: 1rem;
      overflow: auto;
      font-size: 1rem;
      line-height: 1.7;
      color: #ddd8eb;
    }
    .list { margin: 0.2rem 0 0; padding-right: 1rem; }
    .list li { margin-bottom: 0.3rem; }
    .muted { color: var(--muted); }
    .diag-grid {
      display: grid;
      gap: 0.55rem;
      margin-top: 0.6rem;
    }
    .diag-row {
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 0.7rem;
      background: rgba(255,255,255,0.04);
      padding: 0.55rem 0.65rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.7rem;
    }
    .diag-name { font-size: 0.93rem; }
    .diag-path { font-size: 0.8rem; color: var(--muted); direction: ltr; text-align: left; }
    .diag-chip {
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 999px;
      padding: 0.14rem 0.52rem;
      font-size: 0.78rem;
      white-space: nowrap;
    }
    .diag-chip.ok { border-color: rgba(46,204,113,0.5); color: #bff6d7; background: rgba(46,204,113,0.16); }
    .diag-chip.bad { border-color: rgba(255,99,132,0.48); color: #ffd4de; background: rgba(255,99,132,0.14); }
    .diag-chip.warn { border-color: rgba(255,205,86,0.5); color: #ffeab8; background: rgba(255,205,86,0.14); }
    .net-badge { margin-right: 0.35rem; }
    .session-card {
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 0.85rem;
      background: rgba(255,255,255,0.04);
      padding: 0.65rem;
      margin-bottom: 0.55rem;
    }
    .session-actions {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
    .about-accordion-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
    }
    .about-accordion-summary::marker,
    .about-accordion-summary::-webkit-details-marker {
      display: none;
    }
    .about-accordion-sign {
      flex: 0 0 auto;
      width: 1.6rem;
      height: 1.6rem;
      border-radius: 999px;
      border: 1px solid rgba(183, 134, 255, 0.45);
      color: #d8b4fe;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: "DM Mono", monospace;
      font-size: 1rem;
      line-height: 1;
      background: rgba(183, 134, 255, 0.12);
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }
    details[open] > summary .about-accordion-sign {
      transform: rotate(180deg);
      background: rgba(183, 134, 255, 0.2);
      color: #f3e8ff;
    }
    .archetype-shuffle-overlay {
      position: fixed; inset: 0; z-index: 300;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(ellipse 120% 80% at 50% 45%, rgba(35, 22, 48, 0.94) 0%, rgba(5, 4, 8, 0.97) 55%, #020103 100%);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); overflow: hidden;
    }
    .archetype-shuffle-hub { position: relative; width: min(92vw, 360px); height: min(52vh, 280px); display: flex; align-items: center; justify-content: center; perspective: 900px; }
    .archetype-shuffle-riffle { position: relative; transform-style: preserve-3d; width: min(84vw, 330px); height: min(44vw, 190px); animation: archetypeRiffleGroup 1.75s cubic-bezier(0.45, 0, 0.2, 1) forwards; }
    .archetype-shuffle-pack { position: absolute; top: 50%; width: min(40vw, 130px); aspect-ratio: 2 / 3; transform-style: preserve-3d; }
    .archetype-shuffle-pack.left { left: 5%; transform: translateY(-50%) rotate(-11deg); animation: archetypePackLeft 1.75s cubic-bezier(0.45, 0, 0.2, 1) forwards; }
    .archetype-shuffle-pack.right { right: 5%; transform: translateY(-50%) rotate(11deg); animation: archetypePackRight 1.75s cubic-bezier(0.45, 0, 0.2, 1) forwards; }
    .archetype-shuffle-card { position: absolute; inset: 0; border-radius: 5px; background-size: cover; background-position: center; box-shadow: 0 14px 36px rgba(0, 0, 0, 0.72), 0 0 0 1px rgba(212, 175, 125, 0.22); transform-origin: 50% 90%; }
    .archetype-shuffle-pack.left .archetype-shuffle-card:nth-child(1) { z-index: 2; animation: archetypeLeftCard1 1.75s ease-in-out forwards; }
    .archetype-shuffle-pack.left .archetype-shuffle-card:nth-child(2) { z-index: 4; animation: archetypeLeftCard2 1.75s ease-in-out forwards; }
    .archetype-shuffle-pack.left .archetype-shuffle-card:nth-child(3) { z-index: 6; animation: archetypeLeftCard3 1.75s ease-in-out forwards; }
    .archetype-shuffle-pack.left .archetype-shuffle-card:nth-child(4) { z-index: 8; animation: archetypeLeftCard4 1.75s ease-in-out forwards; }
    .archetype-shuffle-pack.left .archetype-shuffle-card:nth-child(5) { z-index: 10; animation: archetypeLeftCard5 1.75s ease-in-out forwards; }
    .archetype-shuffle-pack.right .archetype-shuffle-card:nth-child(1) { z-index: 3; animation: archetypeRightCard1 1.75s ease-in-out forwards; }
    .archetype-shuffle-pack.right .archetype-shuffle-card:nth-child(2) { z-index: 5; animation: archetypeRightCard2 1.75s ease-in-out forwards; }
    .archetype-shuffle-pack.right .archetype-shuffle-card:nth-child(3) { z-index: 7; animation: archetypeRightCard3 1.75s ease-in-out forwards; }
    .archetype-shuffle-pack.right .archetype-shuffle-card:nth-child(4) { z-index: 9; animation: archetypeRightCard4 1.75s ease-in-out forwards; }
    .archetype-shuffle-pack.right .archetype-shuffle-card:nth-child(5) { z-index: 11; animation: archetypeRightCard5 1.75s ease-in-out forwards; }
    .archetype-shuffle-caption { margin-top: 1.75rem; font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; letter-spacing: 0.08em; color: rgba(245, 230, 210, 0.88); text-shadow: 0 2px 20px rgba(0, 0, 0, 0.8); }
    @keyframes archetypeRiffleGroup { 0% { transform: translateY(8px) scale(1); } 30% { transform: translateY(0) scale(1.03); } 72% { transform: translateY(-6px) scale(1.04); } 100% { transform: translateY(0) scale(1); } }
    @keyframes archetypePackLeft { 0% { transform: translateY(-50%) translateX(0) rotate(-11deg); } 35% { transform: translateY(-50%) translateX(36px) rotate(-4deg); } 68% { transform: translateY(-50%) translateX(80px) rotate(0deg); } 100% { transform: translateY(-50%) translateX(58px) rotate(0deg); } }
    @keyframes archetypePackRight { 0% { transform: translateY(-50%) translateX(0) rotate(11deg); } 35% { transform: translateY(-50%) translateX(-36px) rotate(4deg); } 68% { transform: translateY(-50%) translateX(-80px) rotate(0deg); } 100% { transform: translateY(-50%) translateX(-58px) rotate(0deg); } }
    @keyframes archetypeLeftCard1 { 0%, 22% { transform: translate3d(0, 10px, 1px) rotate(-3deg); } 46% { transform: translate3d(30px, 0, 60px) rotate(3deg); } 74% { transform: translate3d(66px, -14px, 120px) rotate(0deg); } 100% { transform: translate3d(56px, -8px, 0) rotate(0deg); } }
    @keyframes archetypeLeftCard2 { 0%, 22% { transform: translate3d(0, 5px, 2px) rotate(-2deg); } 46% { transform: translate3d(34px, -2px, 64px) rotate(2deg); } 74% { transform: translate3d(70px, -9px, 125px) rotate(0deg); } 100% { transform: translate3d(58px, -5px, 0) rotate(0deg); } }
    @keyframes archetypeLeftCard3 { 0%, 22% { transform: translate3d(0, 0, 3px) rotate(-1deg); } 46% { transform: translate3d(38px, -4px, 68px) rotate(1deg); } 74% { transform: translate3d(74px, -4px, 130px) rotate(0deg); } 100% { transform: translate3d(60px, -2px, 0) rotate(0deg); } }
    @keyframes archetypeLeftCard4 { 0%, 22% { transform: translate3d(0, -5px, 4px) rotate(1deg); } 46% { transform: translate3d(42px, -6px, 72px) rotate(0deg); } 74% { transform: translate3d(78px, 2px, 134px) rotate(0deg); } 100% { transform: translate3d(62px, 2px, 0) rotate(0deg); } }

      const options = Object.keys(vars);

        const activeTheme = vars[theme] ? theme : (options[0] || '');
        const value = activeTheme ? vars[activeTheme] : [];

    function getTrancePatternTokens(card) {
      const fromManifest = Array.isArray(card && card.highlight_tokens) ? card.highlight_tokens : [];
      if (fromManifest.length) return fromManifest.map(x => String(x || '').trim()).filter(Boolean);
      const pattern = String((card && card.pattern) || '');
      const text = pattern
        .replace(/[.,/#!$%^&*;:{}=\-_`~()?"'<>[\]\\|+]+/g, ' ')
        .replace(/\u2026/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
      if (!text) return [];
      const skip = new Set(['את', 'של', 'עם', 'על', 'עוד', 'לא', 'היא', 'זה', 'איך', 'מה', 'אם']);
      const tokens = text.split(' ').map(t => t.trim()).filter(t => t.length >= 3 && !skip.has(t));

        if (!e.touches || !e.touches.length) return;
        startX = e.touches[0].clientX;

      container.ontouchend = e => {

    async function startTranceRecordingSession() {
      const btn = document.getElementById('trance-record-btn');
      if (!btn) return;
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || typeof MediaRecorder === 'undefined') {
        alert('הדפדפן הנוכחי לא תומך בהקלטת אודיו.');
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });
        tranceAudioStream = stream;
        tranceMediaChunks = [];
        const format = getTranceRecordingFormat();
        tranceRecordingMimeType = format.mimeType;
        tranceRecordingExtension = format.ext;
        tranceMediaRecorder = tranceRecordingMimeType
          ? new MediaRecorder(stream, { mimeType: tranceRecordingMimeType })
          : new MediaRecorder(stream);
        tranceMediaRecorder.ondataavailable = e => {
          if (e.data && e.data.size > 0) tranceMediaChunks.push(e.data);
        };
        tranceMediaRecorder.start(250);
        AppState.tranceIsRecording = true;
        btn.classList.replace('bg-purple-600', 'bg-red-500/10');
        btn.classList.add('recording-pulse', 'border', 'border-red-500');
        btn.innerHTML = '<i data-lucide="square"></i>';
        lucide.createIcons();
      } catch (_) {
        alert('לא ניתן להתחיל הקלטה. בדקו הרשאת מיקרופון בדפדפן.');
      }
    }
    async function stopTranceRecordingSession() {
      const btn = document.getElementById('trance-record-btn');
      if (!btn) return;
      const recorder = tranceMediaRecorder;
      if (!recorder) return;
      if (recorder.state === 'recording') {
        try { recorder.requestData(); } catch (_) {}
      }
      await new Promise(resolve => {
        recorder.onstop = () => resolve();
        try { recorder.stop(); } catch (_) { resolve(); }
      });
      const blobType = tranceRecordingMimeType || recorder.mimeType || 'audio/webm';
      const blob = tranceMediaChunks.length ? new Blob(tranceMediaChunks, { type: blobType }) : null;
      if (!blob || blob.size < 1024) {
        alert('ההקלטה יצאה ריקה. בדקו הרשאות מיקרופון ונסו שוב.');
        AppState.tranceIsRecording = false;
        tranceMediaRecorder = null;
        tranceMediaChunks = [];
        stopTranceAudioStream();
        btn.classList.replace('bg-red-500/10', 'bg-purple-600');
        btn.classList.remove('recording-pulse', 'border', 'border-red-500');
        btn.innerHTML = '<i data-lucide="mic"></i>';
        lucide.createIcons();
        return;
      }
      const card = getTranceCurrentCard();
      const fallbackTheme = AppState.tranceView.currentTheme || 'רגיעה';
      const defaultName = `${String(card.pattern || 'הקלטה')} - ${fallbackTheme}`;
      const name = prompt('שמור הקלטה בשם:', defaultName);
      if (name && blob && blob.size > 0) {
        const audioDataUrl = await fileToDataUrl(blob);
        const durationSec = await getAudioDurationSeconds(blob);
        const now = new Date();
        const saved = {
          id: Date.now(),
          name: String(name).trim() || defaultName,
          extension: tranceRecordingExtension,
          date: now.toLocaleDateString(),
          pattern: String(card.pattern || ''),
          theme: String(fallbackTheme),
          mimeType: blobType,
          durationSec,
          audioDataUrl
        };
        AppState.tranceRecordings.unshift(saved);
        const persisted = persistTranceRecordings();
        if (!persisted) {
          const latest = AppState.tranceRecordings[0];
          if (latest) latest.audioDataUrl = null;
          persistTranceRecordings();
          alert('נשמרה רשומת הקלטה, אבל אין מספיק מקום לשמירת אודיו לניגון פנימי.');
        }
      }
      AppState.tranceIsRecording = false;
      tranceMediaRecorder = null;
      tranceMediaChunks = [];
      tranceRecordingMimeType = '';
      tranceRecordingExtension = 'webm';
      stopTranceAudioStream();
      btn.classList.replace('bg-red-500/10', 'bg-purple-600');
      btn.classList.remove('recording-pulse', 'border', 'border-red-500');
      btn.innerHTML = '<i data-lucide="mic"></i>';
      lucide.createIcons();
    }

        startX = e.touches[0].clientX;

        const dx = e.changedTouches[0].clientX - startX;

    async function ensureArchetypesDataLoaded() {
      if (ARCHETYPES_DATA.length) return true;
      for (const path of ARCHETYPE_MANIFEST_PATHS) {
        try {
          const res = await fetch(path, { cache: 'no-store' });
          if (!res.ok) continue;
          const data = await res.json();
          if (!Array.isArray(data) || data.length === 0) continue;
          ARCHETYPES_DATA = data;
          pruneArchetypeFavorites();
          return true;
        } catch (_) {}
      }
      return false;
    }

    function pruneArchetypeFavorites() {
      const valid = new Set(ARCHETYPES_DATA.map(c => c.id));
      const next = (AppState.archetypeFavorites || []).filter(id => valid.has(id));
      if (next.length !== AppState.archetypeFavorites.length) {
        AppState.archetypeFavorites = next;
        try { localStorage.setItem(ARCHETYPE_FAVORITES_KEY, JSON.stringify(next)); } catch (_) {}
      }
    }

      if (AppState.archetypeFavorites.includes(cardId)) {

    function startArchetypeListTap(cardId, ev) {
      const p = ev.touches && ev.touches[0] ? ev.touches[0] : ev;
      archetypeListTapState = {
        cardId,
        x: Number(p.clientX || 0),
        y: Number(p.clientY || 0),
        t: Date.now()
      };
    }

    function cancelArchetypeListTap() {
      archetypeListTapState = null;
    }

    function finishArchetypeListTap(cardId, ev) {
      if (!archetypeListTapState || archetypeListTapState.cardId !== cardId) return;
      const p = ev.changedTouches && ev.changedTouches[0] ? ev.changedTouches[0] : ev;
      const dx = Math.abs(Number(p.clientX || 0) - archetypeListTapState.x);
      const dy = Math.abs(Number(p.clientY || 0) - archetypeListTapState.y);
      const dt = Date.now() - archetypeListTapState.t;
      archetypeListTapState = null;
      if (dx > 10 || dy > 10 || dt > 450) return;
      renderArchetypeCard(cardId, 'all');
    }

    function getArchetypeRealms() {
      const seen = new Set();
      const realms = [];
      ARCHETYPES_DATA.forEach(card => {
        const realm = String(card.realm || '').trim();
        if (!realm || seen.has(realm)) return;
        seen.add(realm);
        realms.push(realm);
      });
      return realms;
    }

    function toggleArchetypeDeckKey(key) {

      } else {
        AppState.selectedArchetypeDeckKeys.push(key);

    function getCustomArchetypePool() {
      const keys = new Set(AppState.selectedArchetypeDeckKeys || []);
      const includeFavorites = keys.has('__favorites__');
      const selectedRealms = new Set((AppState.selectedArchetypeDeckKeys || []).filter(k => k !== '__favorites__'));
      const idSet = new Set();
      if (includeFavorites) AppState.archetypeFavorites.forEach(id => idSet.add(id));
      ARCHETYPES_DATA.forEach(card => {
        if (selectedRealms.has(String(card.realm || '').trim())) idSet.add(card.id);

    function startArchetypeSpreadDraw(pool, fromView) {

        return;
      }
      AppState.pendingArchetypePoolIds = pool.map(c => c.id);
      AppState.archetypeView = { cardId: null, fromView, flipped: false };

    }

    function playArchetypeShuffleThen(callback) {
      const app = document.getElementById('app');
      const layer = document.createElement('div');
      layer.className = 'archetype-shuffle-overlay';
      const cardStyle = `background-image:url('${ARCHETYPE_CARD_BACK}')`;
      const leftPack = Array.from({ length: 5 }, () => `<div class="archetype-shuffle-card" style="${cardStyle}"></div>`).join('');
      const rightPack = Array.from({ length: 5 }, () => `<div class="archetype-shuffle-card" style="${cardStyle}"></div>`).join('');
      layer.innerHTML = `<div class="archetype-shuffle-hub"><div class="archetype-shuffle-riffle"><div class="archetype-shuffle-pack left">${leftPack}</div><div class="archetype-shuffle-pack right">${rightPack}</div></div></div><p class="archetype-shuffle-caption">מערבבים את החפיסה...</p>`;
      app.appendChild(layer);
      window.setTimeout(() => { layer.remove(); callback(); }, 1780);
    }

    function pickArchetypeSpreadCards(count) {
      const poolSource = (AppState.pendingArchetypePoolIds || []).length ? ARCHETYPES_DATA.filter(c => AppState.pendingArchetypePoolIds.includes(c.id)) : ARCHETYPES_DATA;
      const pool = [...poolSource].sort(() => Math.random() - 0.5);
      return pool.slice(0, Math.min(count, pool.length));
    }

    function openArchetypeTarotSpread(pushHistory = true) {
      const app = document.getElementById('app');
      const layer = document.createElement('div');
      layer.className = 'archetype-spread-overlay';
      if (pushHistory) pushArchetypesHistory('archetypes-spread', { fromView: AppState.archetypeView.fromView || 'random' });
      const spreadCards = pickArchetypeSpreadCards(15);
      if (!spreadCards.length) return;
      const angleStart = -74;
      const angleEnd = 74;
      const step = spreadCards.length > 1 ? (angleEnd - angleStart) / (spreadCards.length - 1) : 0;
      // Keep EN motion semantics, but fit and center arc on narrow mobile screens.
      const stageWidth = Math.min(Math.max(window.innerWidth - 32, 280), 440);
      const cardWidth = Math.min(stageWidth * 0.2, 92);
      const maxAngleRad = Math.max(Math.abs(angleStart), Math.abs(angleEnd)) * Math.PI / 180;
      const sidePadding = 28;
      // x is card top-left offset from stage center line, so keep half-card width in the bound.
      const maxRadiusForViewport = ((stageWidth / 2) - sidePadding - (cardWidth / 2)) / Math.sin(maxAngleRad);
      const radius = Math.max(96, Math.min(278, maxRadiusForViewport));
      // Keep the arc truly centered when card placement uses top-left coordinates.
      const centerX = -(cardWidth / 2);
      const centerY = Math.min(138, Math.max(108, radius * 0.5));
      const cardsHtml = spreadCards.map((card, i) => {
        const angle = angleStart + (step * i);
        const rad = angle * Math.PI / 180;
        const x = centerX + Math.sin(rad) * radius;
        const y = centerY - Math.cos(rad) * radius;
        const rot = angle * 0.56;
        return `<div class="archetype-spread-card is-not-ready" data-card-id="${card.id}" data-x="${x.toFixed(2)}" data-y="${y.toFixed(2)}" data-rot="${rot.toFixed(2)}" style="--z:${60 + i}; transform: translate3d(-164px, 114px, 0) rotate(-5deg);"><div class="archetype-spread-inner"><div class="archetype-spread-face back" style="background-image:url('${ARCHETYPE_CARD_BACK}')"></div><div class="archetype-spread-face front"></div></div></div>`;
      }).join('');
      layer.innerHTML = `<div class="archetype-spread-stage is-dealing"><h3 class="archetype-spread-title">דחפו קלף החוצה כדי לחשוף אותו<span class="archetype-spread-subtitle">גררו קלף מהקשת</span></h3>${cardsHtml}</div>`;
      app.appendChild(layer);
      const stage = layer.querySelector('.archetype-spread-stage');
      let selected = false;
      const cards = Array.from(layer.querySelectorAll('.archetype-spread-card'));
      cards.forEach((el, i) => {
        const targetX = Number(el.dataset.x || 0);
        const targetY = Number(el.dataset.y || 0);
        const targetRot = Number(el.dataset.rot || 0);
        const delay = 36 * i;
        window.setTimeout(() => { el.style.transform = `translate3d(${targetX}px, ${targetY}px, 0) rotate(${targetRot}deg)`; }, delay);
        window.setTimeout(() => { el.classList.remove('is-not-ready'); }, delay + 360);
      });
      window.setTimeout(() => { stage.classList.remove('is-dealing'); }, 980);
      cards.forEach((el) => {
        const baseX = Number(el.dataset.x || 0);
        const baseY = Number(el.dataset.y || 0);
        const baseRot = Number(el.dataset.rot || 0);
        let pointerId = null;
        let startX = 0;
        let startY = 0;
        let pullDistance = 0;
        const applyTransform = (offsetX, offsetY, lift = 0, twist = 0) => {
          el.style.transform = `translate3d(${baseX + offsetX}px, ${baseY + offsetY - lift}px, 0) rotate(${baseRot + twist}deg)`;
        };
        const onDown = (ev) => {
          if (selected || el.classList.contains('is-not-ready')) return;
          pointerId = ev.pointerId;
          startX = ev.clientX;
          startY = ev.clientY;
          pullDistance = 0;
          el.classList.add('is-dragging');
          el.setPointerCapture(pointerId);
        };
        const onMove = (ev) => {
          if (pointerId == null || ev.pointerId !== pointerId || selected) return;
          const dx = ev.clientX - startX;
          const dy = ev.clientY - startY;
          // Make the card follow finger/mouse directly for reliable edge pulls.
          pullDistance = Math.hypot(dx, dy);
          const twist = dx * 0.035;
          applyTransform(dx, dy, 8, twist);
        };
        const chooseCard = () => {
          selected = true;
          const cardId = el.dataset.cardId;
          cards.forEach(c => { if (c !== el) c.style.opacity = '0.2'; });
          el.classList.remove('is-dragging');
          el.classList.add('is-chosen');
          el.style.transform = 'translate3d(0px, -72px, 0) rotate(0deg) scale(1.28)';
          window.setTimeout(() => el.classList.add('is-flipping'), 180);
          window.setTimeout(() => {
            if (ARCHETYPE_ARC_APPROVAL_MODE) {
              layer.remove();
              renderArchetypesHome();
              return;
            }
            layer.remove();
            renderArchetypeCard(cardId, AppState.archetypeView.fromView || 'random');
          }, 980);
        };
        const onUp = (ev) => {
          if (pointerId == null || ev.pointerId !== pointerId || selected) return;
          el.classList.remove('is-dragging');
          // Side cards need a lower threshold on narrow mobile screens.
          const sideWeight = Math.min(1, Math.abs(baseRot) / 41.5);
          const revealThreshold = Math.max(28, 52 - (sideWeight * 20));
          if (pullDistance > revealThreshold) {
            chooseCard();
          } else {
            el.style.transition = 'transform 0.28s cubic-bezier(0.2,0.8,0.2,1)';
            applyTransform(0, 0, 0, 0);
            window.setTimeout(() => { el.style.transition = ''; }, 300);
          }
          try { el.releasePointerCapture(pointerId); } catch (_) {}
          pointerId = null;
        };
        el.addEventListener('pointerdown', onDown);
        el.addEventListener('pointermove', onMove);
        el.addEventListener('pointerup', onUp);
        el.addEventListener('pointercancel', onUp);
      });
    }

                    <p>מי הארכיטיפ המשלים שלה? (מורה-תלמיד, נמרה-טרף, ערפד-קורבן, מאלף-אריה)</p>
                    <p>תן לעצמך זמן עם השאלות האלה — הן אינן חקירה, הן הזמנה. אם משהו עולה (רגש, זיכרון, תחושה בגוף) — תן לו מקום.</p>

    function openPlanner() { renderKinkyScenePlannerHome(); }
    function listPlannerSessions() {
      try {
        const raw = localStorage.getItem(PLANNER_SESSIONS_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(parsed)) return [];
        return parsed
          .filter(s =>
            s &&
            typeof s === 'object' &&
            typeof s.id === 'string' &&
            typeof s.createdAt === 'string' &&
            typeof s.updatedAt === 'string' &&
            s.plannerState &&
            typeof s.plannerState === 'object'
          )
          .map(s => {
            const sessionName = s?.plannerState?.session?.sessionName || '';
            const nickname = s?.plannerState?.session?.nickname || '';
            const fallbackTitle = String(sessionName || nickname || 'סשן ללא כותרת');
            return { ...s, title: String(s.title || fallbackTitle) };
          })
          .sort((a, b) => String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')));
      } catch {
        return [];
      }
    }
    function savePlannerSessions(sessions) {
      const clean = Array.isArray(sessions) ? sessions.slice(0, 100) : [];
      localStorage.setItem(PLANNER_SESSIONS_KEY, JSON.stringify(clean));
      AppState.plannerSessions = clean;
    }
    function plannerSessionDate(s) {
      const raw = String((s && (s.updatedAt || s.createdAt)) || '');
      const dt = new Date(raw);
      if (Number.isNaN(dt.getTime())) return String(raw || '');
      return dt.toLocaleString('he-IL');
    }
    function plannerSessionMeta(s) {
      const snap = s && s.summarySnapshot && typeof s.summarySnapshot === 'object' ? s.summarySnapshot : {};
      const roleRaw = String(snap.role || '').trim().toLowerCase();
      const roleMap = { dom: 'דום', sub: 'סאב', switch: 'סוויץ׳' };
      const role = roleRaw ? (roleMap[roleRaw] || roleRaw) : '—';
      const durationNum = Number(snap.duration || 0);
      const duration = Number.isFinite(durationNum) && durationNum > 0 ? `${durationNum} דק׳` : '—';
      return `${role} · ${duration}`;
    }

            <details open>
              <summary><strong>מה הכלי עושה</strong></summary>
              <ul class="list">

            <details>
              <summary><strong>מסגרות הסכמה — הרקע התיאורטי</strong></summary>
              <p>עולם הקינק פיתח לאורך העשורים האחרונים שפה משלו סביב הסכמה — לא כי אנשים בעולם הזה זקוקים ליותר כללים, אלא כי הם הבינו משהו שהתרבות הכללית עדיין מתקשה לעכל: חוויות עזות דורשות מסגרת ברורה כדי להיות חופשיות באמת. שלוש מסגרות המרכזיות שהתפתחו בקהילה:</p>
              <p><strong>SSC — Safe, Sane, Consensual | בטוח, שפוי ובהסכמה</strong></p>
              <p>המסגרת הקלאסית, שהופיעה לראשונה בשנות ה-80 בקהילת הלהט"ב הקינקית בניו יורק. היא הציעה לראשונה עיקרון מפורש: פעילות קינק לגיטימית כאשר היא עומדת בשלושה תנאים.</p>
              <ul class="list">
                <li><strong>בטוח</strong> — הצדדים נוקטים אמצעי זהירות סבירים למזעור סיכונים פיזיים ונפשיים. בטיחות לא אומרת העדר סיכון — אומרת מודעות אליו ואחריות כלפיו.</li>
                <li><strong>שפוי</strong> — הפעילות מתבצעת ממצב נפשי מאוזן. לא תחת השפעת חומרים שמאפשרים פחות שיפוט, לא מתוך מקום של משבר רגשי, לא כשמישהו לחוץ, מפוחד או לא נוכח לעצמו.</li>

              </ul>
              <p>המגבלה של SSC היא גם חוזקה: המילה "בטוח" עמומה. בטוח לפי מי? מה נחשב בטוח? זה פתח לביקורת ולפיתוח מסגרות נוספות.</p>
              <p><strong>RACK — Risk-Aware Consensual Kink | מודעות לסיכון והסכמה מודעת</strong></p>
              <p>RACK הופיעה בסוף שנות ה-90 כמענה לביקורת על SSC. הטענה המרכזית: חלק מהפעילויות שאנשים רוצים לעשות פשוט אינן "בטוחות" לחלוטין — ולהעמיד פנים אחרת זה לא כנה. קשירה, משחקי כאב, ניסויים בחסך חושי — כל אלה כרוכים בסיכון אמיתי. השאלה אינה "האם זה בטוח?" אלא "האם כולם יודעים בדיוק מה הסיכון ובחרו בו מרצון?"</p>

                <li><strong>הסכמה מודעת</strong> — ההסכמה מבוססת על הבנה אמיתית של הסיכונים. לא "כן כי אני סומך עליך", אלא "כן כי אני מבין מה אני מסכים לו".</li>
              </ul>
              <p>RACK מכבדת את הבגרות של המשתתפים — את הזכות לבחור בחוויות שכרוכות בסיכון, כל עוד הבחירה היא מושכלת ואמיתית. היא לא מנסה להגן על אנשים מעצמם, אלא לוודא שהם עושים את הבחירות שלהם בעיניים פקוחות.</p>
              <p><strong>FRIES — Freely given, Reversible, Informed, Enthusiastic, Specific | חופשית, הפיכה, מודעת, נלהבת וספציפית</strong></p>
              <p>המסגרת החדשה יחסית, שצמחה מתוך שיח רחב יותר על תרבות הסכמה — גם מחוץ לעולם הקינק. FRIES שימושית במיוחד כי היא מפרקת את המילה "הסכמה" לרכיבים ברורים שאפשר לבחון.</p>
              <ul class="list">

                <li><strong>Reversible | הפיכה</strong> — הסכמה אינה חוזה. מה שהוסכם אתמול לא מחייב היום. מה שהסכמתם לו בתחילת הסשן לא מחייב עד הסוף. בכל רגע — גם בתוך חוויה עזה — אפשר לשנות את הדעה. ללא הסברים, ללא אשמה.</li>
                <li><strong>Informed | מודעת</strong> — ההסכמה מבוססת על מידע אמיתי. לא על הנחות. לא על מה שנדמה לי שיקרה. לא על מה שאני מקווה. שיחה פתוחה על מה שעומד לקרות, איך, ומה כל אחד צריך.</li>
                <li><strong>Enthusiastic | נלהבת</strong> — זה אולי הפרק החשוב ביותר. לא "אני לא אומר לא", לא "אני מניח שכן", לא שתיקה שנפרשת כאישור. הסכמה אמיתית נראית כמו כן — ברור, פעיל, ורצוי. ה"כן" הנלהב הוא הסטנדרט, לא ה"לא" הנעדר.</li>
                <li><strong>Specific | ספציפית</strong> — הסכמה לדבר אחד אינה הסכמה לכל השאר. "כן לקשירה" אינו "כן לכל מה שיבוא אחרי". כל פעילות, כל רמת עצימות, כל מרחב חדש — דורשים הסכמה משלהם.</li>

              <p>אין מסגרת אחת נכונה. חלק מהזוגות עובדים עם SSC, חלק עם RACK, חלק מרכיבים להם משהו משלהם מתוך כל השלושה. מה שחשוב הוא שיש שפה משותפת — שכאשר אחד אומר "הסכמה", שניהם מבינים לאיזה הסכמה הוא מתכוון.</p>
              <p>מצפן התשוקות בנוי כך שיתמוך בכל אחת מהמסגרות האלה — ויעזור לכם לתרגם אותן משיחה תיאורטית לשיחה אמיתית, לפני שמתחילים.</p>
            </details>
            <details>
              <summary><strong>תקשורת ובטיחות בזמן אמת</strong></summary>
              <p>שיחה לפני הסשן היא הכרחית — אבל לא מספיקה לבדה.</p>
              <p>מילת ביטחון היא כלי עצירה ברור שעובד גם כשהגוף נמצא בתוך חוויה עזה, גם כשקשה לחשוב, גם כשנראה ש"הכול בסדר". מומלץ להגדיר מילה ניטרלית וקלה לזכור — כמו "אדום", "עצור", או כל מילה שלא תישמע כמו חלק מהמשחק.</p>
              <p>מחוות עצירה — לסיטואציות שבהן קשה לדבר. שלוש הקשות, לדוגמה, יכולות לשמש כ"עצור" שלא מצריך מילים.</p>
              <p>צ'ק-אין תוך כדי — גם כשנראה שהכול זורם. שאלה קצרה, מגע עדין, עצירה קצרה לבדיקה — כל אלה מחזקים את האמון ומאפשרים לסשן להתעמק.</p>
              <p>הסכמה היא תהליך מתמשך — לא אירוע חד-פעמי. מה שהוסכם בהתחלה יכול להשתנות. אפשר לעצור, לשנות כיוון, למשוך הסכמה — בכל שלב, ללא הסברים.</p>

              <summary><strong>לאחר הסשן — אפטרקר</strong></summary>
              <p>חוויות עזות דורשות נחיתה עדינה. אפטרקר הוא הזמן שאחרי — מגע, שתייה חמה, מילים, שקט, כל מה שעוזר לגוף ולנפש לחזור לאדמה. תכננו את האפטרקר מראש כחלק בלתי נפרד מהסשן, לא כנספח אופציונלי.</p>
            </details>

              <summary><strong>הערת פרטיות</strong></summary>

            </details>
          </div>
        </div>

    function archetypePracticeWithoutDuplicateQuestion(practice, question) {
      if (practice == null || practice === '') return '';
      const q = question == null ? '' : String(question).replace(/\s+/g, ' ').trim();
      if (!q) return String(practice);
      const blocks = String(practice).split(/\n\n+/).map(b => b.trim()).filter(Boolean);
      if (blocks.length === 0) return String(practice);
      const last = blocks[blocks.length - 1].replace(/\s+/g, ' ').trim();
      const norm = s => s.replace(/^["'\s]+|["'\s.?]+$/g, '').toLowerCase();
      const flat = s => String(s).replace(/\s+/g, ' ').trim().replace(/\?+$/g, '').toLowerCase();
      if (last === q || flat(last) === flat(q) || norm(last) === norm(q)) blocks.pop();
      return blocks.join('\n\n');
    }

          renderPlannerEmbed(
            state.plannerMode || 'new',
            state.plannerSessionId || null,
            state.plannerStartChapter || null,
            state.plannerAutoShare || null,
            state.plannerReturnTo || 'sessions',
            false
          );
          return;
        }
        renderKinkyScenePlannerHome(false);
        return;
      }
      const params = new URLSearchParams(window.location.search);
      const moduleName = params.get('module');
      if (moduleName === 'planner') {
        renderKinkyScenePlannerHome();
        return;
      }
      if (moduleName === 'archetypes') {
        renderArchetypesHome(false);
        return;
      }
      if (moduleName === 'hypno') {
        renderTranceLanguageHome(false);
        return;
      }
      renderWelcome(false);
    });

    Promise.all([preloadShellEssentials()]).finally(() => {
      ensureFreshBuildOnce();
      bootShellRoute();
    });
  </script>
</body>
</html>
