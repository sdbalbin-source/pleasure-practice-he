<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050408">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pleasure HE">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>Pleasure Practice Studio - Hebrew</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050408;
      --panel: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.18);
      --text: #f3f2f7;
      --muted: #c6c2d5;
      --accent: #b786ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: "Assistant", "Segoe UI", sans-serif; }
    .hypno-container {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; background: #000;
    }
    .hypno-spiral {
      position: absolute; top: 50%; left: 50%;
      width: 150vmax; height: 150vmax;
      transform-origin: center;
      transform: translate(-50%, -50%);
      animation: spin 13s linear infinite;
      opacity: 0.72;
    }
    .vignette {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(circle, transparent 25%, #000 90%);
      pointer-events: none;
    }
    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(-360deg); }
    }
    .app {
      position: relative; z-index: 2; width: 100%; height: 100%;
      max-width: 1240px; margin: 0 auto;
      display: flex; flex-direction: column;
    }
    .screen {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      padding: 1.25rem;
      gap: 1rem;
      overflow: hidden;
    }
    .title-wrap {
      text-align: center; margin-top: 0.5rem;
    }
    .title-main { margin: 0; font-size: 2.5rem; line-height: 1.04; font-family: "Frank Ruhl Libre", Georgia, serif; letter-spacing: 0.01em; }
    .title-sub { margin: 0.2rem 0 0; font-size: 2.1rem; color: var(--accent); font-family: "Frank Ruhl Libre", Georgia, serif; }
    .subtitle { margin: 0.8rem 0 0; font-size: 0.78rem; letter-spacing: 0.23em; color: var(--muted); text-transform: uppercase; }
    .actions {
      width: min(720px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 0.75rem;
    }
    .card-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 1rem;
      padding: 1rem 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 1.32rem;
      font-weight: 700;
      font-family: "Frank Ruhl Libre", Georgia, serif;
    }
    .card-btn:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-1px); }
    .card-note {
      margin-top: -0.2rem;
      font-size: 0.93rem;
      color: var(--muted);
      font-weight: 400;
      font-family: "Assistant", "Segoe UI", sans-serif;
    }
    .secondary-btn {
      border: 1px solid rgba(183, 134, 255, 0.35);
      background: transparent;
      color: #d8b8ff;
      border-radius: 0.9rem;
      padding: 0.72rem 1rem;
      text-align: center;
      cursor: pointer;
      font-size: 1.03rem;
    }
    .utility-row {
      width: min(720px, 100%);
      margin: 0.3rem auto 0;
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .update-banner {
      margin-top: 0.45rem;
      border: 1px solid rgba(183, 134, 255, 0.36);
      background: rgba(183, 134, 255, 0.12);
      border-radius: 0.9rem;
      padding: 0.55rem 0.7rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      font-size: 0.9rem;
    }
    .back-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .back-btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-radius: 999px;
      width: 42px; height: 42px;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .screen-title {
      margin: 0;
      font-size: 1.35rem;
      font-family: "Frank Ruhl Libre", Georgia, serif;
    }
    .frame-wrap {
      flex: 1; min-height: 0;
      border-radius: 1rem;
      border: 1px solid var(--border);
      overflow: hidden;
      background: #000;
      position: relative;
    }
    iframe {
      width: 100%; height: 100%;
      border: 0; background: #000;
    }
    .embed-status {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1rem;
      background: rgba(6, 5, 12, 0.88);
      color: #ddd8eb;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .embed-status.hidden { display: none; }
    .panel {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 1rem;
      padding: 1rem;
      overflow: auto;
      font-size: 1rem;
      line-height: 1.7;
      color: #ddd8eb;
    }
    .list { margin: 0.2rem 0 0; padding-right: 1rem; }
    .list li { margin-bottom: 0.3rem; }
    .muted { color: var(--muted); }
    .diag-grid {
      display: grid;
      gap: 0.55rem;
      margin-top: 0.6rem;
    }
    .diag-row {
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 0.7rem;
      background: rgba(255,255,255,0.04);
      padding: 0.55rem 0.65rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.7rem;
    }
    .diag-name { font-size: 0.93rem; }
    .diag-path { font-size: 0.8rem; color: var(--muted); direction: ltr; text-align: left; }
    .diag-chip {
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 999px;
      padding: 0.14rem 0.52rem;
      font-size: 0.78rem;
      white-space: nowrap;
    }
    .diag-chip.ok { border-color: rgba(46,204,113,0.5); color: #bff6d7; background: rgba(46,204,113,0.16); }
    .diag-chip.bad { border-color: rgba(255,99,132,0.48); color: #ffd4de; background: rgba(255,99,132,0.14); }
    .diag-chip.warn { border-color: rgba(255,205,86,0.5); color: #ffeab8; background: rgba(255,205,86,0.14); }
    .net-badge { margin-right: 0.35rem; }
    .session-card {
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 0.85rem;
      background: rgba(255,255,255,0.04);
      padding: 0.65rem;
      margin-bottom: 0.55rem;
    }
    .session-actions {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="hypno-container">
    <svg class="hypno-spiral" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <path fill="none" stroke="#2e1065" stroke-width="8" stroke-linecap="round"
            d="M100,100 m0,0 a4,4 0 0 1 4,4 a8,8 0 0 1 -8,8 a12,12 0 0 1 -12,-12 a16,16 0 0 1 16,-16
               a20,20 0 0 1 20,20 a24,24 0 0 1 -24,24 a28,28 0 0 1 -28,-28 a32,32 0 0 1 32,-32
               a36,36 0 0 1 36,36 a40,40 0 0 1 -40,40 a44,44 0 0 1 -44,-44 a48,48 0 0 1 48,-48
               a52,52 0 0 1 52,52 a56,56 0 0 1 -56,56 a60,60 0 0 1 -60,-60 a64,64 0 0 1 64,-64
               a68,68 0 0 1 68,68 a72,72 0 0 1 -72,72 a76,76 0 0 1 -76,-76 a80,80 0 0 1 80,-80
               a84,84 0 0 1 84,84 a88,88 0 0 1 -88,88 a92,92 0 0 1 -92,-92 a96,96 0 0 1 96,-96
               a100,100 0 0 1 100,100"/>
    </svg>
  </div>
  <div class="vignette"></div>

  <div class="app" id="app"></div>

  <script>
    const ABOUT_TEMPLATE = `
        <div class="flex flex-col h-full bg-[#050408] md:max-w-[1240px] md:mx-auto md:w-full">
          <div class="p-6 pt-8 flex items-center gap-4">
            <button onclick="renderWelcome()" class="p-2 bg-white/5 rounded-full"><i data-lucide="arrow-left"></i></button>
            <h2 class="text-2xl font-bold text-white serif-font">אודות Pleasure Practice Studio</h2>
          </div>
          <div class="flex-1 overflow-y-auto px-6 pb-10 space-y-6 no-scrollbar">
            <div class="bg-white/5 border border-purple-500/20 rounded-2xl p-5">
              <h3 class="text-purple-300 font-bold text-lg serif-font mb-2">לשם מה הסטודיו קיים</h3>
              <p class="text-gray-300 serif-font text-base leading-relaxed">Pleasure Practice Studio הוא מרחב שקט לחקירה אירוטית מכוונת - מקום לגלות מה את/ה רוצה, למצוא לזה מילים מדויקות, ולעצב חוויות שמרגישות בטוחות, חיות ובאמת שלך.</p>
            </div>
            <div class="bg-white/5 border border-purple-500/20 rounded-2xl p-5">
              <h3 class="text-purple-300 font-bold text-lg serif-font mb-3">שלושה כלים, סטודיו אחד</h3>
              <div class="space-y-4 text-gray-300 serif-font text-base leading-relaxed">
                <p><span class="text-white font-bold">דפוסי שפה היפנוטיים</span><br>חבילת תרגול לטון, קצב וניסוח היפנוטי-אירוטי. למי שרוצה להרחיב את טווח השפה, להעמיק דמיון אירוטי, או לחקור מצבים מודרכים דרך מילים.</p>
                <p><span class="text-white font-bold">ארכיטיפים של עונג</span><br>חבילת קלפים חזותית-סמלית לחקירה רגשית ואנרגטית. לזהות איזה ארכיטיפ של מצב רוח רצוי לך לגלם, להזמין או להבין - בעצמך או בדינמיקה עם פרטנר/ית.</p>
                <p><span class="text-white font-bold">מצפן התשוקות</span><br>מרחב מובנה להסכמות ותקשורת בין פרטנרים. לדייק רצונות, גבולות, עוצמה ואפטרקר לפני סשן, כדי להיכנס אליו בביטחון, בהירות ודאגה הדדית.</p>
              </div>
            </div>
            <div class="bg-white/5 border border-purple-500/20 rounded-2xl p-5">
              <h3 class="text-purple-300 font-bold text-lg serif-font mb-2">על סשה</h3>
              <p class="text-gray-300 serif-font text-base leading-relaxed">סשה בלבין הוא מחנך לאמנויות אירוטיות ויוצר Pleasure Practice Studio. העבודה שלו מחברת בין תשוקה, עומק והסכמה דרך כלים מעשיים שאפשר ליישם בחיים עצמם - לבד או יחד. הגישה משלבת שפה היפנוטית, דמיון ארכיטיפי ועיצוב תקשורת כדי לתמוך בחוויות אינטימיות מדויקות, בטוחות ומשמעותיות יותר.</p>
            </div>
            <div class="bg-white/5 border border-purple-500/20 rounded-2xl p-5">
              <h3 class="text-purple-300 font-bold text-lg serif-font mb-2">חיבור</h3>
              <p class="text-gray-300 serif-font text-sm leading-relaxed">אפשר לעקוב אחרי <a href="https://www.instagram.com/sasha_balabin_erotic.arts/" target="_blank" rel="noopener noreferrer" class="text-fuchsia-300 underline decoration-fuchsia-400/50 hover:text-fuchsia-200">@sasha_balabin_erotic.arts</a> לתרגולים מתמשכים, תובנות ועדכונים על הצעות חדשות.</p>
            </div>
            <div class="bg-white/5 border border-purple-500/20 rounded-2xl p-5">
              <h3 class="text-purple-300 font-bold text-lg serif-font mb-2">פרטיות</h3>
              <p class="text-gray-300 serif-font text-sm leading-relaxed">הנתונים נשמרים מקומית בדפדפן/מכשיר שלך כברירת מחדל. אם משתמשים במכשיר משותף - מומלץ למחוק נתונים לאחר שימוש.</p>
            </div>
            <div class="pt-2">
              <button onclick="promptInstallApp()" class="install-app-btn w-full py-3 rounded-2xl border border-purple-500/30 text-purple-200 text-sm hover:bg-purple-500/10 transition flex items-center justify-center gap-2 serif-font">
                <i data-lucide="download"></i> התקן אפליקציה למסך הבית
              </button>
              <button onclick="forceUpdateApp()" class="mt-2 w-full py-2 rounded-xl border border-blue-500/30 text-blue-200 text-xs hover:bg-blue-500/10 transition flex items-center justify-center gap-2 font-mono">
                <i data-lucide="refresh-cw"></i> כפיית עדכון עכשיו
              </button>
            </div>
          </div>
        </div>
      `;
    const MODULE_HEALTH_CHECKS = [
      { id: 'shell', name: 'מעטפת עברית', path: './index.html' },
      { id: 'manifest', name: 'Manifest', path: './manifest.json' },
      { id: 'sw', name: 'Service Worker', path: './sw.js' },
      { id: 'archetypes', name: 'מודול ארכיטיפים', path: './archetypes-he/index.html' },
      { id: 'archetypesData', name: 'דאטה ארכיטיפים', path: './archetypes_he_data.json' },
      { id: 'hypno', name: 'מודול דפוסי שפה', path: './דפוסי שפה עברית/index.html' },
      { id: 'planner', name: 'מודול מצפן תשוקות', path: './planner-he/index.html' }
    ];
    const SW_BUILD = '2026-04-23-he-2';
    const APP_CACHE_PREFIX = 'pleasure-he-v';
    const CANONICAL_ORIGIN = 'https://pleasure-practice-he.pages.dev';
    const PLANNER_SESSIONS_KEY = 'planner_sessions_v1';
    const THEME_ORDER = ['Direct Suggestions', 'Invitations', 'Identity', 'Future Pace'];
    const DEFAULT_CATEGORY_INFO = {};
    const AppState = { cards: [], categories: [], themes: [], plannerSessions: [] };
    let CATEGORY_INFO = DEFAULT_CATEGORY_INFO;
    let deferredInstallPrompt = null;
    let currentSwReg = null;
    let diagnosticsCache = null;
    let plannerPendingReturnTo = null;

    function mergeCategoryInfoMaps(defaults, incoming) {
      return { ...(defaults || {}), ...(incoming || {}) };
    }
    function attachCategoryInfoToCards(cards) {
      return Array.isArray(cards) ? cards.slice() : [];
    }
    function loadFromStorage() {
      try {
        const cachedCards = JSON.parse(localStorage.getItem('en_cards_data_v1') || '[]');
        AppState.cards = Array.isArray(cachedCards) ? cachedCards : [];
      } catch {
        AppState.cards = [];
      }
      try {
        const cachedCategoryInfo = JSON.parse(localStorage.getItem('en_category_info_v1') || '{}');
        CATEGORY_INFO = cachedCategoryInfo && typeof cachedCategoryInfo === 'object' ? cachedCategoryInfo : DEFAULT_CATEGORY_INFO;
      } catch {
        CATEGORY_INFO = DEFAULT_CATEGORY_INFO;
      }
      AppState.themes = THEME_ORDER.slice();
    }
    function renderWelcome() {
      if (AppState.cards.length === 0) {
        fetch('cards_data.json')
          .then(r => r.json())
          .then(data => {
            AppState.cards = data.cards;
            AppState.categories = data.categories;
            CATEGORY_INFO = mergeCategoryInfoMaps(DEFAULT_CATEGORY_INFO, data.category_info || {});
            AppState.cards = attachCategoryInfoToCards(AppState.cards, CATEGORY_INFO);
            try { localStorage.setItem('en_category_info_v1', JSON.stringify(CATEGORY_INFO)); } catch (e) {}
            try { localStorage.setItem('en_cards_data_v1', JSON.stringify(AppState.cards)); } catch (e) {}
            AppState.themes = THEME_ORDER.slice();
          })
          .catch(() => {
            loadFromStorage();
          });
      }
      document.getElementById('app').innerHTML = `
        <div class="flex flex-col items-center justify-center h-full p-6 text-center relative z-10">
          <div class="mb-8 relative">
            <div class="absolute inset-0 bg-purple-500 blur-3xl opacity-20 rounded-full animate-pulse"></div>
            <h1 class="text-5xl font-bold serif-font text-white mb-2 tracking-tight relative z-10">Pleasure Practice</h1>
            <h1 class="text-5xl font-bold serif-font text-purple-400 mb-4 tracking-tight relative z-10">Studio</h1>
            <p class="text-gray-400 mt-2 text-xs tracking-[0.25em] uppercase" style="font-family:'DM Mono',monospace">שלושה כלים משולבים לתרגול</p>
          </div>

          <button onclick="renderModeSelect()" class="w-full max-w-sm py-5 px-5 bg-white/10 border border-fuchsia-300/20 rounded-2xl text-white text-xl font-bold hover:bg-white/20 transition-all mb-3 flex items-center justify-center shadow-lg shadow-purple-900/20 serif-font text-center">
            דפוסי שפה היפנוטיים
          </button>
          <button onclick="renderArchetypesHome()" class="w-full max-w-sm py-5 px-5 bg-white/10 border border-violet-300/20 rounded-2xl text-white text-xl font-bold hover:bg-white/20 transition-all mb-3 flex items-center justify-center shadow-lg shadow-purple-900/20 serif-font text-center">
            ארכיטיפים של עונג
          </button>
          <button onclick="renderKinkyScenePlannerHome()" class="w-full max-w-sm py-5 px-5 bg-white/10 border border-blue-300/20 rounded-2xl text-white text-xl font-bold hover:bg-white/20 transition-all mb-5 flex items-center justify-center shadow-lg shadow-purple-900/20 serif-font text-center">
            מצפן התשוקות
          </button>

          <button onclick="showAbout()" class="w-full max-w-xs py-3 rounded-2xl border border-purple-500/20 text-purple-300 text-base hover:bg-purple-500/10 transition flex items-center justify-center serif-font">
            אודות כלליות
          </button>

          <button onclick="clearData()" class="absolute bottom-6 text-xs text-gray-600 hover:text-red-400 transition opacity-60 hover:opacity-100">
            איפוס כל הנתונים
          </button>
        </div>
      `;
      lucide.createIcons();
    }
    function showAbout() {
      document.getElementById('app').innerHTML = ABOUT_TEMPLATE;
      lucide.createIcons();
      updateInstallButtons();
    }
    function openArchetypes() {
      renderEmbeddedModule('ארכיטיפים של עונג', './archetypes-he/index.html', 'ארכיטיפים של עונג');
    }
    function renderArchetypesHome() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="flex flex-col h-full p-6 bg-black/10">
          <div class="flex items-center justify-between mb-8 pt-4">
            <button onclick="renderWelcome()" class="p-3 bg-white/5 rounded-full hover:bg-white/10 transition">←</button>
            <h2 class="text-2xl font-bold text-white serif-font">ארכיטיפים של עונג</h2>
            <div class="w-10"></div>
          </div>
          <div class="grid gap-4">
            <button onclick="drawRandomArchetype()" class="glass-panel module-home-card p-6 rounded-3xl hover:border-purple-500/50 transition">
              <h3 class="text-xl font-bold text-white serif-font mb-1">ערבוב ושליפה</h3>
              <p class="text-gray-400 serif-font text-base">ערבוב ויזואלי ולאחריו שליפת קלף.</p>
            </button>
            <button onclick="renderArchetypeDeckBuilder()" class="glass-panel module-home-card p-6 rounded-3xl hover:border-purple-500/50 transition">
              <h3 class="text-xl font-bold text-white serif-font mb-1">חבילה מותאמת</h3>
              <p class="text-gray-400 serif-font text-base">בחירת ממלכות ו/או מועדפים ואז שליפה.</p>
            </button>
            <button onclick="renderArchetypesList()" class="glass-panel module-home-card p-6 rounded-3xl hover:border-purple-500/50 transition">
              <h3 class="text-xl font-bold text-white serif-font mb-1">כל הקלפים</h3>
              <p class="text-gray-400 serif-font text-base">תצוגה מלאה לפי ממלכות עם סימון מועדפים.</p>
            </button>
            <button onclick="showArchetypesAbout()" class="glass-panel module-home-card p-6 rounded-3xl hover:border-purple-500/50 transition">
              <h3 class="text-xl font-bold text-white serif-font mb-1">אודות ארכיטיפים של עונג</h3>
              <p class="text-gray-400 serif-font text-base">רקע והנחיות שימוש במודול.</p>
            </button>
          </div>
        </div>
      `;
    }
    async function openDiagnostics() {
      document.getElementById('app').innerHTML = `
        <div class="screen">
          <div class="back-row">
            <button class="back-btn" onclick="renderWelcome()">←</button>
            <h2 class="screen-title">מצב מערכת</h2>
          </div>
          <div class="panel">
            <p>בדיקות זמינות מודולים וקבצי תשתית בריצה מקומית.</p>
            <div class="utility-row" style="justify-content:flex-start;">

      }
      if (isAndroid()) {
        alert('להתקנה באנדרואיד:\n1. פתחו את תפריט הדפדפן (3 נקודות)\n2. בחרו Add to Home screen או Install app\n3. אשרו התקנה');
        return;
      }
      alert('חלון התקנה עדיין לא זמין בדפדפן זה. נסו Chrome/Edge או הוספה דרך תפריט הדפדפן למסך הבית.');
    }
    async function forceUpdateApp() {
      try {
        if ('caches' in window) {
          const keys = await caches.keys();
          const ownCaches = keys.filter(k => k.startsWith(APP_CACHE_PREFIX));
          await Promise.all(ownCaches.map(k => caches.delete(k)));
        }
        if ('serviceWorker' in navigator) {
          const reg = currentSwReg || (await navigator.serviceWorker.getRegistration());
          if (reg) {
            await reg.update();
            const latestReg = await navigator.serviceWorker.getRegistration();
            if (latestReg && latestReg.waiting) {
              sessionStorage.setItem('pps_reload_after_update', '1');
              latestReg.waiting.postMessage({ type: 'SKIP_WAITING' });
              return;
            }
          }
        }
      } catch (e) {}
      const bust = `?_refresh=${Date.now()}`;
      window.location.href = `${CANONICAL_ORIGIN}${bust}`;
    }

    function clearHebrewLocalData() {
      const keys = [
        'archetype_he_favorites_v1',
        'archetype_he_deck_realms_v1',
        'archetype_he_prefs_v1'
      ];
      keys.forEach(k => localStorage.removeItem(k));
      alert('המידע המקומי של המודול העברי נוקה.');
    }

    function clearPlannerLocalData() {
      const keys = ['planner_sessions_v1'];
      keys.forEach(k => localStorage.removeItem(k));
      alert('נתוני מצפן התשוקות נוקו.');
    }

    function clearHypnoLocalData() {
      const keys = ['he_favorites_v4', 'he_recordings_v4'];
      keys.forEach(k => localStorage.removeItem(k));
      alert('נתוני דפוסי השפה נוקו.');
    }
    function refreshStudio() {
      diagnosticsCache = null;
      const next = `${window.location.pathname}?refresh=${Date.now()}`;
      window.location.replace(next);
    }
    function clearData() {
      const keys = [
        'archetype_he_favorites_v1',
        'archetype_he_deck_realms_v1',
        'archetype_he_prefs_v1',
        'planner_sessions_v1',
        'he_favorites_v4',
        'he_recordings_v4'
      ];
      keys.forEach(k => localStorage.removeItem(k));
      alert('כל הנתונים המקומיים נמחקו מהאפליקציה.');
      renderWelcome();
    }

    function wireEmbedFrame(frameId, srcOrCandidates) {
      const frame = document.getElementById(frameId);
      const status = document.getElementById(`${frameId}-status`);
      if (!frame || !status) return;
      const srcCandidates = Array.isArray(srcOrCandidates) ? srcOrCandidates.filter(Boolean) : [srcOrCandidates].filter(Boolean);
      if (!srcCandidates.length) return;
      let currentIdx = 0;
      let settled = false;
      let timeout = 0;
      const currentSrc = () => srcCandidates[Math.max(0, Math.min(currentIdx, srcCandidates.length - 1))];
      const srcWithBust = () => {
        const src = currentSrc();
        const sep = src.includes('?') ? '&' : '?';
        return `${src}${sep}retryTs=${Date.now()}`;
      };
      function tryNextCandidate() {
        if (currentIdx >= srcCandidates.length - 1) return false;
        currentIdx += 1;
        frame.src = srcWithBust();
        status.classList.remove('hidden');
        status.textContent = 'טוען מודול...';
        armWatchdog();
        return true;
      }
      function showFallback(reason) {
        if (tryNextCandidate()) return;
        settled = false;
        const offlineHint = navigator.onLine ? '' : '<br><strong>נראה שהמכשיר אופליין כרגע.</strong>';
        const reasonText = reason === 'error'
          ? 'אירעה שגיאה בטעינת המודול.'
          : 'המודול נטען יותר מהרגיל.';
        status.innerHTML = `
          ${reasonText}<br>
          אם המסך נשאר ריק, נסו טעינה מחדש.${offlineHint}
          <div style="margin-top:0.8rem; display:flex; gap:0.5rem; justify-content:center; flex-wrap:wrap;">
            <button class="secondary-btn" type="button" id="${frameId}-retry">טעינה מחדש</button>
            <button class="secondary-btn" type="button" id="${frameId}-open">פתיחה בחלון נפרד</button>
          </div>
          <small style="display:block; margin-top:0.55rem; direction:ltr;">${currentSrc()}</small>
        `;
        const retryBtn = document.getElementById(`${frameId}-retry`);
        const openBtn = document.getElementById(`${frameId}-open`);
        if (retryBtn) retryBtn.addEventListener('click', () => {
          status.classList.remove('hidden');
          status.textContent = 'טוען מודול...';
          armWatchdog();
          frame.src = srcWithBust();
        });
        if (openBtn) openBtn.addEventListener('click', () => { window.open(currentSrc(), '_blank', 'noopener'); });
      }
      function armWatchdog() {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
          if (settled) return;
          showFallback('timeout');
        }, 5000);
      }
      armWatchdog();
      frame.addEventListener('load', () => {
        settled = true;
        clearTimeout(timeout);
        status.classList.add('hidden');
      });
      frame.addEventListener('error', () => {
        clearTimeout(timeout);
        showFallback('error');
      });
    }

    async function runDiagnostics(forceRefresh) {
      if (diagnosticsCache && !forceRefresh) {
        renderDiagnosticsResult(diagnosticsCache);
        return;
      }
      const checks = await Promise.all(MODULE_HEALTH_CHECKS.map(async item => {
        try {
          const res = await fetch(item.path, { cache: 'no-store' });
          return { ...item, ok: res.ok, status: res.status, note: res.ok ? 'זמין' : `HTTP ${res.status}` };
        } catch {
          return { ...item, ok: false, status: 0, note: 'לא נגיש (network/error)' };
        }
      }));
      diagnosticsCache = {
        checks,
        online: navigator.onLine,
        checkedAt: new Date().toLocaleTimeString('he-IL')
      };
      renderDiagnosticsResult(diagnosticsCache);
    }

    function renderDiagnosticsResult(payload) {
      const grid = document.getElementById('diagGrid');
      const summary = document.getElementById('diagSummary');
      if (!grid || !summary || !payload) return;
      const okCount = payload.checks.filter(c => c.ok).length;
      const total = payload.checks.length;
      const netClass = payload.online ? 'ok' : 'warn';
      const netLabel = payload.online ? 'אונליין' : 'אופליין';
      summary.innerHTML = `<span class="diag-chip net-badge ${netClass}">${netLabel}</span>בדיקות: ${okCount}/${total} • עודכן: ${payload.checkedAt}`;
      grid.innerHTML = payload.checks.map(row => {
        const chipClass = row.ok ? 'ok' : 'bad';
        const chipText = row.ok ? 'זמין' : 'לא זמין';
        return `
          <div class="diag-row">
            <div>
              <div class="diag-name">${row.name}</div>
              <div class="diag-path">${row.path}</div>
            </div>
            <div style="display:flex; align-items:center; gap:0.45rem;">
              <small class="muted">${row.note}</small>
              <span class="diag-chip ${chipClass}">${chipText}</span>
            </div>
          </div>
        `;
      }).join('');
    }
    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function escapeHtmlArchetype(s) {
      if (s == null || s === '') return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
    async function preloadShellEssentials() {
      const paths = [
        './archetypes_he_data.json',
        './archetypes-he/index.html',
        './דפוסי שפה עברית/index.html'
      ];
      await Promise.all(paths.map(path =>
        fetch(path, { cache: 'no-store' }).catch(() => null)
      ));
    }

    window.addEventListener('online', () => {
      diagnosticsCache = null;
    });
    window.addEventListener('offline', () => {
      diagnosticsCache = null;
    });

    Promise.all([preloadShellEssentials()]).finally(() => {
      renderWelcome();
    });
  </script>
</body>
