    function listPlannerSessions() {
      try {
        const raw = localStorage.getItem(PLANNER_SESSIONS_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(parsed)) return [];
        return parsed
          .filter(s =>
            s &&
            typeof s === 'object' &&
            typeof s.id === 'string' &&
            typeof s.createdAt === 'string' &&
            typeof s.updatedAt === 'string' &&
            s.plannerState &&
            typeof s.plannerState === 'object'
          )
          .map(s => {
            const sessionName = s?.plannerState?.session?.sessionName || '';
            const nickname = s?.plannerState?.session?.nickname || '';
            const fallbackTitle = String(sessionName || nickname || 'Г—ВЎГ—В©Г—Её Г—Е“Г—Е“Г—Вҗ Г—вҖәГ—вҖўГ—ВӘГ—ВЁГ—ВӘ');
            return { ...s, title: String(s.title || fallbackTitle) };
          })
          .sort((a, b) => String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')));
      } catch {
        return [];
      }
    }
    function savePlannerSessions(sessions) {

      const duration = Number.isFinite(durationNum) && durationNum > 0 ? `${durationNum} Г—вҖңГ—В§Г—Ві` : 'ГўвӮ¬вҖқ';

    function wireEmbedFrame(frameId, srcOrCandidates) {
      const frame = document.getElementById(frameId);
      const status = document.getElementById(`${frameId}-status`);
      if (!frame || !status) return;
      const srcCandidates = Array.isArray(srcOrCandidates) ? srcOrCandidates.filter(Boolean) : [srcOrCandidates].filter(Boolean);
      if (!srcCandidates.length) return;
      let currentIdx = 0;
      let settled = false;
      let timeout = 0;
      const currentSrc = () => srcCandidates[Math.max(0, Math.min(currentIdx, srcCandidates.length - 1))];
      const srcWithBust = () => {
        const src = currentSrc();
        const sep = src.includes('?') ? '&' : '?';
        return `${src}${sep}retryTs=${Date.now()}`;
      };
      function tryNextCandidate() {
        if (currentIdx >= srcCandidates.length - 1) return false;
        currentIdx += 1;
        frame.src = srcWithBust();
        status.classList.remove('hidden');
        status.textContent = 'Г—ЛңГ—вҖўГ—ВўГ—Её Г—ЕҫГ—вҖўГ—вҖңГ—вҖўГ—Е“...';
        armWatchdog();
        return true;
      }
      function showFallback(reason) {
        if (tryNextCandidate()) return;
        settled = false;
        const offlineHint = navigator.onLine ? '' : '<br><strong>Г—В Г—ВЁГ—ВҗГ—вҖқ Г—В©Г—вҖқГ—ЕҫГ—вҖәГ—В©Г—в„ўГ—ВЁ Г—ВҗГ—вҖўГ—ВӨГ—Е“Г—в„ўГ—в„ўГ—Её Г—вҖәГ—ВЁГ—вҖҷГ—Вў.</strong>';
        const reasonText = reason === 'error'
          ? 'Г—ВҗГ—в„ўГ—ВЁГ—ВўГ—вҖқ Г—В©Г—вҖҷГ—в„ўГ—ВҗГ—вҖқ Г—вҖҳГ—ЛңГ—ВўГ—в„ўГ—В Г—ВӘ Г—вҖқГ—ЕҫГ—вҖўГ—вҖңГ—вҖўГ—Е“.'
          : 'Г—вҖқГ—ЕҫГ—вҖўГ—вҖңГ—вҖўГ—Е“ Г—В Г—ЛңГ—ВўГ—Её Г—в„ўГ—вҖўГ—ВӘГ—ВЁ Г—ЕҫГ—вҖқГ—ВЁГ—вҖҷГ—в„ўГ—Е“.';
        status.innerHTML = `
          ${reasonText}<br>
          Г—ВҗГ—Вқ Г—вҖқГ—ЕҫГ—ВЎГ—ЕЎ Г—В Г—В©Г—ВҗГ—ВЁ Г—ВЁГ—в„ўГ—В§, Г—В Г—ВЎГ—вҖў Г—ЛңГ—ВўГ—в„ўГ—В Г—вҖқ Г—ЕҫГ—вҖ”Г—вҖңГ—В©.${offlineHint}
          <div style="margin-top:0.8rem; display:flex; gap:0.5rem; justify-content:center; flex-wrap:wrap;">
            <button class="secondary-btn" type="button" id="${frameId}-retry">Г—ЛңГ—ВўГ—в„ўГ—В Г—вҖқ Г—ЕҫГ—вҖ”Г—вҖңГ—В©</button>
            <button class="secondary-btn" type="button" id="${frameId}-open">Г—ВӨГ—ВӘГ—в„ўГ—вҖ”Г—вҖқ Г—вҖҳГ—вҖ”Г—Е“Г—вҖўГ—Её Г—В Г—ВӨГ—ВЁГ—вҖң</button>
          </div>
          <small style="display:block; margin-top:0.55rem; direction:ltr;">${currentSrc()}</small>
        `;
        const retryBtn = document.getElementById(`${frameId}-retry`);
        const openBtn = document.getElementById(`${frameId}-open`);

          status.classList.remove('hidden');
          status.textContent = 'Г—ЛңГ—вҖўГ—ВўГ—Её Г—ЕҫГ—вҖўГ—вҖңГ—вҖўГ—Е“...';
          armWatchdog();
          frame.src = srcWithBust();
        });
        if (openBtn) openBtn.addEventListener('click', () => { window.open(currentSrc(), '_blank', 'noopener'); });
      }
      function armWatchdog() {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
          if (settled) return;
          showFallback('timeout');
        }, 5000);

      frame.addEventListener('load', () => {
        settled = true;

      });

      );
      const checks = await Promise.all(scopedChecks.map(async item => {
        try {
          const res = await fetch(item.path, { cache: 'no-store' });
          return { ...item, ok: res.ok, status: res.status, note: res.ok ? 'Г—вҖ“Г—ЕҫГ—в„ўГ—Её' : `HTTP ${res.status}` };

        }

      checks.push(await checkArchetypesAssetCoverage());

    async function checkArchetypesAssetCoverage() {
      const baseRow = {
        id: 'archetypesAssetCoverage',
        name: 'Г—вҖәГ—в„ўГ—ВЎГ—вҖўГ—в„ў Г—В Г—вҖәГ—ВЎГ—в„ўГ—Вқ Г—ВҗГ—ВЁГ—вҖәГ—в„ўГ—ЛңГ—в„ўГ—ВӨГ—в„ўГ—Вқ (Г—ЕҫГ—вҖ“Г—вҖўГ—вҖқГ—вҖқ)',
        path: './archetypes-he/images/*'
      };
      try {
        const mapRes = await fetch('./archetypes-he/image-map.json', { cache: 'no-store' });
        if (!mapRes.ok) {
          return { ...baseRow, ok: false, status: mapRes.status, note: `image-map HTTP ${mapRes.status}` };
        }
        const mapData = await mapRes.json();
        const rows = Array.isArray(mapData && mapData.images) ? mapData.images : [];
        let detected = 0;
        for (const row of rows) {
          const candidates = assetCandidates(row && row.image);
          let found = false;
          for (const candidate of candidates) {
            if (await pathExists(candidate)) {
              found = true;
              break;
            }
          }
          if (found) detected += 1;
        }
        const expected = rows.length;
        const missing = Math.max(0, expected - detected);
        return {
          ...baseRow,
          ok: missing === 0,
          status: 200,
          note: `Г—вҖ“Г—вҖўГ—вҖқГ—вҖў ${detected}/${expected} ГўвӮ¬Вў Г—вҖ”Г—ВЎГ—ВЁГ—в„ўГ—Вқ ${missing}`
        };
      } catch {
        return { ...baseRow, ok: false, status: 0, note: 'Г—вҖҳГ—вҖңГ—в„ўГ—В§Г—ВӘ Г—вҖәГ—в„ўГ—ВЎГ—вҖўГ—в„ў Г—В Г—вҖәГ—В©Г—Е“Г—вҖқ' };
      }
    }

    async function checkArchetypesBaselineConsistency() {
      const row = {
        id: 'archetypesBaselineConsistency',
        name: 'Г—ВўГ—В§Г—вҖҳГ—в„ўГ—вҖўГ—ВӘ baseline Г—ВҗГ—ВЁГ—вҖәГ—в„ўГ—ЛңГ—в„ўГ—ВӨГ—в„ўГ—Вқ',
        path: './archetypes-he/parity-baseline.json'
      };
      try {
        const [baselineRes, cardsRes, mapRes] = await Promise.all([
          fetch('./archetypes-he/parity-baseline.json', { cache: 'no-store' }),
          fetch('./archetypes_he_data.json', { cache: 'no-store' }),
          fetch('./archetypes-he/image-map.json', { cache: 'no-store' })
        ]);
        if (!baselineRes.ok || !cardsRes.ok || !mapRes.ok) {
          return { ...row, ok: false, status: 0, note: 'Г—В Г—вҖәГ—В©Г—Е“ Г—вҖҳГ—ЛңГ—ВўГ—в„ўГ—В Г—ВӘ baseline/cards/map' };
        }
        const baseline = await baselineRes.json();
        const cardsData = await cardsRes.json();
        const mapData = await mapRes.json();
        const baselineCards = Number(baseline && baseline.enVisualBaselineCards);
        const heCards = Array.isArray(cardsData && cardsData.cards) ? cardsData.cards.length : 0;
        const heMapped = Array.isArray(mapData && mapData.images) ? mapData.images.length : 0;
        const ok = Number.isFinite(baselineCards) && baselineCards === heCards && heMapped === baselineCards;
        return {
          ...row,
          ok,
          status: 200,
          note: `baselineCards=${baselineCards} ГўвӮ¬Вў HE cards=${heCards} ГўвӮ¬Вў HE mapped=${heMapped}`
        };
      } catch {
        return { ...row, ok: false, status: 0, note: 'Г—вҖҳГ—вҖңГ—в„ўГ—В§Г—ВӘ Г—ВўГ—В§Г—вҖҳГ—в„ўГ—вҖўГ—ВӘ baseline Г—В Г—вҖәГ—В©Г—Е“Г—вҖқ' };
      }
    }

    function renderDiagnosticsResult(payload) {
      const grid = document.getElementById('diagGrid');
      const summary = document.getElementById('diagSummary');
      if (!grid || !summary || !payload) return;
      const okCount = payload.checks.filter(c => c.ok).length;
      const total = payload.checks.length;
      const netClass = payload.online ? 'ok' : 'warn';
      const netLabel = payload.online ? 'Г—ВҗГ—вҖўГ—В Г—Е“Г—в„ўГ—в„ўГ—Её' : 'Г—ВҗГ—вҖўГ—ВӨГ—Е“Г—в„ўГ—в„ўГ—Её';
      summary.innerHTML = `<span class="diag-chip net-badge ${netClass}">${netLabel}</span>Г—вҖҳГ—вҖңГ—в„ўГ—В§Г—вҖўГ—ВӘ: ${okCount}/${total} ГўвӮ¬Вў Г—ВўГ—вҖўГ—вҖңГ—вҖәГ—Её: ${payload.checkedAt}`;
      grid.innerHTML = payload.checks.map(row => {
        const chipClass = row.ok ? 'ok' : 'bad';
        const chipText = row.ok ? 'Г—вҖ“Г—ЕҫГ—в„ўГ—Её' : 'Г—Е“Г—Вҗ Г—вҖ“Г—ЕҫГ—в„ўГ—Её';
        return `
          <div class="diag-row">
            <div>
              <div class="diag-name">${row.name}</div>
              <div class="diag-path">${row.path}</div>
            </div>
            <div style="display:flex; align-items:center; gap:0.45rem;">
              <small class="muted">${row.note}</small>
              <span class="diag-chip ${chipClass}">${chipText}</span>
            </div>
          </div>
        `;
      }).join('');
    }
    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function escapeHtmlArchetype(s) {
      return escapeHtml(s);
    }
    async function preloadShellEssentials() {
      const paths = [
        './archetypes_he_data.json',
        './archetypes-he/index.html',
        './Ч“ЧӨЧ•ЧЎЧҷ Ч©ЧӨЧ” ЧўЧ‘ЧЁЧҷЧӘ/index.html'
      ];
      await Promise.all(paths.map(path =>
        fetch(path, { cache: 'no-store' }).catch(() => null)
      ));
    }

    window.addEventListener('online', () => {
      diagnosticsCache = null;
    });
    window.addEventListener('offline', () => {
      diagnosticsCache = null;
    });

    function bootShellRoute() {
      const params = new URLSearchParams(window.location.search);
      const moduleName = params.get('module');
      const view = params.get('view') || 'draw';
      if (moduleName === 'archetypes') {
        if (params.has('view')) {
          openArchetypes(view, false);
          history.replaceState({ screen: 'archetypes', view }, '', window.location.href);
        } else {
          renderArchetypesHome();
          syncArchetypesHomeRoute(true);
        }
      } else {
        renderWelcome(false);
        history.replaceState({ screen: 'welcome' }, '', window.location.href);
      }
    }

    window.addEventListener('popstate', (ev) => {
      const state = ev && ev.state ? ev.state : null;
      if (state && state.screen === 'archetypes') {
        openArchetypes(state.view || 'draw', false);
      } else if (state && state.screen === 'archetypes-home') {
        renderArchetypesHome();
      } else {
        renderWelcome(false);
      }
    });

    Promise.all([preloadShellEssentials()]).finally(() => {
      bootShellRoute();
    });
  </script>
</body>
