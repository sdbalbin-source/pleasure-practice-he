<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pleasure Practice Studio - Hebrew</title>
  <style>
    :root {
      --bg: #050408;
      --panel: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.16);
      --text: #f4f2f8;
      --muted: #c9c3d8;
      --accent: #b787ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: Assistant, "Segoe UI", sans-serif; }
    body {
      background:
        radial-gradient(1200px 560px at 50% 45%, rgba(85, 45, 140, 0.28), transparent 72%),
        radial-gradient(900px 420px at 70% 10%, rgba(120, 70, 170, 0.20), transparent 68%),
        #050408;
    }
    .app { min-height: 100%; padding: 1rem; display: flex; flex-direction: column; gap: 0.9rem; }
    .top {
      border: 1px solid var(--border);
      border-radius: 0.95rem;
      background: var(--panel);
      padding: 0.8rem 0.9rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
    }
    .title { margin: 0; font-size: 1.22rem; font-weight: 700; }
    .btn {
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 0.52rem 0.86rem;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .btn:hover { background: rgba(255,255,255,0.14); }
    .view { flex: 1; min-height: 0; }
    .card {
      border: 1px solid var(--border);
      border-radius: 1rem;
      background: var(--panel);
      padding: 0.95rem;
    }
    .stack { display: grid; gap: 0.72rem; width: min(760px, 100%); margin: 0 auto; }
    .hero { text-align: center; margin: 1rem 0 0.4rem; }
    .hero h2 { margin: 0; font-size: 2rem; color: #e8d9ff; }
    .hero p { margin: 0.45rem 0 0; color: var(--muted); }
    .module-btn {
      width: 100%;
      text-align: center;
      font-size: 1.08rem;
      padding: 1rem;
      border-radius: 0.95rem;
      background: rgba(255,255,255,0.07);
    }
    .frame-wrap { height: calc(100vh - 7.4rem); min-height: 520px; }
    iframe {
      width: 100%;
      height: 100%;
      border: 1px solid var(--border);
      border-radius: 1rem;
      background: #08060d;
    }
    .muted { color: var(--muted); font-size: 0.92rem; }
    @media (max-width: 760px) {
      .title { font-size: 1.05rem; }
      .hero h2 { font-size: 1.65rem; }
      .frame-wrap { height: calc(100vh - 8.2rem); min-height: 480px; }
    }
  </style>
</head>
<body>
  <div class="app" id="app"></div>

  <script>
    const SW_BUILD = '2026-04-25-he-rebuild-1';
    const PLANNER_SESSIONS_KEY = 'planner_sessions_v1';

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderShell(title, content) {
      document.getElementById('app').innerHTML = `
        <div class="top">
          <button class="btn" onclick="renderHome()">חזרה לבית</button>
          <h1 class="title">${escapeHtml(title)}</h1>
          <div style="width:90px;"></div>
        </div>
        <div class="view">${content}</div>
      `;
    }

    function renderHome() {
      renderShell('Pleasure Practice Studio', `
        <div class="hero">
          <h2>סטודיו לתרגול עונג</h2>
          <p>מבנה נקי ל־rebuild. מודול הארכיטיפים הוסר לגמרי ונבנה מחדש בהמשך.</p>
        </div>
        <div class="stack">
          <button class="btn module-btn" onclick="openHypno()">דפוסי שפה עברית</button>
          <button class="btn module-btn" onclick="openPlanner()">מצפן התשוקות</button>
          <div class="card muted">
            סטטוס: מודול הארכיטיפים הוסר במלואו מהמערכת כהכנה לבנייה מחדש מאפס.
          </div>
          <button class="btn" onclick="clearData()">איפוס נתונים מקומיים</button>
        </div>
      `);
      history.replaceState({ screen: 'home' }, '', window.location.pathname);
    }

    function renderEmbedded(title, src) {
      const srcWithVersion = `${src}${src.includes('?') ? '&' : '?'}v=${encodeURIComponent(SW_BUILD)}`;
      renderShell(title, `
        <div class="frame-wrap">
          <iframe src="${escapeHtml(srcWithVersion)}" title="${escapeHtml(title)}"></iframe>
        </div>
      `);
    }

    function openHypno() {
      renderEmbedded('דפוסי שפה עברית', './דפוסי שפה עברית/index.html');
      history.pushState({ screen: 'hypno' }, '', `${window.location.pathname}?module=hypno`);
    }

    function openPlanner() {
      renderEmbedded('מצפן התשוקות', './planner-he/index.html');
      history.pushState({ screen: 'planner' }, '', `${window.location.pathname}?module=planner`);
    }

    function clearData() {
      ['he_favorites_v4', 'he_recordings_v4', PLANNER_SESSIONS_KEY].forEach(k => localStorage.removeItem(k));
      alert('הנתונים המקומיים נמחקו.');
      renderHome();
    }

    window.addEventListener('message', event => {
      const data = event && event.data ? event.data : {};
      if (data.type === 'he_module_back_home') renderHome();
    });

    window.addEventListener('popstate', () => {
      const params = new URLSearchParams(window.location.search);
      const moduleName = params.get('module');
      if (moduleName === 'hypno') openHypno();
      else if (moduleName === 'planner') openPlanner();
      else renderHome();
    });

    (function boot() {
      const params = new URLSearchParams(window.location.search);
      const moduleName = params.get('module');
      if (moduleName === 'hypno') openHypno();
      else if (moduleName === 'planner') openPlanner();
      else renderHome();
    })();
  </script>
</body>
</html>
