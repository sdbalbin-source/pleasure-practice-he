<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050408">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pleasure HE">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>Pleasure Practice Studio - Hebrew</title>
  <style>
    :root {
      --bg: #050408;
      --panel: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.18);
      --text: #f3f2f7;
      --muted: #c6c2d5;
      --accent: #b786ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: "Assistant", "Segoe UI", sans-serif; }
    .hypno-container {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; background: #000;
    }
    .hypno-spiral {
      position: absolute; top: 50%; left: 50%;
      width: 150vmax; height: 150vmax;
      transform-origin: center;
      transform: translate(-50%, -50%);
      animation: spin 13s linear infinite;
      opacity: 0.72;
    }
    .vignette {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(circle, transparent 25%, #000 90%);
      pointer-events: none;
    }
    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(-360deg); }
    }
    .app {
      position: relative; z-index: 2; width: 100%; height: 100%;
      max-width: 1240px; margin: 0 auto;
      display: flex; flex-direction: column;
    }
    .screen {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      padding: 1.25rem;
      gap: 1rem;
      overflow: hidden;
    }
    .title-wrap {
      text-align: center; margin-top: 0.5rem;
    }
    .title-main { margin: 0; font-size: 2.5rem; line-height: 1.04; font-family: "Frank Ruhl Libre", Georgia, serif; letter-spacing: 0.01em; }
    .title-sub { margin: 0.2rem 0 0; font-size: 2.1rem; color: var(--accent); font-family: "Frank Ruhl Libre", Georgia, serif; }
    .subtitle { margin: 0.8rem 0 0; font-size: 0.78rem; letter-spacing: 0.23em; color: var(--muted); text-transform: uppercase; }
    .actions {
      width: min(720px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 0.75rem;
    }
    .card-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 1rem;
      padding: 1rem 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 1.32rem;
      font-weight: 700;
      font-family: "Frank Ruhl Libre", Georgia, serif;
    }
    .card-btn:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-1px); }
    .card-note {
      margin-top: -0.2rem;
      font-size: 0.93rem;
      color: var(--muted);
      font-weight: 400;
      font-family: "Assistant", "Segoe UI", sans-serif;
    }
    .secondary-btn {
      border: 1px solid rgba(183, 134, 255, 0.35);
      background: transparent;
      color: #d8b8ff;
      border-radius: 0.9rem;
      padding: 0.72rem 1rem;
      text-align: center;
      cursor: pointer;
      font-size: 1.03rem;
    }
    .utility-row {
      width: min(720px, 100%);
      margin: 0.3rem auto 0;
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .update-banner {
      margin-top: 0.45rem;
      border: 1px solid rgba(183, 134, 255, 0.36);
      background: rgba(183, 134, 255, 0.12);
      border-radius: 0.9rem;
      padding: 0.55rem 0.7rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      font-size: 0.9rem;
    }
    .back-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .back-btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-radius: 999px;
      width: 42px; height: 42px;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .screen-title {
      margin: 0;
      font-size: 1.35rem;
      font-family: "Frank Ruhl Libre", Georgia, serif;
    }
    .frame-wrap {
      flex: 1; min-height: 0;
      border-radius: 1rem;
      border: 1px solid var(--border);
      overflow: hidden;
      background: #000;
      position: relative;
    }
    iframe {
      width: 100%; height: 100%;
      border: 0; background: #000;
    }
    .embed-status {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1rem;
      background: rgba(6, 5, 12, 0.88);
      color: #ddd8eb;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .embed-status.hidden { display: none; }
    .panel {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 1rem;
      padding: 1rem;
      overflow: auto;
      font-size: 1rem;
      line-height: 1.7;
      color: #ddd8eb;
    }
    .list { margin: 0.2rem 0 0; padding-right: 1rem; }
    .list li { margin-bottom: 0.3rem; }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <div class="hypno-container">
    <svg class="hypno-spiral" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <path fill="none" stroke="#2e1065" stroke-width="8" stroke-linecap="round"
            d="M100,100 m0,0 a4,4 0 0 1 4,4 a8,8 0 0 1 -8,8 a12,12 0 0 1 -12,-12 a16,16 0 0 1 16,-16
               a20,20 0 0 1 20,20 a24,24 0 0 1 -24,24 a28,28 0 0 1 -28,-28 a32,32 0 0 1 32,-32
               a36,36 0 0 1 36,36 a40,40 0 0 1 -40,40 a44,44 0 0 1 -44,-44 a48,48 0 0 1 48,-48
               a52,52 0 0 1 52,52 a56,56 0 0 1 -56,56 a60,60 0 0 1 -60,-60 a64,64 0 0 1 64,-64
               a68,68 0 0 1 68,68 a72,72 0 0 1 -72,72 a76,76 0 0 1 -76,-76 a80,80 0 0 1 80,-80
               a84,84 0 0 1 84,84 a88,88 0 0 1 -88,88 a92,92 0 0 1 -92,-92 a96,96 0 0 1 96,-96
               a100,100 0 0 1 100,100"/>
    </svg>
  </div>
  <div class="vignette"></div>

  <div class="app" id="app"></div>

  <script>
    const screens = {
      home: `
        <div class="screen">
          <div class="title-wrap">
            <h1 class="title-main">Pleasure Practice</h1>
            <h1 class="title-sub">Studio - עברית</h1>
            <p class="subtitle">שלושה כלים משולבים לתרגול</p>
          </div>
          <div class="actions">
            <button class="card-btn" onclick="openHypno()">
              דפוסי שפה היפנוטיים
              <div class="card-note">קלפים, תרגול תמות, מועדפים והקלטות</div>
            </button>
            <button class="card-btn" onclick="openArchetypes()">
              ארכיטיפים של עונג
              <div class="card-note">ערבוב ושליפה פעילים • פריסה ובחירת קלף</div>
            </button>
            <button class="card-btn" onclick="openPlanner()">
              מצפן התשוקות
              <div class="card-note">טופס הסכמות, סיכום ושיתוף</div>
            </button>
            <button class="secondary-btn" onclick="openAbout()">אודות הסטודיו</button>
            <div id="updateBannerHost"></div>
            <div class="utility-row">
              <button class="secondary-btn" id="installAppBtn" onclick="installHebrewApp()" hidden>התקן אפליקציה</button>
            </div>
          </div>
        </div>
      `,
      archetypes: `
        <div class="screen">
          <div class="back-row">
            <button class="back-btn" onclick="renderHome()">←</button>
            <h2 class="screen-title">ארכיטיפים של עונג</h2>
          </div>
          <div class="frame-wrap">
            <iframe src="./archetypes-he/index.html" title="ארכיטיפים של עונג"></iframe>
          </div>
        </div>
      `,
      about: `
        <div class="screen">
          <div class="back-row">
            <button class="back-btn" onclick="renderHome()">←</button>
            <h2 class="screen-title">אודות Pleasure Practice Studio</h2>
          </div>
          <div class="panel">
            <p><strong>למה הסטודיו קיים</strong><br>מרחב שקט לחקירה אירוטית מודעת: לגלות מה רצוי לך, למצוא לזה שפה, ולבנות חוויות שנשענות על הסכמה, בטיחות ונוכחות.</p>
            <p><strong>שלושה כלים - סטודיו אחד</strong></p>
            <ul class="list">
              <li><strong>דפוסי שפה היפנוטיים</strong> - חבילת תרגול לשפה, קצב וטון.</li>
              <li><strong>ארכיטיפים של עונג</strong> - חקירה רגשית-סמלית דרך דימויים וקלפים.</li>
              <li><strong>מצפן התשוקות</strong> - שיח מובנה להסכמות, גבולות, עצימות ואפטרקר.</li>
            </ul>
            <p><strong>על סשה</strong><br>סשה בלבין הוא מחנך לאמנויות אירוטיות ויוצר הסטודיו. העבודה שלו משלבת עומק, תשוקה והסכמה דרך כלים מעשיים לשימוש אישי או זוגי.</p>
            <p><strong>פרטיות</strong><br>הנתונים נשמרים מקומית בדפדפן/מכשיר שלך כברירת מחדל. אם משתמשים במכשיר משותף - מומלץ למחוק מידע מקומי אחרי שימוש.</p>
            <div class="utility-row" style="justify-content:flex-start; margin:0.8rem 0 0;">
              <button class="secondary-btn" onclick="clearHebrewLocalData()">ניקוי מידע מקומי</button>
              <button class="secondary-btn" onclick="clearPlannerLocalData()">ניקוי נתוני מצפן</button>
              <button class="secondary-btn" onclick="clearHypnoLocalData()">ניקוי נתוני היפנו</button>
            </div>
            <p class="muted">השפה העיצובית נשמרת זהה לגרסה האנגלית: רקע ספירלי, זכוכית רכה, טיפוגרפיה אלגנטית ומבנה מודולרי.</p>
          </div>
        </div>
      `
    };
    let deferredInstallPrompt = null;

    function renderHome() {
      document.getElementById('app').innerHTML = screens.home;
      renderUpdateBanner();
      renderInstallButton();
    }
    function openAbout() {
      document.getElementById('app').innerHTML = screens.about;
    }
    function openArchetypes() {
      document.getElementById('app').innerHTML = screens.archetypes;
    }
    function renderEmbeddedModule(title, src, iframeTitle, extraAttrs = '') {
      const frameId = `frame-${Math.random().toString(36).slice(2, 8)}`;
      document.getElementById('app').innerHTML = `
        <div class="screen">
          <div class="back-row">
            <button class="back-btn" onclick="renderHome()">←</button>
            <h2 class="screen-title">${title}</h2>
          </div>
          <div class="frame-wrap">
            <iframe id="${frameId}" src="${src}" title="${iframeTitle}" ${extraAttrs}></iframe>
            <div id="${frameId}-status" class="embed-status">טוען מודול...</div>
          </div>
        </div>
      `;
      wireEmbedFrame(frameId, src);
    }
    function openHypno() {
      renderEmbeddedModule('דפוסי שפה היפנוטיים', './דפוסי שפה עברית/index.html', 'דפוסי שפה עברית');
    }
    function openPlanner() {
      renderEmbeddedModule('מצפן התשוקות', './מצפן התשוקות/index.html', 'מצפן התשוקות', 'allow="web-share"');
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
          function markUpdateReady() {
            sessionStorage.setItem('he_update_ready', '1');
            renderUpdateBanner();
          }
          if (reg.waiting) markUpdateReady();
          reg.addEventListener('updatefound', () => {
            const installing = reg.installing;
            if (!installing) return;
            installing.addEventListener('statechange', () => {
              if (installing.state === 'installed' && navigator.serviceWorker.controller) {
                markUpdateReady();
              }
            });
          });
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (sessionStorage.getItem('he_reload_after_update') === '1') {
              sessionStorage.removeItem('he_reload_after_update');
              sessionStorage.removeItem('he_update_ready');
              window.location.reload();
            }
          });
        }).catch(() => {});
      });
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
      renderInstallButton();
    });

    window.addEventListener('appinstalled', () => {
      deferredInstallPrompt = null;
      renderInstallButton();
    });

    window.addEventListener('message', (e) => {
      if (e.origin !== window.location.origin) return;
      const data = e && e.data ? e.data : null;
      if (!data || typeof data !== 'object') return;
      if (data.type === 'he_module_back_home') {
        renderHome();
      }
    });

    function renderUpdateBanner() {
      const host = document.getElementById('updateBannerHost');
      if (!host) return;
      if (sessionStorage.getItem('he_update_ready') !== '1') {
        host.innerHTML = '';
        return;
      }
      host.innerHTML = `
        <div class="update-banner">
          <span>יש עדכון מוכן לאפליקציה</span>
          <button class="secondary-btn" style="padding:0.42rem 0.7rem;" onclick="applyAppUpdate()">עדכן עכשיו</button>
        </div>
      `;
    }

    function applyAppUpdate() {
      navigator.serviceWorker.getRegistration().then(reg => {
        if (!reg) return;
        sessionStorage.setItem('he_reload_after_update', '1');
        if (reg.waiting) {
          reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        } else {
          reg.update();
          alert('מתבצעת בדיקת עדכון. אם יש גרסה חדשה, לחצו שוב על "עדכן עכשיו".');
        }
      });
    }

    function renderInstallButton() {
      const btn = document.getElementById('installAppBtn');
      if (!btn) return;
      btn.hidden = !deferredInstallPrompt;
    }

    function installHebrewApp() {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      deferredInstallPrompt.userChoice.finally(() => {
        deferredInstallPrompt = null;
        renderInstallButton();
      });
    }

    function clearHebrewLocalData() {
      const keys = [
        'archetype_he_favorites_v1',
        'archetype_he_deck_realms_v1',
        'archetype_he_prefs_v1'
      ];
      keys.forEach(k => localStorage.removeItem(k));
      alert('המידע המקומי של המודול העברי נוקה.');
    }

    function clearPlannerLocalData() {
      const keys = ['planner_sessions_v1', 'scene_planner_sessions_v1'];
      keys.forEach(k => localStorage.removeItem(k));
      alert('נתוני מצפן התשוקות נוקו.');
    }

    function clearHypnoLocalData() {
      const keys = ['he_favorites_v4', 'he_recordings_v4'];
      keys.forEach(k => localStorage.removeItem(k));
      alert('נתוני דפוסי השפה נוקו.');
    }

    function wireEmbedFrame(frameId, src) {
      const frame = document.getElementById(frameId);
      const status = document.getElementById(`${frameId}-status`);
      if (!frame || !status) return;
      let settled = false;
      const timeout = setTimeout(() => {
        if (settled) return;
        status.innerHTML = `המודול נטען יותר מהרגיל.<br>אם המסך נשאר ריק, חזרו למסך הבית ונסו שוב.<br><small>${src}</small>`;
      }, 5000);
      frame.addEventListener('load', () => {
        settled = true;
        clearTimeout(timeout);
        status.classList.add('hidden');
      });
      frame.addEventListener('error', () => {
        settled = true;
        clearTimeout(timeout);
        status.innerHTML = `לא ניתן לטעון את המודול כרגע.<br><small>${src}</small>`;
      });
    }

    renderHome();
  </script>
</body>
</html>
