<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050408">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pleasure HE">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>Pleasure Practice Studio - Hebrew</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050408;
      --panel: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.18);
      --text: #f3f2f7;
      --muted: #c6c2d5;
      --accent: #b786ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: "Assistant", "Segoe UI", sans-serif; }
    .studio-bg-layer {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; background: #000;
    }
    .studio-spiral {
      position: absolute; top: 50%; left: 50%;
      width: 120vmax; height: 120vmax;
      transform-origin: center;
      transform: translate(-50%, -50%);
      animation: spin 13s linear infinite;
      opacity: 0.72;
    }
    .vignette {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(circle, transparent 25%, #000 90%);
      pointer-events: none;
    }
    .glass-panel {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 15px 50px 0 rgba(0, 0, 0, 0.8);
      transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.2s ease;
    }
    button.glass-panel:hover {
      border-color: rgba(168, 85, 247, 0.5);
      box-shadow: 0 15px 50px 0 rgba(0,0,0,0.8), 0 0 30px rgba(147, 51, 234, 0.15);
    }
    .module-home-card {
      text-align: center;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.11) 0%, rgba(255, 255, 255, 0.07) 100%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }
    .module-home-card h3 { letter-spacing: 0.01em; }
    .module-home-card p { max-width: 28ch; margin: 0.35rem auto 0; }
    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(-360deg); }
    }
    .app {
      position: relative; z-index: 2; width: 100%; height: 100%;
      max-width: 1240px; margin: 0 auto;
      display: flex; flex-direction: column;
    }
    .screen {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      padding: 1.25rem;
      gap: 1rem;
      overflow: hidden;
    }
    .title-wrap {
      text-align: center; margin-top: 0.5rem;
    }
    .title-main { margin: 0; font-size: 2.5rem; line-height: 1.04; font-family: "Frank Ruhl Libre", Georgia, serif; letter-spacing: 0.01em; }
    .title-sub { margin: 0.2rem 0 0; font-size: 2.1rem; color: var(--accent); font-family: "Frank Ruhl Libre", Georgia, serif; }
    .subtitle { margin: 0.8rem 0 0; font-size: 0.78rem; letter-spacing: 0.23em; color: var(--muted); text-transform: uppercase; }
    .actions {
      width: min(720px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 0.75rem;
    }
    .card-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 1rem;
      padding: 1rem 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 1.32rem;
      font-weight: 700;
      font-family: "Frank Ruhl Libre", Georgia, serif;
    }
    .card-btn:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-1px); }
    .card-note {
      margin-top: -0.2rem;
      font-size: 0.93rem;
      color: var(--muted);
      font-weight: 400;
      font-family: "Assistant", "Segoe UI", sans-serif;
    }
    .secondary-btn {
      border: 1px solid rgba(183, 134, 255, 0.35);
      background: transparent;
      color: #d8b8ff;
      border-radius: 0.9rem;
      padding: 0.72rem 1rem;
      text-align: center;
      cursor: pointer;
      font-size: 1.03rem;
    }
    .utility-row {
      width: min(720px, 100%);
      margin: 0.3rem auto 0;
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .update-banner {
      margin-top: 0.45rem;
      border: 1px solid rgba(183, 134, 255, 0.36);
      background: rgba(183, 134, 255, 0.12);
      border-radius: 0.9rem;
      padding: 0.55rem 0.7rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      font-size: 0.9rem;
    }
    .back-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .back-btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.14);
      color: var(--text);
      border-radius: 999px;
      min-width: 96px;
      height: 42px;
      padding: 0 0.85rem;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .screen-title {
      margin: 0;
      font-size: 1.35rem;
      font-family: "Frank Ruhl Libre", Georgia, serif;
    }
    .frame-wrap {
      flex: 1; min-height: 0;
      border-radius: 1rem;
      border: 1px solid var(--border);
      overflow: hidden;
      background: #000;
      position: relative;
    }
    iframe {
      width: 100%; height: 100%;
      border: 0; background: #000;
    }
    .embed-status {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1rem;
      background: rgba(6, 5, 12, 0.88);
      color: #ddd8eb;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .embed-status.hidden { display: none; }
    .panel {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 1rem;
      padding: 1rem;
      overflow: auto;
      font-size: 1rem;
      line-height: 1.7;
      color: #ddd8eb;
    }
    .list { margin: 0.2rem 0 0; padding-right: 1rem; }
    .list li { margin-bottom: 0.3rem; }
    .muted { color: var(--muted); }
    .diag-grid {
      display: grid;
      gap: 0.55rem;
      margin-top: 0.6rem;
    }
    .diag-row {
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 0.7rem;
      background: rgba(255,255,255,0.04);
      padding: 0.55rem 0.65rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.7rem;
    }
    .diag-name { font-size: 0.93rem; }
    .diag-path { font-size: 0.8rem; color: var(--muted); direction: ltr; text-align: left; }
    .diag-chip {
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 999px;
      padding: 0.14rem 0.52rem;
      font-size: 0.78rem;
      white-space: nowrap;
    }
    .diag-chip.ok { border-color: rgba(46,204,113,0.5); color: #bff6d7; background: rgba(46,204,113,0.16); }
    .diag-chip.bad { border-color: rgba(255,99,132,0.48); color: #ffd4de; background: rgba(255,99,132,0.14); }
    .diag-chip.warn { border-color: rgba(255,205,86,0.5); color: #ffeab8; background: rgba(255,205,86,0.14); }
    .net-badge { margin-right: 0.35rem; }
    .session-card {
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 0.85rem;
      background: rgba(255,255,255,0.04);
      padding: 0.65rem;
      margin-bottom: 0.55rem;
    }
    .session-actions {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="studio-bg-layer">
    <svg class="studio-spiral" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

            d="M100,100 m0,0 a4,4 0 0 1 4,4 a8,8 0 0 1 -8,8 a12,12 0 0 1 -12,-12 a16,16 0 0 1 16,-16

               a36,36 0 0 1 36,36 a40,40 0 0 1 -40,40 a44,44 0 0 1 -44,-44 a48,48 0 0 1 48,-48

  <div class="app" id="app"></div>

  <script>
    const ABOUT_TEMPLATE = `
        <div class="flex flex-col h-full bg-[#050408] md:max-w-[1240px] md:mx-auto md:w-full">
          <div class="p-6 pt-8 flex items-center gap-4">
            <button onclick="renderWelcome()" class="px-3 py-2 bg-white/15 border border-white/25 rounded-full text-sm font-semibold">חזרה →</button>
            <h2 class="text-2xl font-bold text-white serif-font">אודות Pleasure Practice Studio</h2>

          <div class="flex-1 overflow-y-auto px-6 pb-10 space-y-6 no-scrollbar">
            <div class="bg-white/5 border border-purple-500/20 rounded-2xl p-5">

              <p class="text-gray-300 serif-font text-base leading-relaxed">Pleasure Practice Studio הוא מרחב שקט לחקירה אירוטית מכוונת - מקום לגלות מה את/ה רוצה, למצוא לזה מילים מדויקות, ולעצב חוויות שמרגישות בטוחות, חיות ובאמת שלך.</p>
            </div>
            <div class="bg-white/5 border border-purple-500/20 rounded-2xl p-5">
              <h3 class="text-purple-300 font-bold text-lg serif-font mb-3">כלים בסטודיו</h3>
              <div class="space-y-4 text-gray-300 serif-font text-base leading-relaxed">
                <p><span class="text-white font-bold">דפוסי שפה היפנוטיים</span><br>מודול בבנייה מחדש — התכנים נשמרים, המסלול במעטפת יחזור בהמשך.</p>
                <p><span class="text-white font-bold">ארכיטיפים של עונג</span><br>מודול בבנייה מחדש — התכנים נשמרים, המסלול במעטפת יחזור בהמשך.</p>
                <p><span class="text-white font-bold">מצפן התשוקות</span><br>מרחב מובנה להסכמות ותקשורת בין פרטנרים. לדייק רצונות, גבולות, עוצמה ואפטרקר לפני סשן, כדי להיכנס אליו בביטחון, בהירות ודאגה הדדית.</p>

              <h3 class="text-purple-300 font-bold text-lg serif-font mb-2">על סשה</h3>
              <p class="text-gray-300 serif-font text-base leading-relaxed">סשה בלבין הוא מחנך לאמנויות אירוטיות ויוצר Pleasure Practice Studio. העבודה שלו מחברת בין תשוקה, עומק והסכמה דרך כלים מעשיים שאפשר ליישם בחיים עצמם - לבד או יחד. הגישה משלבת דמיון מודרך, ארכיטיפים ועיצוב תקשורת כדי לתמוך בחוויות אינטימיות מדויקות, בטוחות ומשמעותיות יותר.</p>
            </div>
            <div class="bg-white/5 border border-purple-500/20 rounded-2xl p-5">
              <h3 class="text-purple-300 font-bold text-lg serif-font mb-2">חיבור</h3>
              <p class="text-gray-300 serif-font text-sm leading-relaxed">אפשר לעקוב אחרי <a href="https://www.instagram.com/sasha_balabin_erotic.arts/" target="_blank" rel="noopener noreferrer" class="text-fuchsia-300 underline decoration-fuchsia-400/50 hover:text-fuchsia-200">@sasha_balabin_erotic.arts</a> לתרגולים מתמשכים, תובנות ועדכונים על הצעות חדשות.</p>
            </div>
            <div class="bg-white/5 border border-purple-500/20 rounded-2xl p-5">
              <h3 class="text-purple-300 font-bold text-lg serif-font mb-2">פרטיות</h3>
              <p class="text-gray-300 serif-font text-sm leading-relaxed">הנתונים נשמרים מקומית בדפדפן/מכשיר שלך כברירת מחדל. אם משתמשים במכשיר משותף - מומלץ למחוק נתונים לאחר שימוש.</p>
            </div>
            <div class="pt-2">
              <button onclick="promptInstallApp()" class="install-app-btn w-full py-3 rounded-2xl border border-purple-500/30 text-purple-200 text-sm hover:bg-purple-500/10 transition flex items-center justify-center gap-2 serif-font">
                <i data-lucide="download"></i> התקן אפליקציה למסך הבית
              </button>
              <button onclick="forceUpdateApp()" class="mt-2 w-full py-2 rounded-xl border border-blue-500/30 text-blue-200 text-xs hover:bg-blue-500/10 transition flex items-center justify-center gap-2 font-mono">
                <i data-lucide="refresh-cw"></i> כפיית עדכון עכשיו
              </button>
            </div>
          </div>
        </div>
      `;
    const MODULE_HEALTH_CHECKS = [
      { id: 'shell', name: 'מעטפת עברית', path: './index.html' },
      { id: 'manifest', name: 'Manifest', path: './manifest.json' },
      { id: 'sw', name: 'Service Worker', path: './sw.js' },
      { id: 'planner', name: 'מודול מצפן תשוקות', path: './planner-he/index.html' }
    ];
    const SW_BUILD = '2026-04-25-he-strip-hypno-shell';
    const APP_CACHE_PREFIX = 'pleasure-he-v';
    const CANONICAL_ORIGIN = 'https://pleasure-practice-he.pages.dev';
    const PLANNER_SESSIONS_KEY = 'planner_sessions_v1';
    const AppState = { plannerSessions: [] };
    let deferredInstallPrompt = null;
    let currentSwReg = null;
    let diagnosticsCache = null;
    let plannerPendingReturnTo = null;

    function renderWelcome(pushHistory = true) {
      document.getElementById('app').innerHTML = `
        <div class="flex flex-col items-center justify-center h-full p-6 text-center relative z-10">
          <div class="mb-8 relative">
            <div class="absolute inset-0 bg-purple-500 blur-3xl opacity-20 rounded-full animate-pulse"></div>
            <h1 class="text-5xl font-bold serif-font text-white mb-2 tracking-tight relative z-10">Pleasure Practice</h1>
            <h1 class="text-5xl font-bold serif-font text-purple-400 mb-4 tracking-tight relative z-10">Studio</h1>
            <p class="text-gray-400 mt-2 text-xs tracking-[0.25em] uppercase" style="font-family:'DM Mono',monospace">מצפן התשוקות פעיל · מודולים נוספים בבנייה מחדש</p>
          </div>

          <button onclick="renderKinkyScenePlannerHome()" class="w-full max-w-sm py-5 px-5 bg-white/10 border border-blue-300/20 rounded-2xl text-white text-xl font-bold hover:bg-white/20 transition-all mb-5 flex items-center justify-center shadow-lg shadow-purple-900/20 serif-font text-center">
            מצפן התשוקות
          </button>

          <button onclick="showAbout()" class="w-full max-w-xs py-3 rounded-2xl border border-purple-500/20 text-purple-300 text-base hover:bg-purple-500/10 transition flex items-center justify-center serif-font">

          </button>

          <button onclick="clearData()" class="absolute bottom-6 text-xs text-gray-600 hover:text-red-400 transition opacity-60 hover:opacity-100">
            איפוס כל הנתונים
          </button>
        </div>
      `;
      lucide.createIcons();
      if (pushHistory) {
        const url = new URL(window.location.href);
        url.searchParams.delete('module');
        url.searchParams.delete('view');
        history.pushState({ screen: 'welcome' }, '', url.toString());
      }
    }
    function showAbout() {
      document.getElementById('app').innerHTML = ABOUT_TEMPLATE;
      lucide.createIcons();
      updateInstallButtons();
    }
    async function openDiagnostics() {
      document.getElementById('app').innerHTML = `
        <div class="screen">
          <div class="back-row">
            <button class="back-btn" onclick="renderWelcome()">חזרה →</button>
            <h2 class="screen-title">מצב מערכת</h2>
          </div>
          <div class="panel">
            <p>בדיקות זמינות לקבצי תשתית ולמצפן התשוקות בריצה מקומית.</p>
            <div class="utility-row" style="justify-content:flex-start;">
              <button class="secondary-btn" onclick="runDiagnostics(true)">Recheck App State</button>
            </div>
            <div id="diagSummary" class="muted" style="margin-top:0.6rem;">טוען בדיקות...</div>
            <div id="diagGrid" class="diag-grid"></div>
          </div>
        </div>
      `;
      await runDiagnostics(false);
    }
    function drawRandomArchetype() {}
    function renderArchetypeDeckBuilder() {}
    function renderArchetypesList() {}
    function showArchetypesAbout() {}
    function openPlanner() { renderKinkyScenePlannerHome(); }
    function listPlannerSessions() {
      try {
        const raw = localStorage.getItem(PLANNER_SESSIONS_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(parsed)) return [];
        return parsed
          .filter(s =>
            s &&
            typeof s === 'object' &&
            typeof s.id === 'string' &&
            typeof s.createdAt === 'string' &&
            typeof s.updatedAt === 'string' &&
            s.plannerState &&
            typeof s.plannerState === 'object'
          )
          .map(s => {
            const sessionName = s?.plannerState?.session?.sessionName || '';
            const nickname = s?.plannerState?.session?.nickname || '';
            const fallbackTitle = String(sessionName || nickname || 'סשן ללא כותרת');
            return { ...s, title: String(s.title || fallbackTitle) };
          })
          .sort((a, b) => String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')));
      } catch {
        return [];
      }
    }
    function savePlannerSessions(sessions) {
      const clean = Array.isArray(sessions) ? sessions.slice(0, 100) : [];
      localStorage.setItem(PLANNER_SESSIONS_KEY, JSON.stringify(clean));
      AppState.plannerSessions = clean;
    }
    function plannerSessionDate(s) {
      const raw = String((s && (s.updatedAt || s.createdAt)) || '');
      const dt = new Date(raw);
      if (Number.isNaN(dt.getTime())) return String(raw || '');
      return dt.toLocaleString('he-IL');
    }
    function plannerSessionMeta(s) {
      const snap = s && s.summarySnapshot && typeof s.summarySnapshot === 'object' ? s.summarySnapshot : {};
      const roleRaw = String(snap.role || '').trim().toLowerCase();
      const roleMap = { dom: 'דום', sub: 'סאב', switch: 'סוויץ׳' };
      const role = roleRaw ? (roleMap[roleRaw] || roleRaw) : '—';
      const durationNum = Number(snap.duration || 0);
      const duration = Number.isFinite(durationNum) && durationNum > 0 ? `${durationNum} דק׳` : '—';
      return `${role} · ${duration}`;
    }
    function renderKinkyScenePlannerHome() {
      const savedSessionsCount = listPlannerSessions().length;
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="flex flex-col h-full p-6 bg-black/10">
          <div class="flex items-center justify-between mb-8 pt-4">
            <button onclick="renderWelcome()" class="px-3 py-2 bg-white/15 border border-white/25 rounded-full hover:bg-white/20 transition text-sm font-semibold">חזרה →</button>
            <h2 class="text-2xl font-bold text-white serif-font">מצפן התשוקות</h2>
            <div class="w-10"></div>
          </div>
          <div class="grid gap-4">
            <button onclick="startPlannerSession()" class="glass-panel module-home-card p-6 rounded-3xl hover:border-purple-500/50 transition">
              <h3 class="text-xl font-bold text-white serif-font mb-1">סשן הסכמות חדש</h3>
              <p class="text-gray-400 serif-font text-base">פתיחת תהליך חדש לבירור גבולות, רצונות והסכמות לפני מפגש.</p>
            </button>
            <button onclick="renderPlannerSessions()" class="glass-panel module-home-card p-6 rounded-3xl hover:border-purple-500/50 transition">
              <h3 class="text-xl font-bold text-white serif-font mb-1">הסשנים שלי</h3>
                <p class="text-gray-400 serif-font text-base">צפייה, המשך וניהול של סשנים שנשמרו.</p>
              <p class="text-gray-400 text-xs text-center mt-2">${savedSessionsCount} סשנים שמורים</p>

      history.replaceState({ screen: 'welcome' }, '', url.toString());
    }

    window.addEventListener('popstate', () => {
      const params = new URLSearchParams(window.location.search);
      const moduleName = params.get('module');
      if (moduleName === 'planner') {
        renderKinkyScenePlannerHome();
        return;
      }
      if (moduleName === 'hypno') {
        renderWelcome(false);
        return;
      }
      renderWelcome(false);
    });

    Promise.all([preloadShellEssentials()]).finally(() => {
      bootShellRoute();
    });
  </script>
</body>
</html>
