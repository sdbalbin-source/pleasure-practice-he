<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050408">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pleasure HE">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>Pleasure Practice Studio - Hebrew</title>
  <style>
    :root {
      --bg: #050408;
      --panel: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.18);
      --text: #f3f2f7;
      --muted: #c6c2d5;
      --accent: #b786ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: "Assistant", "Segoe UI", sans-serif; }
    .hypno-container {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; background: #000;
    }
    .hypno-spiral {
      position: absolute; top: 50%; left: 50%;
      width: 150vmax; height: 150vmax;
      transform-origin: center;
      transform: translate(-50%, -50%);
      animation: spin 13s linear infinite;
      opacity: 0.72;
    }
    .vignette {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(circle, transparent 25%, #000 90%);
      pointer-events: none;
    }
    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(-360deg); }
    }
    .app {
      position: relative; z-index: 2; width: 100%; height: 100%;
      max-width: 1240px; margin: 0 auto;
      display: flex; flex-direction: column;
    }
    .screen {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      padding: 1.25rem;
      gap: 1rem;
      overflow: hidden;
    }
    .title-wrap {
      text-align: center; margin-top: 0.5rem;
    }
    .title-main { margin: 0; font-size: 2.5rem; line-height: 1.04; font-family: "Frank Ruhl Libre", Georgia, serif; letter-spacing: 0.01em; }
    .title-sub { margin: 0.2rem 0 0; font-size: 2.1rem; color: var(--accent); font-family: "Frank Ruhl Libre", Georgia, serif; }
    .subtitle { margin: 0.8rem 0 0; font-size: 0.78rem; letter-spacing: 0.23em; color: var(--muted); text-transform: uppercase; }
    .actions {
      width: min(720px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 0.75rem;
    }
    .card-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 1rem;
      padding: 1rem 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 1.32rem;
      font-weight: 700;
      font-family: "Frank Ruhl Libre", Georgia, serif;
    }
    .card-btn:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-1px); }
    .card-note {
      margin-top: -0.2rem;
      font-size: 0.93rem;
      color: var(--muted);
      font-weight: 400;
      font-family: "Assistant", "Segoe UI", sans-serif;
    }
    .secondary-btn {
      border: 1px solid rgba(183, 134, 255, 0.35);
      background: transparent;
      color: #d8b8ff;
      border-radius: 0.9rem;
      padding: 0.72rem 1rem;
      text-align: center;
      cursor: pointer;
      font-size: 1.03rem;
    }
    .utility-row {
      width: min(720px, 100%);
      margin: 0.3rem auto 0;
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .update-banner {
      margin-top: 0.45rem;
      border: 1px solid rgba(183, 134, 255, 0.36);
      background: rgba(183, 134, 255, 0.12);
      border-radius: 0.9rem;
      padding: 0.55rem 0.7rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      font-size: 0.9rem;
    }
    .back-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .back-btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-radius: 999px;
      width: 42px; height: 42px;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .screen-title {
      margin: 0;
      font-size: 1.35rem;
      font-family: "Frank Ruhl Libre", Georgia, serif;
    }
    .frame-wrap {
      flex: 1; min-height: 0;
      border-radius: 1rem;
      border: 1px solid var(--border);
      overflow: hidden;
      background: #000;
      position: relative;
    }
    iframe {
      width: 100%; height: 100%;
      border: 0; background: #000;
    }
    .embed-status {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1rem;
      background: rgba(6, 5, 12, 0.88);
      color: #ddd8eb;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .embed-status.hidden { display: none; }
    .panel {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 1rem;
      padding: 1rem;
      overflow: auto;
      font-size: 1rem;
      line-height: 1.7;
      color: #ddd8eb;
    }
    .list { margin: 0.2rem 0 0; padding-right: 1rem; }
    .list li { margin-bottom: 0.3rem; }
    .muted { color: var(--muted); }
    .diag-grid {
      display: grid;
      gap: 0.55rem;
      margin-top: 0.6rem;
    }
    .diag-row {
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 0.7rem;
      background: rgba(255,255,255,0.04);
      padding: 0.55rem 0.65rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.7rem;
    }
    .diag-name { font-size: 0.93rem; }
    .diag-path { font-size: 0.8rem; color: var(--muted); direction: ltr; text-align: left; }
    .diag-chip {
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 999px;
      padding: 0.14rem 0.52rem;
      font-size: 0.78rem;
      white-space: nowrap;
    }
    .diag-chip.ok { border-color: rgba(46,204,113,0.5); color: #bff6d7; background: rgba(46,204,113,0.16); }
    .diag-chip.bad { border-color: rgba(255,99,132,0.48); color: #ffd4de; background: rgba(255,99,132,0.14); }
    .diag-chip.warn { border-color: rgba(255,205,86,0.5); color: #ffeab8; background: rgba(255,205,86,0.14); }
    .net-badge { margin-right: 0.35rem; }
    .session-card {
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 0.85rem;
      background: rgba(255,255,255,0.04);
      padding: 0.65rem;
      margin-bottom: 0.55rem;
    }
    .session-actions {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="hypno-container">
    <svg class="hypno-spiral" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <path fill="none" stroke="#2e1065" stroke-width="8" stroke-linecap="round"
            d="M100,100 m0,0 a4,4 0 0 1 4,4 a8,8 0 0 1 -8,8 a12,12 0 0 1 -12,-12 a16,16 0 0 1 16,-16
               a20,20 0 0 1 20,20 a24,24 0 0 1 -24,24 a28,28 0 0 1 -28,-28 a32,32 0 0 1 32,-32
               a36,36 0 0 1 36,36 a40,40 0 0 1 -40,40 a44,44 0 0 1 -44,-44 a48,48 0 0 1 48,-48
               a52,52 0 0 1 52,52 a56,56 0 0 1 -56,56 a60,60 0 0 1 -60,-60 a64,64 0 0 1 64,-64
               a68,68 0 0 1 68,68 a72,72 0 0 1 -72,72 a76,76 0 0 1 -76,-76 a80,80 0 0 1 80,-80
               a84,84 0 0 1 84,84 a88,88 0 0 1 -88,88 a92,92 0 0 1 -92,-92 a96,96 0 0 1 96,-96
               a100,100 0 0 1 100,100"/>
    </svg>
  </div>
  <div class="vignette"></div>

  <div class="app" id="app"></div>

  <script>
    const screens = {
      home: `
        <div class="screen">
          <div class="title-wrap">
            <h1 class="title-main">Pleasure Practice</h1>
            <h1 class="title-sub">Studio - עברית</h1>
            <p class="subtitle">שלושה כלים משולבים לתרגול</p>
          </div>
          <div class="actions">
            <button class="card-btn" onclick="openHypno()">
              דפוסי שפה היפנוטיים
              <div class="card-note">קלפים, תרגול תמות, מועדפים והקלטות</div>
            </button>
            <button class="card-btn" onclick="openArchetypes()">
              ארכיטיפים של עונג
              <div class="card-note">ערבוב ושליפה פעילים • פריסה ובחירת קלף</div>
            </button>
            <button class="card-btn" onclick="openPlanner()">
              מצפן התשוקות
              <div class="card-note">טופס הסכמות, סיכום ושיתוף</div>
            </button>
            <button class="secondary-btn" onclick="openAbout()">אודות הסטודיו</button>
            <button class="secondary-btn" onclick="openDiagnostics()">מצב מערכת</button>
            <div id="updateBannerHost"></div>
            <div class="utility-row">
              <button class="secondary-btn" id="installAppBtn" onclick="installHebrewApp()" hidden>התקן אפליקציה</button>
            </div>
          </div>
        </div>
      `,
      archetypes: `
        <div class="screen">
          <div class="back-row">
            <button class="back-btn" onclick="renderHome()">←</button>
            <h2 class="screen-title">ארכיטיפים של עונג</h2>
          </div>
          <div class="frame-wrap">
            <iframe src="./archetypes-he/index.html" title="ארכיטיפים של עונג"></iframe>
          </div>
        </div>
      `,
      about: `
        <div class="screen">
          <div class="back-row">
            <button class="back-btn" onclick="renderHome()">←</button>
            <h2 class="screen-title">אודות Pleasure Practice Studio</h2>
          </div>
          <div class="panel">
            <p><strong>למה הסטודיו קיים</strong><br>מרחב שקט לחקירה אירוטית מודעת - לגלות מה רצוי לך, למצוא לזה שפה, ולבנות חוויות שנשענות על הסכמה, בטיחות ונוכחות.</p>
            <p><strong>שלושה כלים - סטודיו אחד</strong></p>
            <ul class="list">
              <li><strong>דפוסי שפה היפנוטיים</strong> - חבילת תרגול לשפה, קצב וטון.</li>
              <li><strong>ארכיטיפים של עונג</strong> - חקירה רגשית-סמלית דרך דימויים וקלפים.</li>
              <li><strong>מצפן התשוקות</strong> - שיח מובנה להסכמות, גבולות, עצימות ואפטרקר.</li>
            </ul>
            <p><strong>על סשה</strong><br>סשה בלבין הוא מחנך לאמנויות אירוטיות ויוצר הסטודיו. העבודה שלו משלבת עומק, תשוקה והסכמה דרך כלים מעשיים לשימוש אישי או זוגי - כדי להפוך שיח אינטימי למדויק, בטוח ובר־יישום.</p>
            <p><strong>פרטיות</strong><br>הנתונים נשמרים מקומית בדפדפן/מכשיר שלך כברירת מחדל. אם משתמשים במכשיר משותף - מומלץ למחוק נתונים לאחר שימוש.</p>
            <div class="utility-row" style="justify-content:flex-start; margin:0.8rem 0 0;">
              <button class="secondary-btn" onclick="refreshStudio()">רענון כללי</button>
              <button class="secondary-btn" onclick="applyAppUpdate()">כפיית עדכון עכשיו</button>
            </div>
            <p class="muted">השפה העיצובית נשמרת זהה לגרסה האנגלית: רקע ספירלי, זכוכית רכה, טיפוגרפיה אלגנטית ומבנה מודולרי.</p>
          </div>
        </div>
      `
    };
    const MODULE_HEALTH_CHECKS = [
      { id: 'shell', name: 'מעטפת עברית', path: './index.html' },
      { id: 'manifest', name: 'Manifest', path: './manifest.json' },
      { id: 'sw', name: 'Service Worker', path: './sw.js' },
      { id: 'archetypes', name: 'מודול ארכיטיפים', path: './archetypes-he/index.html' },
      { id: 'archetypesData', name: 'דאטה ארכיטיפים', path: './archetypes_he_data.json' },
      { id: 'hypno', name: 'מודול דפוסי שפה', path: './דפוסי שפה עברית/index.html' },
      { id: 'planner', name: 'מודול מצפן תשוקות', path: './מצפן התשוקות/index.html' }
    ];
    const SW_BUILD = '2026-04-23-he-1';
    const PLANNER_SESSIONS_KEY = 'planner_sessions_v1';
    let deferredInstallPrompt = null;
    let diagnosticsCache = null;
    let plannerBackTarget = null;

    function renderHome() {
      document.getElementById('app').innerHTML = screens.home;
      renderUpdateBanner();
      renderInstallButton();
    }
    function openAbout() {
      document.getElementById('app').innerHTML = screens.about;
    }
    function openArchetypes() {
      document.getElementById('app').innerHTML = screens.archetypes;
    }
    async function openDiagnostics() {
      document.getElementById('app').innerHTML = `
        <div class="screen">
          <div class="back-row">
            <button class="back-btn" onclick="renderHome()">←</button>
            <h2 class="screen-title">מצב מערכת</h2>
          </div>
          <div class="panel">
            <p>בדיקות זמינות מודולים וקבצי תשתית בריצה מקומית.</p>
            <div class="utility-row" style="justify-content:flex-start;">
              <button class="secondary-btn" onclick="runDiagnostics(true)">Recheck App State</button>
            </div>
            <div id="diagSummary" class="muted" style="margin-top:0.6rem;">טוען בדיקות...</div>
            <div id="diagGrid" class="diag-grid"></div>
          </div>
        </div>
      `;
      await runDiagnostics(false);
    }
    function renderEmbeddedModule(title, src, iframeTitle, extraAttrs = '') {
      const frameId = `frame-${Math.random().toString(36).slice(2, 8)}`;
      document.getElementById('app').innerHTML = `
        <div class="screen">
          <div class="back-row">
            <button class="back-btn" onclick="renderHome()">←</button>
            <h2 class="screen-title">${title}</h2>
          </div>
          <div class="frame-wrap">
            <iframe id="${frameId}" src="${src}" title="${iframeTitle}" ${extraAttrs}></iframe>
            <div id="${frameId}-status" class="embed-status">טוען מודול...</div>
          </div>
        </div>
      `;
      wireEmbedFrame(frameId, src);
    }
    function openHypno() {
      renderEmbeddedModule('דפוסי שפה היפנוטיים', './דפוסי שפה עברית/index.html', 'דפוסי שפה עברית');
    }
    function openPlanner() {
      renderPlannerHome();
    }
    function listPlannerSessions() {
      try {
        const raw = localStorage.getItem(PLANNER_SESSIONS_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(parsed)) return [];
        return parsed
          .map(s => {
            if (!s || typeof s !== 'object') return s;
            const session = (((s.plannerState || {}).session) || {});
            return {
              ...s,
              sessionName: s.sessionName || session.sessionName || '',
              role: s.role || session.role || null,
              duration: Number.isFinite(Number(s.duration)) ? Number(s.duration) : Number(session.duration || 0) || null
            };
          })
          .filter(s => s && typeof s === 'object' && typeof s.id === 'string' && s.plannerState && typeof s.plannerState === 'object')
          .sort((a, b) => String(b.updatedAt || b.createdAt || '').localeCompare(String(a.updatedAt || a.createdAt || '')));
      } catch {
        return [];
      }
    }
    function plannerSessionTitle(s) {
      const explicit = String((s && s.sessionName) || '').trim();
      if (explicit) return explicit;
      const nested = String((((s && s.plannerState) || {}).session || {}).sessionName || '').trim();
      if (nested) return nested;
      const nick = String((s && s.nickname) || '').trim();
      return nick || 'סשן ללא כותרת';
    }
    function plannerSessionDate(s) {
      const raw = String((s && (s.updatedAt || s.createdAt)) || '');
      if (!raw) return 'ללא תאריך';
      const dt = new Date(raw);
      if (Number.isNaN(dt.getTime())) return 'ללא תאריך';
      return dt.toLocaleString('he-IL', { year: 'numeric', month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }
    function plannerSessionMeta(s) {
      const roleRaw = String((s && s.role) || ((((s && s.plannerState) || {}).session || {}).role) || '').trim();
      const durationRaw = Number((s && s.duration) || ((((s && s.plannerState) || {}).session || {}).duration) || 0);
      const roleMap = { dom: 'דום', sub: 'סאב', switch: 'סוויץ׳' };
      const role = roleMap[roleRaw] || 'לא הוגדר תפקיד';
      const duration = Number.isFinite(durationRaw) && durationRaw > 0 ? `${durationRaw} דק׳` : 'משך לא הוגדר';
      return `${role} • ${duration}`;
    }
    function renderPlannerHome() {
      const savedSessionsCount = listPlannerSessions().length;
      document.getElementById('app').innerHTML = `
        <div class="screen">
          <div class="back-row">
            <button class="back-btn" onclick="renderHome()">←</button>
            <h2 class="screen-title">מצפן התשוקות</h2>
          </div>
          <div class="actions" style="width:min(920px,100%);">
            <button class="card-btn" onclick="openPlannerNewSession()">
              סשן הסכמות חדש
              <div class="card-note">פתיחת תהליך חדש לבירור גבולות, רצונות והסכמות לפני מפגש.</div>
            </button>
            <button class="card-btn" onclick="renderPlannerSessions()">
              הסשנים שלי
              <div class="card-note">צפייה, המשך עריכה ושיתוף של סשנים שנשמרו (${savedSessionsCount}).</div>
            </button>
            <button class="card-btn" onclick="renderPlannerAbout()">
              אודות מצפן התשוקות
              <div class="card-note">רקע מלא, עקרונות בטיחות והנחיות שימוש נכונות.</div>
            </button>
          </div>
        </div>
      `;
    }
    function renderPlannerAbout() {
      document.getElementById('app').innerHTML = `
        <div class="screen">
          <div class="back-row">
            <button class="back-btn" onclick="renderPlannerHome()">←</button>
            <h2 class="screen-title">אודות מצפן התשוקות</h2>
          </div>
          <div class="panel">
            <p><strong>מצפן התשוקות</strong> הוא כלי עבודה לשיחה מינית־רגשית לפני סשן, ולא תחליף לשיקול דעת, תקשורת בזמן אמת או אחריות הדדית.</p>
            <details open>
              <summary><strong>למה להשתמש במצפן?</strong></summary>
              <ul class="list">
                <li>לייצר שיחה ברורה על גבולות, רצונות, עצימות ואפטר־קר לפני שמתחילים.</li>
                <li>להפוך הסכמות לאסופה כתובה שאפשר לחזור אליה לפני/אחרי הסשן.</li>
                <li>לזהות מראש נקודות רגישות, טריגרים, ומסלולי עצירה בטוחים.</li>
              </ul>
            </details>
            <details>
              <summary><strong>מסגרות הסכמה מומלצות</strong></summary>
              <ul class="list">
                <li><strong>SSC</strong> - בטוח, שפוי ובהסכמה.</li>
                <li><strong>RACK</strong> - מודעות לסיכון והסכמה מודעת.</li>
                <li><strong>FRIES</strong> - הסכמה חופשית, הפיכה, מודעת, נלהבת וספציפית.</li>
              </ul>
            </details>
            <details>
              <summary><strong>תקשורת ובטיחות בזמן סשן</strong></summary>
              <ul class="list">
                <li>הגדירו מילת ביטחון ומחוות עצירה לפני כל משחק.</li>
                <li>תקשרו תוך כדי - גם כש״הכול נראה בסדר״.</li>
                <li>אפשר לשנות, לעצור או למשוך הסכמה בכל שלב.</li>
              </ul>
            </details>
            <details>
              <summary><strong>מה חשוב לזכור לגבי נתונים ופרטיות</strong></summary>
              <ul class="list">
                <li>הנתונים נשמרים מקומית בדפדפן של המכשיר הנוכחי.</li>
                <li>במכשיר משותף מומלץ למחוק נתונים בסיום.</li>
                <li>שיתוף PDF/קישור הוא באחריות המשתמש/ת בלבד.</li>
              </ul>
            </details>
            <p class="muted">הסכמה היא תהליך מתמשך - לא אירוע חד־פעמי. מומלץ לבצע צ׳ק־אין גם במהלך הסשן וגם אחריו.</p>
          </div>
        </div>
      `;
    }
    function openPlannerNewSession() {
      const sid = `planner-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
      renderPlannerEmbed('new', sid, null, null, 'home');
    }
    function renderPlannerSessions() {
      const sessions = listPlannerSessions();
      const sessionsTitle = `הסשנים שלי (${sessions.length})`;
      const emptyHtml = `
        <div class="panel">
          <p>עדיין אין סשנים שמורים.</p>
          <div class="utility-row" style="justify-content:flex-start; margin:0.7rem 0 0;">
            <button class="secondary-btn" onclick="openPlannerNewSession()">התחלת סשן חדש</button>
            <button class="secondary-btn" onclick="renderPlannerHome()">חזרה</button>
          </div>
        </div>
      `;
      if (!sessions.length) {
        document.getElementById('app').innerHTML = `
          <div class="screen">
            <div class="back-row">
              <button class="back-btn" onclick="renderPlannerHome()">←</button>
              <h2 class="screen-title">${sessionsTitle}</h2>
            </div>
            ${emptyHtml}
          </div>
        `;
        return;
      }
      const cards = sessions.map(s => `
        <div class="session-card">
          <div><strong>${escapeHtml(plannerSessionTitle(s))}</strong></div>
          <div class="muted" style="font-size:0.84rem; margin-top:0.25rem;">${escapeHtml(plannerSessionDate(s))}</div>
          <div class="muted" style="font-size:0.84rem; margin-top:0.2rem;">${escapeHtml(plannerSessionMeta(s))}</div>
          <div class="session-actions">
            <button class="secondary-btn" onclick="openPlannerSummary('${escapeHtml(String(s.id))}')">פתיחה</button>
            <button class="secondary-btn" onclick="openPlannerSession('${escapeHtml(String(s.id))}')">עריכה</button>
            <button class="secondary-btn" onclick="renamePlannerSession('${escapeHtml(String(s.id))}')">שינוי שם</button>
            <button class="secondary-btn" onclick="deletePlannerSession('${escapeHtml(String(s.id))}')">מחיקה</button>
            <button class="secondary-btn" onclick="sharePlannerSessionPdf('${escapeHtml(String(s.id))}')">שיתוף PDF</button>
          </div>
        </div>
      `).join('');
      document.getElementById('app').innerHTML = `
        <div class="screen">
          <div class="back-row">
            <button class="back-btn" onclick="renderPlannerHome()">←</button>
            <h2 class="screen-title">${sessionsTitle}</h2>
          </div>
          <div class="panel">${cards}</div>
        </div>
      `;
    }
    function getPlannerSessionById(sessionId) {
      return listPlannerSessions().find(s => s && String(s.id) === String(sessionId)) || null;
    }
    function openPlannerSession(sessionId) {
      if (!getPlannerSessionById(sessionId)) {
        alert('הסשן לא נמצא. ייתכן שנמחק מהמכשיר.');
        renderPlannerSessions();
        return;
      }
      renderPlannerEmbed('existing', sessionId, null, null, 'sessions');
    }
    function openPlannerSummary(sessionId) {
      if (!getPlannerSessionById(sessionId)) {
        alert('הסשן לא נמצא. ייתכן שנמחק מהמכשיר.');
        renderPlannerSessions();
        return;
      }
      renderPlannerEmbed('existing', sessionId, 'chapter-8', null, 'sessions');
    }
    function sharePlannerSessionPdf(sessionId) {
      if (!getPlannerSessionById(sessionId)) {
        alert('הסשן לא נמצא. ייתכן שנמחק מהמכשיר.');
        renderPlannerSessions();
        return;
      }
      renderPlannerEmbed('existing', sessionId, 'chapter-8', 'pdf', 'sessions');
    }
    function renamePlannerSession(sessionId) {
      const rows = listPlannerSessions();
      const ix = rows.findIndex(s => s && String(s.id) === String(sessionId));
      if (ix < 0) {
        alert('הסשן לא נמצא.');
        return renderPlannerSessions();
      }
      const current = plannerSessionTitle(rows[ix]);
      const next = prompt('שם חדש לסשן:', current);
      if (next === null) return;
      const clean = String(next || '').trim();
      if (!clean) return;
      rows[ix].sessionName = clean;
      if (!rows[ix].plannerState || typeof rows[ix].plannerState !== 'object') rows[ix].plannerState = {};
      if (!rows[ix].plannerState.session || typeof rows[ix].plannerState.session !== 'object') rows[ix].plannerState.session = {};
      rows[ix].plannerState.session.sessionName = clean;
      rows[ix].updatedAt = new Date().toISOString();
      localStorage.setItem(PLANNER_SESSIONS_KEY, JSON.stringify(rows));
      renderPlannerSessions();
    }
    function deletePlannerSession(sessionId) {
      const rows = listPlannerSessions();
      const target = rows.find(s => s && String(s.id) === String(sessionId));
      if (!target) {
        alert('הסשן לא נמצא.');
        return renderPlannerSessions();
      }
      if (!confirm(`למחוק את הסשן "${plannerSessionTitle(target)}"?`)) return;
      const next = rows.filter(s => String((s && s.id) || '') !== String(sessionId));
      localStorage.setItem(PLANNER_SESSIONS_KEY, JSON.stringify(next));
      renderPlannerSessions();
    }
    function backFromPlanner(returnTo) {
      plannerBackTarget = returnTo === 'sessions' ? 'sessions' : 'home';
      const frame = document.getElementById('plannerEmbed');
      try {
        frame?.contentWindow?.postMessage?.({ type: 'planner_request_save' }, window.location.origin);
      } catch {}
      setTimeout(() => {
        if (plannerBackTarget === 'sessions') renderPlannerSessions();
        else renderPlannerHome();
        plannerBackTarget = null;
      }, 180);
    }
    function renderPlannerEmbed(mode, sessionId, startChapter, autoShare, returnTo) {
      const plannerBase = './מצפן התשוקות/index.html';
      const plannerSrc = `${plannerBase}?v=${encodeURIComponent(SW_BUILD)}${sessionId ? `&sessionId=${encodeURIComponent(sessionId)}` : ''}${startChapter ? `&startChapter=${encodeURIComponent(startChapter)}` : ''}${autoShare ? `&autoShare=${encodeURIComponent(autoShare)}` : ''}`;
      const subtitle = mode === 'new' ? 'סשן הסכמות חדש' : 'מצפן התשוקות';
      document.getElementById('app').innerHTML = `
        <div class="screen">
          <div class="back-row">
            <button class="back-btn" onclick="backFromPlanner('${returnTo === 'sessions' ? 'sessions' : 'home'}')">←</button>
            <h2 class="screen-title">${subtitle}</h2>
          </div>
          <div class="frame-wrap">
            <iframe id="plannerEmbed" src="${plannerSrc}" title="מצפן התשוקות" allow="web-share"></iframe>
            <div id="plannerEmbed-status" class="embed-status">טוען מודול...</div>
          </div>
        </div>
      `;
      wireEmbedFrame('plannerEmbed', plannerSrc);
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register(`./sw.js?v=${encodeURIComponent(SW_BUILD)}`).then(reg => {
          function markUpdateReady() {
            sessionStorage.setItem('he_update_ready', '1');
            renderUpdateBanner();
          }
          if (reg.waiting) markUpdateReady();
          reg.addEventListener('updatefound', () => {
            const installing = reg.installing;
            if (!installing) return;
            installing.addEventListener('statechange', () => {
              if (installing.state === 'installed' && navigator.serviceWorker.controller) {
                markUpdateReady();
              }
            });
          });
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (sessionStorage.getItem('he_reload_after_update') === '1') {
              sessionStorage.removeItem('he_reload_after_update');
              sessionStorage.removeItem('he_update_ready');
              window.location.reload();
            }
          });
        }).catch(() => {});
      });
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
      renderInstallButton();
    });

    window.addEventListener('appinstalled', () => {
      deferredInstallPrompt = null;
      renderInstallButton();
    });

    window.addEventListener('message', (e) => {
      if (e.origin !== window.location.origin) return;
      const data = e && e.data ? e.data : null;
      if (!data || typeof data !== 'object') return;
      if (data.type === 'he_module_back_home') {
        renderHome();
        return;
      }
      if (data.type === 'planner_session_finished') {
        if (plannerBackTarget === 'home') {
          renderPlannerHome();
          plannerBackTarget = null;
          return;
        }
        renderPlannerSessions();
        plannerBackTarget = null;
        return;
      }
      if (data.type === 'planner_open_sessions') {
        renderPlannerSessions();
        return;
      }
      if (data.type === 'planner_open_new') {
        openPlannerNewSession();
      }
    });

    function renderUpdateBanner() {
      const host = document.getElementById('updateBannerHost');
      if (!host) return;
      if (sessionStorage.getItem('he_update_ready') !== '1') {
        host.innerHTML = '';
        return;
      }
      host.innerHTML = `
        <div class="update-banner">
          <span>יש עדכון מוכן לאפליקציה</span>
          <button class="secondary-btn" style="padding:0.42rem 0.7rem;" onclick="applyAppUpdate()">עדכן עכשיו</button>
        </div>
      `;
    }

    function applyAppUpdate() {
      navigator.serviceWorker.getRegistration().then(reg => {
        if (!reg) return;
        sessionStorage.setItem('he_reload_after_update', '1');
        if (reg.waiting) {
          reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        } else {
          reg.update();
          alert('מתבצעת בדיקת עדכון. אם יש גרסה חדשה, לחצו שוב על "עדכן עכשיו".');
        }
      });
    }

    function renderInstallButton() {
      const btn = document.getElementById('installAppBtn');
      if (!btn) return;
      btn.hidden = !deferredInstallPrompt;
    }

    function installHebrewApp() {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      deferredInstallPrompt.userChoice.finally(() => {
        deferredInstallPrompt = null;
        renderInstallButton();
      });
    }

    function clearHebrewLocalData() {
      const keys = [
        'archetype_he_favorites_v1',
        'archetype_he_deck_realms_v1',
        'archetype_he_prefs_v1'
      ];
      keys.forEach(k => localStorage.removeItem(k));
      alert('המידע המקומי של המודול העברי נוקה.');
    }

    function clearPlannerLocalData() {
      const keys = ['planner_sessions_v1', 'scene_planner_sessions_v1'];
      keys.forEach(k => localStorage.removeItem(k));
      alert('נתוני מצפן התשוקות נוקו.');
    }

    function clearHypnoLocalData() {
      const keys = ['he_favorites_v4', 'he_recordings_v4'];
      keys.forEach(k => localStorage.removeItem(k));
      alert('נתוני דפוסי השפה נוקו.');
    }
    function refreshStudio() {
      diagnosticsCache = null;
      const next = `${window.location.pathname}?refresh=${Date.now()}`;
      window.location.replace(next);
    }

    function wireEmbedFrame(frameId, src) {
      const frame = document.getElementById(frameId);
      const status = document.getElementById(`${frameId}-status`);
      if (!frame || !status) return;
      let settled = false;
      let timeout = 0;
      const srcWithBust = () => {
        const sep = src.includes('?') ? '&' : '?';
        return `${src}${sep}retryTs=${Date.now()}`;
      };
      function showFallback(reason) {
        settled = false;
        const offlineHint = navigator.onLine ? '' : '<br><strong>נראה שהמכשיר אופליין כרגע.</strong>';
        const reasonText = reason === 'error'
          ? 'אירעה שגיאה בטעינת המודול.'
          : 'המודול נטען יותר מהרגיל.';
        status.innerHTML = `
          ${reasonText}<br>
          אם המסך נשאר ריק, נסו טעינה מחדש.${offlineHint}
          <div style="margin-top:0.8rem; display:flex; gap:0.5rem; justify-content:center; flex-wrap:wrap;">
            <button class="secondary-btn" type="button" id="${frameId}-retry">טעינה מחדש</button>
            <button class="secondary-btn" type="button" id="${frameId}-open">פתיחה בחלון נפרד</button>
          </div>
          <small style="display:block; margin-top:0.55rem; direction:ltr;">${src}</small>
        `;
        const retryBtn = document.getElementById(`${frameId}-retry`);
        const openBtn = document.getElementById(`${frameId}-open`);
        if (retryBtn) retryBtn.addEventListener('click', () => {
          status.classList.remove('hidden');
          status.textContent = 'טוען מודול...';
          armWatchdog();
          frame.src = srcWithBust();
        });
        if (openBtn) openBtn.addEventListener('click', () => { window.open(src, '_blank', 'noopener'); });
      }
      function armWatchdog() {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
          if (settled) return;
          showFallback('timeout');
        }, 5000);
      }
      armWatchdog();
      frame.addEventListener('load', () => {
        settled = true;
        clearTimeout(timeout);
        status.classList.add('hidden');
      });
      frame.addEventListener('error', () => {
        clearTimeout(timeout);
        showFallback('error');
      });
    }

    async function runDiagnostics(forceRefresh) {
      if (diagnosticsCache && !forceRefresh) {
        renderDiagnosticsResult(diagnosticsCache);
        return;
      }
      const checks = await Promise.all(MODULE_HEALTH_CHECKS.map(async item => {
        try {
          const res = await fetch(item.path, { cache: 'no-store' });
          return { ...item, ok: res.ok, status: res.status, note: res.ok ? 'זמין' : `HTTP ${res.status}` };
        } catch {
          return { ...item, ok: false, status: 0, note: 'לא נגיש (network/error)' };
        }
      }));
      diagnosticsCache = {
        checks,
        online: navigator.onLine,
        checkedAt: new Date().toLocaleTimeString('he-IL')
      };
      renderDiagnosticsResult(diagnosticsCache);
    }

    function renderDiagnosticsResult(payload) {
      const grid = document.getElementById('diagGrid');
      const summary = document.getElementById('diagSummary');
      if (!grid || !summary || !payload) return;
      const okCount = payload.checks.filter(c => c.ok).length;
      const total = payload.checks.length;
      const netClass = payload.online ? 'ok' : 'warn';
      const netLabel = payload.online ? 'אונליין' : 'אופליין';
      summary.innerHTML = `<span class="diag-chip net-badge ${netClass}">${netLabel}</span>בדיקות: ${okCount}/${total} • עודכן: ${payload.checkedAt}`;
      grid.innerHTML = payload.checks.map(row => {
        const chipClass = row.ok ? 'ok' : 'bad';
        const chipText = row.ok ? 'זמין' : 'לא זמין';
        return `
          <div class="diag-row">
            <div>
              <div class="diag-name">${row.name}</div>
              <div class="diag-path">${row.path}</div>
            </div>
            <div style="display:flex; align-items:center; gap:0.45rem;">
              <small class="muted">${row.note}</small>
              <span class="diag-chip ${chipClass}">${chipText}</span>
            </div>
          </div>
        `;
      }).join('');
    }
    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    window.addEventListener('online', () => {
      diagnosticsCache = null;
    });
    window.addEventListener('offline', () => {
      diagnosticsCache = null;
    });

    renderHome();
  </script>
</body>
</html>
