<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ארכיטיפים של עונג</title>
  <style>
    :root { --bg:#06050b; --panel:rgba(255,255,255,.08); --border:rgba(255,255,255,.16); --text:#f4f2f8; --muted:#ccc7db; }
    * { box-sizing:border-box; }
    html,body { margin:0; width:100%; height:100%; background:var(--bg); color:var(--text); font-family:Assistant,Segoe UI,sans-serif; }
    .app { height:100%; display:flex; flex-direction:column; padding:1rem; gap:.8rem; }
    .top { display:flex; align-items:center; justify-content:space-between; gap:.6rem; border:1px solid var(--border); border-radius:.9rem; background:var(--panel); padding:.65rem .8rem; }
    .top h1 { margin:0; font-size:1.2rem; }
    .btn { border:1px solid var(--border); background:rgba(255,255,255,.07); color:var(--text); border-radius:.7rem; padding:.5rem .8rem; cursor:pointer; font-size:.95rem; }
    .menu { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:.5rem; }
    .menu .btn.active { background:rgba(183,135,255,.27); border-color:rgba(183,135,255,.5); }
    .view { flex:1; min-height:0; overflow:auto; }
    .panel { border:1px solid var(--border); border-radius:1rem; background:var(--panel); padding:.8rem; min-height:0; }
    .row { width:100%; text-align:right; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); color:var(--text); border-radius:.7rem; padding:.45rem .6rem; margin-bottom:.35rem; display:flex; align-items:center; justify-content:space-between; gap:.5rem; }
    .meta { color:var(--muted); font-size:.9rem; margin-bottom:.7rem; }
    .about-acc { border:1px solid rgba(183,135,255,.35); border-radius:.85rem; background:rgba(255,255,255,.03); overflow:hidden; margin-bottom:.55rem; }
    .about-acc>summary { list-style:none; cursor:pointer; padding:.65rem .8rem; font-weight:700; color:#efdfff; }
    .about-body { padding:0 .8rem .8rem; color:#e8e5f0; line-height:1.65; white-space:pre-wrap; }
    .toast { position:fixed; right:1rem; bottom:1rem; z-index:80; max-width:min(420px,calc(100% - 2rem)); border:1px solid rgba(183,135,255,.42); border-radius:.7rem; background:rgba(20,14,34,.95); color:#f1e9ff; padding:.62rem .8rem; font-size:.9rem; opacity:0; transform:translateY(8px); transition:opacity 180ms ease, transform 180ms ease; }
    .toast.show { opacity:1; transform:translateY(0); }
    .archetype-shuffle-overlay { position:fixed; inset:0; z-index:300; display:flex; flex-direction:column; align-items:center; justify-content:center; background:radial-gradient(ellipse 120% 80% at 50% 45%, rgba(35,22,48,.94) 0%, rgba(5,4,8,.97) 55%, #020103 100%); backdrop-filter:blur(10px); overflow:hidden; }
    .archetype-shuffle-hub { position:relative; width:min(92vw,360px); height:min(52vh,280px); display:flex; align-items:center; justify-content:center; perspective:900px; }
    .archetype-shuffle-riffle { position:relative; transform-style:preserve-3d; width:min(84vw,330px); height:min(44vw,190px); animation:archetypeRiffleGroup 1.75s cubic-bezier(.45,0,.2,1) forwards; }
    .archetype-shuffle-pack { position:absolute; top:50%; width:min(40vw,130px); aspect-ratio:2/3; transform-style:preserve-3d; }
    .archetype-shuffle-pack.left { left:5%; transform:translateY(-50%) rotate(-11deg); animation:archetypePackLeft 1.75s cubic-bezier(.45,0,.2,1) forwards; }
    .archetype-shuffle-pack.right { right:5%; transform:translateY(-50%) rotate(11deg); animation:archetypePackRight 1.75s cubic-bezier(.45,0,.2,1) forwards; }
    .archetype-shuffle-card { position:absolute; inset:0; border-radius:5px; background-size:cover; background-position:center; box-shadow:0 14px 36px rgba(0,0,0,.72), 0 0 0 1px rgba(212,175,125,.22); }
    .archetype-spread-overlay { position:fixed; inset:0; z-index:320; background:radial-gradient(ellipse 120% 90% at 50% 45%, rgba(40,20,52,.99), rgba(5,4,8,1) 58%, #020103 100%); display:flex; align-items:center; justify-content:center; padding:1rem; overflow:hidden; }
    .archetype-spread-stage { position:relative; width:min(100%,440px); height:min(88vh,720px); }
    .archetype-spread-stage.is-dealing .archetype-spread-card { transition:transform .62s cubic-bezier(.22,1,.36,1), opacity .4s ease; }
    .archetype-spread-card { position:absolute; left:50%; top:56%; width:min(20vw,92px); aspect-ratio:2/3; transform-style:preserve-3d; touch-action:none; cursor:grab; transition:transform .18s ease-out, filter .18s ease-out; z-index:var(--z,1); }
    .archetype-spread-card.is-not-ready { pointer-events:none; }
    .archetype-spread-card.is-dragging { cursor:grabbing; filter:brightness(1.14); }
    .archetype-spread-card.is-chosen { transition:transform .82s cubic-bezier(.2,.9,.22,1); z-index:400 !important; }
    .archetype-spread-card.is-flipping .archetype-spread-inner { transform:rotateY(180deg); }
    .archetype-spread-inner { position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .5s ease; }
    .archetype-spread-face { position:absolute; inset:0; border-radius:5px; overflow:hidden; backface-visibility:hidden; box-shadow:0 12px 28px rgba(0,0,0,.62), 0 0 0 1px rgba(212,175,125,.24); }
    .archetype-spread-face.back { background-size:cover; background-position:center; }
    .archetype-spread-face.front { transform:rotateY(180deg); background:linear-gradient(165deg,#2a152f 0%,#160b1d 55%,#0b0610 100%); border:1px solid rgba(212,175,125,.32); display:flex; align-items:center; justify-content:center; color:#f5e8d4; font-size:.9rem; padding:.55rem; text-align:center; }
    @keyframes archetypeRiffleGroup { 0%{transform:translateY(8px)} 100%{transform:translateY(0)} }
    @keyframes archetypePackLeft { 0%{transform:translateY(-50%) rotate(-11deg)} 100%{transform:translateY(-50%) translateX(58px) rotate(0)} }
    @keyframes archetypePackRight { 0%{transform:translateY(-50%) rotate(11deg)} 100%{transform:translateY(-50%) translateX(-58px) rotate(0)} }
    @media (max-width:760px){ .menu{grid-template-columns:repeat(2,minmax(0,1fr));} }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="top">
      <button class="btn" onclick="goBack()">חזרה לסטודיו</button>
      <h1>ארכיטיפים של עונג</h1>
      <button class="btn" onclick="setView('draw')">למסך שליפה</button>
    </div>
    <div class="menu">
      <button class="btn active" id="nav-draw" onclick="setView('draw')">ערבוב ושליפה</button>
      <button class="btn" id="nav-custom" onclick="setView('custom')">חפיסה מותאמת</button>
      <button class="btn" id="nav-all" onclick="setView('all')">כל הקלפים</button>
      <button class="btn" id="nav-about" onclick="setView('about')">אודות ארכיטיפים</button>
    </div>
    <div class="view" id="view"></div>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    const SHUFFLE_MS = 1780;
    const CARD_BACK_CANDIDATES = ['./archetype-card-back.webp','./archetype-card-back.png','./backside.png'];
    const FAVORITES_KEY = 'archetype_he_favorites_v1';
    const DECK_KEY = 'archetype_he_deck_realms_v1';
    const PREFS_KEY = 'archetype_he_prefs_v1';
    const toastEl = document.getElementById('toast');
    let toastTimer = null;
    let cardBack = CARD_BACK_CANDIDATES[0];
    let CARDS = [];
    let IMAGE_MAP = {};
    let ABOUT_COPY = {};
    let favorites = new Set();
    let selectedDeckKeys = [];
    let pendingPoolIds = [];
    let currentView = 'draw';
    let activeCardId = '';

    function notify(msg){ toastEl.textContent = msg; toastEl.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200); }
    function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
    function goBack(){ if (window.parent && window.parent !== window) window.parent.postMessage({ type: 'he_module_back_home' }, window.location.origin); else window.location.href='../index.html'; }
    function saveState(){ localStorage.setItem(FAVORITES_KEY, JSON.stringify(Array.from(favorites))); localStorage.setItem(DECK_KEY, JSON.stringify(selectedDeckKeys)); localStorage.setItem(PREFS_KEY, JSON.stringify({ currentView })); }
    function realms(){ return Array.from(new Set(CARDS.map(c => String(c.realm||'ללא ממלכה')))).sort((a,b)=>a.localeCompare(b,'he')); }
    function customPool(){ const keys = new Set(selectedDeckKeys); const ids = new Set(); if (keys.has('__favorites__')) favorites.forEach(id => ids.add(id)); CARDS.forEach(c => { if (keys.has(String(c.realm||'ללא ממלכה'))) ids.add(c.id); }); return CARDS.filter(c => ids.has(c.id)); }
    function randomPool(){ return CARDS.slice(); }
    function toggleFavorite(id){
      if (favorites.has(id)) favorites.delete(id); else favorites.add(id);
      saveState();
      if (activeCardId && String(activeCardId) === String(id)) renderCardView(id, currentView);
      else setView(currentView);
    }

    async function resolveBack() {
      for (const p of CARD_BACK_CANDIDATES) {
        const ok = await new Promise(r => { const i = new Image(); i.onload=()=>r(true); i.onerror=()=>r(false); i.src = p + '?v=' + Date.now(); });
        if (ok) { cardBack = p; return; }
      }
      cardBack = '';
    }

    function startSpreadDraw(pool, fromView){
      if (!pool || !pool.length) { notify('לא נמצאו קלפים לבחירה הזו. בחרו לפחות ממלכה אחת או מועדפים.'); return; }
      pendingPoolIds = pool.map(c => c.id);
      playShuffleThen(openSpread);
    }

    function playShuffleThen(next){
      const app = document.getElementById('app');
      const layer = document.createElement('div');
      layer.className = 'archetype-shuffle-overlay';
      const backStyle = cardBack ? `background-image:url('${cardBack}'); background-color:#120b1d;` : 'background:linear-gradient(165deg,#1f0f1c 0%,#0a060c 55%,#070408 100%);';
      const left = Array.from({ length: 5 }, () => `<div class="archetype-shuffle-card" style="${backStyle}"></div>`).join('');
      const right = Array.from({ length: 5 }, () => `<div class="archetype-shuffle-card" style="${backStyle}"></div>`).join('');
      layer.innerHTML = `<div class="archetype-shuffle-hub"><div class="archetype-shuffle-riffle"><div class="archetype-shuffle-pack left">${left}</div><div class="archetype-shuffle-pack right">${right}</div></div></div><p>מערבב את החפיסה...</p>`;
      app.appendChild(layer);
      setTimeout(() => { layer.remove(); next(); }, SHUFFLE_MS);
    }

    function pickSpreadCards(n){
      const source = pendingPoolIds.length ? CARDS.filter(c => pendingPoolIds.includes(c.id)) : CARDS;
      return [...source].sort(() => Math.random() - 0.5).slice(0, Math.min(n, source.length));
    }

    function openSpread(){
      const app = document.getElementById('app');
      const spreadCards = pickSpreadCards(15);
      if (!spreadCards.length) return;
      const layer = document.createElement('div');
      layer.className = 'archetype-spread-overlay';
      layer.setAttribute('dir', 'ltr');
      const vw = Math.max(320, window.innerWidth || 360);
      const isMobile = vw <= 640;
      const angleStart = isMobile ? -66 : -74;
      const angleEnd = isMobile ? 66 : 74;
      const step = spreadCards.length > 1 ? (angleEnd - angleStart) / (spreadCards.length - 1) : 0;
      const backStyle = cardBack ? `background-image:url('${cardBack}'); background-color:#120b1d;` : "background:linear-gradient(165deg,#1f0f1c 0%,#0a060c 55%,#070408 100%);";
      const cardsHtml = spreadCards.map((card,i) => {
        const angle = angleStart + step * i;
        const x = Math.sin(angle * Math.PI / 180) * 180;
        const y = 120 - Math.cos(angle * Math.PI / 180) * 180;
        const rot = angle * 0.56;
        return `<div class="archetype-spread-card is-not-ready" data-card-id="${escapeHtml(card.id)}" data-x="${x.toFixed(2)}" data-y="${y.toFixed(2)}" data-rot="${rot.toFixed(2)}" style="--z:${60+i}; transform:translate3d(-140px,100px,0) rotate(-5deg);"><div class="archetype-spread-inner"><div class="archetype-spread-face back" style="${backStyle}"><div style="position:absolute; inset:6px; border:1px solid rgba(245,220,170,.42); border-radius:4px;"></div></div><div class="archetype-spread-face front"></div></div></div>`;
      }).join('');
      layer.innerHTML = `<div class="archetype-spread-stage is-dealing">${cardsHtml}</div>`;
      app.appendChild(layer);
      const stage = layer.querySelector('.archetype-spread-stage');
      let selected = false;
      const cards = Array.from(layer.querySelectorAll('.archetype-spread-card'));
      cards.forEach((el,i) => {
        const tx = Number(el.dataset.x || 0), ty = Number(el.dataset.y || 0), tr = Number(el.dataset.rot || 0);
        setTimeout(() => { el.style.transform = `translate3d(${tx}px,${ty}px,0) rotate(${tr}deg)`; }, 36 * i);
        setTimeout(() => { el.classList.remove('is-not-ready'); }, 36 * i + 360);
      });
      setTimeout(() => stage.classList.remove('is-dealing'), 980);
      cards.forEach(el => {
        const baseX = Number(el.dataset.x || 0), baseY = Number(el.dataset.y || 0), baseR = Number(el.dataset.rot || 0);
        let pid = null, sx = 0, sy = 0, dx = 0, dy = 0, out = 0;
        const apply = (ox, oy, lift = 0, twist = 0) => { el.style.transform = `translate3d(${baseX + ox}px,${baseY + oy - lift}px,0) rotate(${baseR + twist}deg)`; };
        const down = ev => { if (selected || el.classList.contains('is-not-ready')) return; pid = ev.pointerId; sx = ev.clientX; sy = ev.clientY; dx = dy = out = 0; el.classList.add('is-dragging'); el.setPointerCapture(pid); };
        const move = ev => {
          if (pid == null || ev.pointerId !== pid || selected) return;
          dx = ev.clientX - sx; dy = ev.clientY - sy;
          const vx = baseX, vy = baseY - 80, vlen = Math.hypot(vx, vy) || 1, ux = vx / vlen, uy = vy / vlen;
          out = Math.max(0, dx * ux + dy * uy);
          const damp = Math.min(out, 125);
          apply(dx * .18 + ux * damp, dy * .18 + uy * damp, 6 + damp * .07, dx * .02 + (baseR > 0 ? 2 : -2));
        };
        const choose = () => {
          selected = true;
          cards.forEach(c => { if (c !== el) c.style.opacity = '.2'; });
          el.classList.remove('is-dragging');
          el.classList.add('is-chosen');
          el.style.transform = 'translate3d(0px,40px,0) rotate(0deg) scale(2.2)';
          setTimeout(() => el.classList.add('is-flipping'), 260);
          setTimeout(() => {
            const cardId = String(el.dataset.cardId || '');
            layer.remove();
            if (cardId) renderCardView(cardId, pendingPoolIds.length ? 'random' : 'draw');
          }, 1280);
        };
        const up = ev => {
          if (pid == null || ev.pointerId !== pid || selected) return;
          el.classList.remove('is-dragging');
          const th = (window.innerWidth <= 640 ? 44 : 56), dist = Math.hypot(dx, dy);
          if (out > th || dist > th + 18) choose();
          else { el.style.transition = 'transform .28s cubic-bezier(.2,.8,.2,1)'; apply(0,0,0,0); setTimeout(() => { el.style.transition = ''; }, 300); }
          try { el.releasePointerCapture(pid); } catch {}
          pid = null;
        };
        el.addEventListener('pointerdown', down);
        el.addEventListener('pointermove', move);
        el.addEventListener('pointerup', up);
        el.addEventListener('pointercancel', up);
      });
    }

    function renderDraw(){
      document.getElementById('view').innerHTML = `<div class="panel"><div class="meta">בחר/י ערבוב ושליפה כדי לחשוף קלף.</div><button class="btn" onclick="startSpreadDraw(randomPool(),'random')">ערבוב ושליפה</button><div class="meta" style="margin-top:.6rem;">גודל חפיסה פעילה: ${randomPool().length} קלפים</div></div>`;
    }
    function renderCardView(cardId, fromView){
      const card = CARDS.find(c => String(c.id) === String(cardId));
      if (!card) { setView('draw'); return; }
      activeCardId = cardId;
      const fav = favorites.has(cardId);
      const imgPath = IMAGE_MAP[cardId] ? String(IMAGE_MAP[cardId]).replace('./','') : '';
      const imageUrl = imgPath ? `./${imgPath}` : '';
      const host = document.getElementById('view');
      host.innerHTML = `
        <div class="panel">
          <div style="display:flex; justify-content:space-between; gap:.5rem; margin-bottom:.6rem;">
            <button class="btn" onclick="activeCardId=''; setView('${escapeHtml(fromView || 'draw')}')">חזרה</button>
            <button class="btn" onclick="toggleFavorite('${escapeHtml(cardId)}')">${fav ? '★ במועדפים' : '☆ הוספה למועדפים'}</button>
          </div>
          <div style="border:1px solid rgba(255,255,255,.14); border-radius:.9rem; overflow:hidden; margin-bottom:.7rem; background:rgba(255,255,255,.03);">
            <div style="height:260px; background:${imageUrl ? `url('${imageUrl}') center/cover no-repeat` : 'linear-gradient(165deg,#1f0f1c 0%,#0a060c 55%,#070408 100%)'};"></div>
            <div style="padding:.8rem;">
              <div style="font-weight:700; font-size:1.2rem;">${escapeHtml(card.name || '')}</div>
              <div class="meta">${escapeHtml(card.realm || 'ללא ממלכה')}</div>
              <div style="white-space:pre-wrap; line-height:1.6; color:#efeaff;">${escapeHtml(card.essence || card.gift || card.shadow || card.practice || '')}</div>
            </div>
          </div>
          <button class="btn" style="width:100%;" onclick="startSpreadDraw(${fromView === 'custom' ? 'customPool()' : 'randomPool()'}, '${escapeHtml(fromView || 'random')}')">שליפה נוספת</button>
        </div>`;
    }
    function renderCustom(){
      const rs = realms();
      const row = (k,l,s) => { const active = selectedDeckKeys.includes(k); return `<button class="row" onclick="toggleDeckKey('${escapeHtml(k)}')"><span><strong>${escapeHtml(l)}</strong><br><small>${escapeHtml(s)}</small></span><small>${active ? '✓' : '□'}</small></button>`; };
      document.getElementById('view').innerHTML = `<div class="panel"><div style="display:flex; gap:.5rem; margin-bottom:.55rem;"><button class="btn" onclick="selectedDeckKeys=['__favorites__',...realms()]; saveState(); renderCustom();">בחר הכל</button><button class="btn" onclick="selectedDeckKeys=[]; saveState(); renderCustom();">נקה הכל</button></div>${row('__favorites__','סט מועדפים',`${favorites.size} קלפים מסומנים כרגע`)}${rs.map(r=>row(r,r,`${CARDS.filter(c=>String(c.realm||'ללא ממלכה')===r).length} קלפים בממלכה זו`)).join('')}<div style="margin-top:.7rem;"><button class="btn" style="width:100%;" onclick="startSpreadDraw(customPool(),'custom')">ערבוב ושליפה מהחפיסה המותאמת</button></div></div>`;
    }
    function toggleDeckKey(k){ if (selectedDeckKeys.includes(k)) selectedDeckKeys = selectedDeckKeys.filter(x => x !== k); else selectedDeckKeys.push(k); saveState(); renderCustom(); }
    function renderAll(){
      const grouped = {}; CARDS.forEach(c => { const r = String(c.realm||'ללא ממלכה'); (grouped[r] ||= []).push(c); });
      const html = Object.keys(grouped).sort((a,b)=>a.localeCompare(b,'he')).map(r => `<div class="meta" style="margin:.6rem 0 .2rem;">${escapeHtml(r)}</div>${grouped[r].sort((a,b)=>String(a.name||'').localeCompare(String(b.name||''),'he')).map(c=>`<div class="row"><button style="background:transparent;border:0;color:inherit;flex:1;text-align:right;" onclick="renderCardView('${escapeHtml(c.id)}','all')">${escapeHtml(c.name||'')}</button><button class="btn" onclick="toggleFavorite('${escapeHtml(c.id)}')">${favorites.has(c.id)?'★':'☆'}</button></div>`).join('')}`).join('');
      document.getElementById('view').innerHTML = `<div class="panel">${html}</div>`;
    }
    function renderAbout(){
      document.getElementById('view').innerHTML = `<div class="panel"><details class="about-acc" open><summary>אודות ארכיטיפים של עונג</summary><div class="about-body">${escapeHtml(ABOUT_COPY.notDisguise || 'הקלפים הם הזמנה לתרגול וחקירה.')}</div></details><details class="about-acc"><summary>איך להשתמש</summary><div class="about-body">${escapeHtml(ABOUT_COPY.howToUse || 'שליפה אקראית, חפיסה מותאמת או עיון בכל הקלפים.')}</div></details><details class="about-acc"><summary>הזמנה לתרגול</summary><div class="about-body">${escapeHtml(ABOUT_COPY.invitation || '')}</div></details></div>`;
    }
    function setView(v){ currentView = v; ['draw','custom','all','about'].forEach(x => document.getElementById('nav-'+x).classList.toggle('active', x === v)); if (v==='draw') renderDraw(); else if (v==='custom') renderCustom(); else if (v==='all') renderAll(); else renderAbout(); saveState(); }

    async function boot(){
      favorites = new Set(JSON.parse(localStorage.getItem(FAVORITES_KEY) || '[]'));
      selectedDeckKeys = JSON.parse(localStorage.getItem(DECK_KEY) || '[]');
      const prefs = JSON.parse(localStorage.getItem(PREFS_KEY) || '{}');
      const qp = new URLSearchParams(window.location.search);
      const requestedView = qp.get('initialView');
      const autoplayShuffle = qp.get('autoplayShuffle') === '1';
      const cardsResp = await fetch('../archetypes_he_data.json', { cache: 'no-store' }).catch(() => null);
      const mapResp = await fetch('./image-map.json', { cache: 'no-store' }).catch(() => null);
      const aboutResp = await fetch('./about-copy-he.json', { cache: 'no-store' }).catch(() => null);
      if (cardsResp && cardsResp.ok) { const d = await cardsResp.json(); CARDS = Array.isArray(d) ? d : (Array.isArray(d.cards) ? d.cards : []); }
      if (mapResp && mapResp.ok) { const m = await mapResp.json(); const rows = Array.isArray(m.images) ? m.images : []; IMAGE_MAP = rows.reduce((a,r) => { if (r && r.id && r.image) a[r.id] = r.image; return a; }, {}); }
      if (aboutResp && aboutResp.ok) ABOUT_COPY = await aboutResp.json();
      await resolveBack();
      const initialView = autoplayShuffle
        ? 'draw'
        : (['draw','custom','all','about'].includes(requestedView)
          ? requestedView
          : (['draw','custom','all','about'].includes(prefs.currentView) ? prefs.currentView : 'draw'));
      setView(initialView);
      if (autoplayShuffle && initialView === 'draw') {
        setTimeout(() => startSpreadDraw(randomPool(), 'random'), 120);
      }
    }
    boot();
  </script>
</body>
</html>
