<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ארכיטיפים של עונג</title>
  <style>
    :root {
      --bg: #06050b;
      --panel: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.16);
      --text: #f4f2f8;
      --muted: #ccc7db;
      --accent: #b787ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: "Assistant", "Segoe UI", sans-serif; }
    .app { height: 100%; display: flex; flex-direction: column; padding: 1rem; gap: 0.8rem; }
    .app.is-fullscreen { padding: 0; gap: 0; }
    .top {
      display: flex; align-items: center; justify-content: space-between; gap: 0.6rem;
      border: 1px solid var(--border); border-radius: 0.9rem; background: var(--panel); padding: 0.65rem 0.8rem;
    }
    .top h1 { margin: 0; font-size: 1.2rem; font-weight: 700; }
    .btn {
      border: 1px solid var(--border); background: rgba(255,255,255,0.07); color: var(--text);
      border-radius: 0.7rem; padding: 0.5rem 0.8rem; cursor: pointer; font-size: 0.95rem;
    }
    .btn:hover { background: rgba(255,255,255,0.14); }
    .menu { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 0.5rem; }
    .menu .btn { font-weight: 600; }
    .menu .btn.active { background: rgba(183,135,255,0.27); border-color: rgba(183,135,255,0.5); }
    .view { flex: 1; min-height: 0; overflow: auto; }
    .grid { display: grid; gap: 0.8rem; grid-template-columns: minmax(280px, 440px) 1fr; }
    @media (max-width: 760px) { .menu { grid-template-columns: repeat(2, minmax(0,1fr)); } .grid { grid-template-columns: 1fr; } }
    .card-wrap, .panel {
      border: 1px solid var(--border); border-radius: 1rem; background: var(--panel);
      padding: 0.8rem; min-height: 0;
    }
    .flip { perspective: 1000px; width: 100%; aspect-ratio: 2 / 3; max-height: 72vh; margin: 0 auto; cursor: pointer; }
    .flip-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.25,1,0.5,1); }
    .flip-inner.flipped { transform: rotateY(180deg); }
    .face {
      position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 0.9rem; border: 1px solid rgba(183,135,255,0.38); overflow: hidden;
    }
    .front {
      background:
        radial-gradient(circle at 35% 25%, rgba(183,135,255,0.35), transparent 35%),
        radial-gradient(circle at 72% 74%, rgba(116,76,171,0.28), transparent 38%),
        linear-gradient(170deg, #1a1129, #0d0a13 70%);
      display: grid; place-items: center; text-align: center; padding: 1rem;
    }
    .front-art {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0;
      opacity: 0.96;
    }
    .front-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(8,6,14,0.78), rgba(8,6,14,0.12) 55%, rgba(8,6,14,0.62));
      z-index: 1;
    }
    .front-text { position: relative; z-index: 2; }
    .front h2 { margin: 0; font-size: 1.55rem; line-height: 1.25; font-weight: 700; }
    .front p { margin: 0.8rem 0 0; color: var(--muted); font-size: 0.95rem; }
    .back { transform: rotateY(180deg); background: linear-gradient(165deg, #0f0a16, #07050c 78%); display: flex; }
    .back-scroll { overflow: auto; padding: 0.9rem; width: 100%; }
    .back h3 { margin: 0 0 0.5rem; font-size: 1.3rem; color: #eadbff; }
    .meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 0.7rem; }
    .item { margin-bottom: 0.65rem; }
    .label { color: #cfa8ff; font-weight: 700; font-size: 0.9rem; }
    .value { color: #e8e5f0; font-size: 0.95rem; line-height: 1.55; white-space: pre-wrap; }
    .list { min-height: 0; overflow: auto; }
    .group-title { color: #dcb9ff; font-weight: 700; font-size: 0.94rem; margin: 0.55rem 0 0.3rem; padding-right: 0.2rem; }
    .row {
      width: 100%; text-align: right; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04);
      color: var(--text); border-radius: 0.7rem; padding: 0.45rem 0.6rem; margin-bottom: 0.35rem; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
    }
    .row small { color: var(--muted); font-size: 0.76rem; }
    .row:hover { background: rgba(255,255,255,0.11); }
    .row.is-current { border-color: rgba(183,135,255,0.65); background: rgba(183,135,255,0.14); }
    .star-btn { min-width: 2rem; padding: 0.25rem 0.4rem; }
    .filter-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
    .about-stack { display: grid; gap: 0.65rem; }
    .about-note { color: var(--muted); margin: 0 0 0.35rem; }
    .about-acc {
      border: 1px solid rgba(183,135,255,0.35);
      border-radius: 0.85rem;
      background: rgba(255,255,255,0.03);
      overflow: hidden;
    }
    .about-acc > summary {
      list-style: none;
      cursor: pointer;
      padding: 0.65rem 0.8rem;
      font-weight: 700;
      color: #efdfff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.6rem;
    }
    .about-acc > summary::-webkit-details-marker { display: none; }
    .about-acc > summary::before { content: '+'; color: #cfa8ff; font-size: 1.1rem; }
    .about-acc[open] > summary::before { content: '−'; }
    .about-body {
      padding: 0 0.8rem 0.8rem;
      color: #e8e5f0;
      line-height: 1.65;
      white-space: pre-wrap;
    }
    .archetype-shuffle-overlay {
      position: fixed; inset: 0; z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(ellipse 120% 80% at 50% 45%, rgba(35, 22, 48, 0.99) 0%, rgba(5, 4, 8, 1) 55%, #020103 100%);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); overflow: hidden;
    }
    .archetype-shuffle-overlay::before {
      content: ''; position: absolute; inset: -20%;
      background: radial-gradient(circle at 30% 20%, rgba(120, 60, 140, 0.12), transparent 45%), radial-gradient(circle at 70% 80%, rgba(60, 40, 90, 0.15), transparent 40%);
      pointer-events: none;
    }
    .archetype-shuffle-hub { position: relative; width: min(92vw, 360px); height: min(52vh, 280px); display: flex; align-items: center; justify-content: center; perspective: 900px; }
    .archetype-shuffle-table-glow { position: absolute; width: min(82vw, 320px); height: min(50vw, 190px); border-radius: 50%; background: radial-gradient(circle, rgba(212, 175, 125, 0.24), transparent 70%); filter: blur(10px); opacity: 0.6; }
    .archetype-shuffle-riffle { position: relative; transform-style: preserve-3d; width: min(84vw, 330px); height: min(44vw, 190px); animation: archetypeRiffleGroup 1.75s cubic-bezier(0.45, 0, 0.2, 1) forwards; }
    .archetype-shuffle-pack { position: absolute; top: 50%; width: min(40vw, 130px); aspect-ratio: 2 / 3; transform-style: preserve-3d; }
    .archetype-shuffle-pack.left { left: 5%; transform: translateY(-50%) rotate(-11deg); animation: archetypePackLeft 1.75s cubic-bezier(0.45, 0, 0.2, 1) forwards; }
    .archetype-shuffle-pack.right { right: 5%; transform: translateY(-50%) rotate(11deg); animation: archetypePackRight 1.75s cubic-bezier(0.45, 0, 0.2, 1) forwards; }
    .archetype-shuffle-card { position: absolute; inset: 0; border-radius: 5px; background-size: cover; background-position: center; box-shadow: 0 14px 36px rgba(0, 0, 0, 0.72), 0 0 0 1px rgba(212, 175, 125, 0.22); transform-origin: 50% 90%; }
    .archetype-shuffle-pack.left .archetype-shuffle-card:nth-child(1) { --slot: -2; z-index: 2; animation: archetypeLeftCard1 1.75s ease-in-out forwards; }
    .archetype-shuffle-pack.left .archetype-shuffle-card:nth-child(2) { --slot: -1; z-index: 4; animation: archetypeLeftCard2 1.75s ease-in-out forwards; }
    .archetype-shuffle-pack.left .archetype-shuffle-card:nth-child(3) { --slot: 0; z-index: 6; animation: archetypeLeftCard3 1.75s ease-in-out forwards; }
    .archetype-shuffle-pack.left .archetype-shuffle-card:nth-child(4) { --slot: 1; z-index: 8; animation: archetypeLeftCard4 1.75s ease-in-out forwards; }
    .archetype-shuffle-pack.left .archetype-shuffle-card:nth-child(5) { --slot: 2; z-index: 10; animation: archetypeLeftCard5 1.75s ease-in-out forwards; }
    .archetype-shuffle-pack.right .archetype-shuffle-card:nth-child(1) { --slot: -2; z-index: 3; animation: archetypeRightCard1 1.75s ease-in-out forwards; }
    .archetype-shuffle-pack.right .archetype-shuffle-card:nth-child(2) { --slot: -1; z-index: 5; animation: archetypeRightCard2 1.75s ease-in-out forwards; }
    .archetype-shuffle-pack.right .archetype-shuffle-card:nth-child(3) { --slot: 0; z-index: 7; animation: archetypeRightCard3 1.75s ease-in-out forwards; }
    .archetype-shuffle-pack.right .archetype-shuffle-card:nth-child(4) { --slot: 1; z-index: 9; animation: archetypeRightCard4 1.75s ease-in-out forwards; }
    .archetype-shuffle-pack.right .archetype-shuffle-card:nth-child(5) { --slot: 2; z-index: 11; animation: archetypeRightCard5 1.75s ease-in-out forwards; }
    .archetype-shuffle-shine { position: absolute; width: min(70vw, 240px); height: min(70vw, 240px); border-radius: 50%; pointer-events: none; background: radial-gradient(circle, rgba(212, 175, 125, 0.35) 0%, transparent 65%); opacity: 0; animation: archetypeShuffleShine 1.75s ease-out forwards; filter: blur(16px); }
    .archetype-shuffle-caption { margin-top: 1.75rem; font-family: "Cormorant Garamond", serif; font-size: 1.15rem; letter-spacing: 0.08em; color: rgba(245, 230, 210, 0.88); text-shadow: 0 2px 20px rgba(0, 0, 0, 0.8); }
    .archetype-spread-overlay { position: fixed; inset: 0; z-index: 320; background: radial-gradient(ellipse 120% 90% at 50% 45%, rgba(40, 20, 52, 1), rgba(5, 4, 8, 1) 58%, #020103 100%); display: flex; align-items: center; justify-content: center; padding: 1rem; overflow: hidden; }
    .archetype-spread-stage { position: relative; width: min(100%, 440px); height: min(88vh, 720px); }
    .archetype-spread-stage.is-dealing .archetype-spread-card { transition: transform 0.62s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease; }
    .archetype-spread-card { position: absolute; left: 50%; top: 56%; width: min(20vw, 92px); aspect-ratio: 2 / 3; transform-style: preserve-3d; touch-action: none; cursor: grab; transition: transform 0.18s ease-out, filter 0.18s ease-out; z-index: var(--z, 1); will-change: transform; }
    .archetype-spread-card.is-not-ready { pointer-events: none; }
    .archetype-spread-card.is-dragging { cursor: grabbing; filter: brightness(1.14); }
    .archetype-spread-card.is-chosen { transition: transform 0.82s cubic-bezier(0.2, 0.9, 0.22, 1); z-index: 400 !important; }
    .archetype-spread-card.is-flipping .archetype-spread-inner { transform: rotateY(180deg); }
    .archetype-spread-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.5s ease; }
    .archetype-spread-face { position: absolute; inset: 0; border-radius: 5px; overflow: hidden; backface-visibility: hidden; -webkit-backface-visibility: hidden; box-shadow: 0 12px 28px rgba(0, 0, 0, 0.62), 0 0 0 1px rgba(212, 175, 125, 0.24); }
    .archetype-spread-face.back { background-size: cover; background-position: center; }
    .archetype-spread-face.front { transform: rotateY(180deg); background: linear-gradient(165deg, #2a152f 0%, #160b1d 55%, #0b0610 100%); border: 1px solid rgba(212, 175, 125, 0.32); display: flex; align-items: center; justify-content: center; text-align: center; padding: 0.55rem; font-family: "Cormorant Garamond", serif; color: #f5e8d4; font-size: 0.9rem; line-height: 1.15; }
    .archetype-spread-title { position: absolute; top: 8%; left: 0; right: 0; text-align: center; color: rgba(248, 234, 214, 0.92); font-family: "Cormorant Garamond", serif; font-size: 1.25rem; letter-spacing: 0.03em; padding: 0 1rem; }
    .archetype-spread-subtitle { display: block; font-family: "DM Mono", monospace; font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(212, 175, 125, 0.82); margin-top: 0.35rem; }
    .archetype-perspective { perspective: 1100px; }
    .archetype-flip-inner { position: relative; width: 100%; aspect-ratio: 2 / 3; max-height: min(68vh, 520px); transform-style: preserve-3d; -webkit-transform-style: preserve-3d; transition: transform 0.65s cubic-bezier(0.25, 1, 0.5, 1); border-radius: 0.5rem; }
    .archetype-flip-inner.is-flipped { transform: rotateY(180deg); }
    .archetype-face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; transform: rotateY(0deg) translateZ(0); border-radius: 0.5rem; overflow: hidden; }
    .archetype-face-back { transform: rotateY(180deg) translateZ(1px); background: linear-gradient(165deg, #1f0f1c 0%, #0a060c 55%, #070408 100%); border: 1px solid rgba(201, 169, 110, 0.28); box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.45); direction: rtl; text-align: center; }
    .archetype-booklet-scroll { direction: rtl; text-align: center; }
    .archetype-prose-p { font-family: "Cormorant Garamond", serif; font-size: 0.98rem; line-height: 1.55; color: rgba(245, 240, 235, 0.92); margin-bottom: 0.85rem; text-align: center; }
    .archetype-section-label { font-family: "DM Mono", monospace; font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(212, 175, 125, 0.88); margin-bottom: 0.35rem; text-align: center; }
    .archetype-question-callout { margin-top: 1rem; padding: 0.85rem 1rem; border-radius: 0.75rem; background: rgba(88, 28, 74, 0.35); border: 1px solid rgba(168, 85, 247, 0.25); font-family: "Cormorant Garamond", serif; font-size: 1.05rem; font-style: italic; color: #f3e8ff; text-align: center; line-height: 1.45; }
    .toast {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      z-index: 80;
      max-width: min(420px, calc(100% - 2rem));
      border: 1px solid rgba(183,135,255,0.42);
      border-radius: 0.7rem;
      background: rgba(20,14,34,0.95);
      color: #f1e9ff;
      padding: 0.62rem 0.8rem;
      font-size: 0.9rem;
      box-shadow: 0 12px 36px rgba(0,0,0,0.35);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    @keyframes archetypeRiffleGroup {
      0% { transform: translateY(8px) scale(1); }
      30% { transform: translateY(0) scale(1.03); }
      72% { transform: translateY(-6px) scale(1.04); }
      100% { transform: translateY(0) scale(1); }
    }
    @keyframes archetypePackLeft {
      0% { transform: translateY(-50%) translateX(0) rotate(-11deg); }
      35% { transform: translateY(-50%) translateX(36px) rotate(-4deg); }
      68% { transform: translateY(-50%) translateX(80px) rotate(0deg); }
      100% { transform: translateY(-50%) translateX(58px) rotate(0deg); }
    }
    @keyframes archetypePackRight {
      0% { transform: translateY(-50%) translateX(0) rotate(11deg); }
      35% { transform: translateY(-50%) translateX(-36px) rotate(4deg); }
      68% { transform: translateY(-50%) translateX(-80px) rotate(0deg); }
      100% { transform: translateY(-50%) translateX(-58px) rotate(0deg); }
    }
    @keyframes archetypeLeftCard1 {
      0%, 22% { transform: translate3d(0, 10px, 1px) rotate(-3deg); }
      46% { transform: translate3d(30px, 0, 60px) rotate(3deg); }
      74% { transform: translate3d(66px, -14px, 120px) rotate(0deg); }
      100% { transform: translate3d(56px, -8px, 0) rotate(0deg); }
    }
    @keyframes archetypeLeftCard2 {
      0%, 22% { transform: translate3d(0, 5px, 2px) rotate(-2deg); }
      46% { transform: translate3d(34px, -2px, 64px) rotate(2deg); }
      74% { transform: translate3d(70px, -9px, 125px) rotate(0deg); }
      100% { transform: translate3d(58px, -5px, 0) rotate(0deg); }
    }
    @keyframes archetypeLeftCard3 {
      0%, 22% { transform: translate3d(0, 0, 3px) rotate(-1deg); }
      46% { transform: translate3d(38px, -4px, 68px) rotate(1deg); }
      74% { transform: translate3d(74px, -4px, 130px) rotate(0deg); }
      100% { transform: translate3d(60px, -2px, 0) rotate(0deg); }
    }
    @keyframes archetypeLeftCard4 {
      0%, 22% { transform: translate3d(0, -5px, 4px) rotate(1deg); }
      46% { transform: translate3d(42px, -6px, 72px) rotate(0deg); }
      74% { transform: translate3d(78px, 2px, 134px) rotate(0deg); }
      100% { transform: translate3d(62px, 2px, 0) rotate(0deg); }
    }
    @keyframes archetypeLeftCard5 {
      0%, 22% { transform: translate3d(0, -10px, 5px) rotate(2deg); }
      46% { transform: translate3d(46px, -8px, 76px) rotate(-1deg); }
      74% { transform: translate3d(82px, 7px, 138px) rotate(0deg); }
      100% { transform: translate3d(64px, 5px, 0) rotate(0deg); }
    }
    @keyframes archetypeRightCard1 {
      0%, 22% { transform: translate3d(0, -10px, 1px) rotate(3deg); }
      46% { transform: translate3d(-30px, -8px, 58px) rotate(-3deg); }
      74% { transform: translate3d(-66px, 7px, 118px) rotate(0deg); }
      100% { transform: translate3d(-56px, 5px, 0) rotate(0deg); }
    }
    @keyframes archetypeRightCard2 {
      0%, 22% { transform: translate3d(0, -5px, 2px) rotate(2deg); }
      46% { transform: translate3d(-34px, -6px, 62px) rotate(-2deg); }
      74% { transform: translate3d(-70px, 2px, 123px) rotate(0deg); }
      100% { transform: translate3d(-58px, 2px, 0) rotate(0deg); }
    }
    @keyframes archetypeRightCard3 {
      0%, 22% { transform: translate3d(0, 0, 3px) rotate(1deg); }
      46% { transform: translate3d(-38px, -4px, 66px) rotate(-1deg); }
      74% { transform: translate3d(-74px, -4px, 128px) rotate(0deg); }
      100% { transform: translate3d(-60px, -2px, 0) rotate(0deg); }
    }
    @keyframes archetypeRightCard4 {
      0%, 22% { transform: translate3d(0, 5px, 4px) rotate(-1deg); }
      46% { transform: translate3d(-42px, -2px, 70px) rotate(0deg); }
      74% { transform: translate3d(-78px, -9px, 132px) rotate(0deg); }
      100% { transform: translate3d(-62px, -5px, 0) rotate(0deg); }
    }
    @keyframes archetypeRightCard5 {
      0%, 22% { transform: translate3d(0, 10px, 5px) rotate(-2deg); }
      46% { transform: translate3d(-46px, 0, 74px) rotate(1deg); }
      74% { transform: translate3d(-82px, -14px, 136px) rotate(0deg); }
      100% { transform: translate3d(-64px, -8px, 0) rotate(0deg); }
    }
    @keyframes archetypeShuffleShine {
      0%, 74% { opacity: 0; transform: scale(0.6); }
      82% { opacity: 0.85; transform: scale(1.15); }
      100% { opacity: 0; transform: scale(1.4); }
    }
    @media (prefers-reduced-motion: reduce) {
      .flip-inner,
      .archetype-shuffle-riffle,
      .archetype-shuffle-pack,
      .archetype-shuffle-card,
      .archetype-spread-card,
      .archetype-spread-inner,
      .toast {
        transition: none !important;
        animation: none !important;
      }
    }
    @media (max-width: 640px) {
      .archetype-spread-stage { height: min(84vh, 620px); }
      .archetype-spread-card { width: min(22vw, 82px); }
      .archetype-spread-title { top: 4%; font-size: 1.1rem; }
      .archetype-spread-subtitle { font-size: 0.62rem; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="top">
      <button class="btn" onclick="goBack()">חזרה לסטודיו</button>
      <h1>ארכיטיפים של עונג</h1>
      <button class="btn" onclick="openShuffleDrawFromNav()">למסך שליפה</button>
    </div>
    <div class="menu">
      <button class="btn active" id="nav-draw" onclick="openShuffleDrawFromNav()">ערבוב ושליפה</button>
          <button class="btn" id="nav-custom" onclick="setView('custom')">חפיסה מותאמת</button>
      <button class="btn" id="nav-all" onclick="setView('all')">כל הקלפים</button>
      <button class="btn" id="nav-about" onclick="setView('about')">אודות ארכיטיפים</button>
    </div>
    <div class="view" id="view"></div>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script>
    const FAVORITES_KEY = 'archetype_he_favorites_v1';
    const DECK_KEY = 'archetype_he_deck_realms_v1';
    const PREFS_KEY = 'archetype_he_prefs_v1';
    const MODULE_VERSION = '2026-04-24-archetypes-draw-4';
    const ABOUT_COPY_FALLBACK = {

    };
    let ABOUT_COPY = { ...ABOUT_COPY_FALLBACK };
    let CARDS = [];

    let selectedRealms = new Set();
    let favoritesOnly = false;
    let favorites = new Set();
    const ARCHETYPE_CARD_BACK = './archetype-card-back.webp';

    function goBack() {
      if (window.parent && window.parent !== window) window.parent.postMessage({ type: 'he_module_back_home' }, window.location.origin);
      else window.location.href = '../index.html';

    function setChromeVisible(visible) {
      const top = document.querySelector('.top');
      const menu = document.querySelector('.menu');
      if (top) top.style.display = visible ? 'flex' : 'none';

    function setAppFullscreen(enabled) {

      app.classList.toggle('is-fullscreen', Boolean(enabled));

    function renderShellFrame() {
      const app = document.getElementById('app');
      if (!app) return;
      setAppFullscreen(false);
      app.innerHTML = `
        <div class="top">

      if (!document.getElementById('view')) renderShellFrame();

    function openShuffleDrawFromNav() {
      setView('draw');
      window.setTimeout(() => startShuffleAndDraw(), 40);
    }

    function normalizeRealm(v) {
      const t = String(v || '').trim();
      return t || 'ללא ממלכה';
    }

    function normalizeCardsPayload(data) {
      const rows = Array.isArray(data) ? data : (Array.isArray(data && data.cards) ? data.cards : []);
      return rows.map(card => {
        const energy = card && typeof card.energy === 'string' ? card.energy : '';
        const frequency = card && typeof card.frequency === 'string' ? card.frequency : '';
        return {
          ...card,
          energy: energy || frequency,
          frequency: frequency || energy
        };
      });
    }

    function cardEnergy(card) {
      return String((card && (card.energy || card.frequency)) || '').trim();
    }

    function aboutCopy(key) {
      return escapeHtml(String((ABOUT_COPY && ABOUT_COPY[key]) || ABOUT_COPY_FALLBACK[key] || ''));
    }

    function safeParse(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return fallback;
        return JSON.parse(raw);
      } catch {
        return fallback;
      }
    }

    function saveState() {
      localStorage.setItem(FAVORITES_KEY, JSON.stringify(Array.from(favorites)));
      localStorage.setItem(DECK_KEY, JSON.stringify(Array.from(selectedRealms)));
      localStorage.setItem(PREFS_KEY, JSON.stringify({ favoritesOnly, currentView }));
    }

    function getSelectedDeckKeys() {
      const keys = Array.from(selectedRealms);
      if (favoritesOnly) keys.unshift('__favorites__');
      return keys;
    }

    function setSelectedDeckKeys(nextKeys) {
      const keys = Array.isArray(nextKeys) ? nextKeys.map(k => String(k || '').trim()).filter(Boolean) : [];
      favoritesOnly = keys.includes('__favorites__');
      selectedRealms = new Set(keys.filter(k => k !== '__favorites__'));
      saveState();
    }

    function getCustomDeckPool() {
      const keys = new Set(getSelectedDeckKeys());
      const includeFavorites = keys.has('__favorites__');
      const selectedRealmKeys = new Set(Array.from(keys).filter(k => k !== '__favorites__'));
      const idSet = new Set();
      if (includeFavorites) {
        favorites.forEach(id => idSet.add(id));
      }
      CARDS.forEach(card => {
        if (selectedRealmKeys.has(normalizeRealm(card.realm))) {
          idSet.add(card.id);
        }
      });
      return CARDS.filter(card => idSet.has(card.id));
    }

    function getRandomDrawPool() {
      return [...CARDS];
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function startShuffleAndDraw(poolOverride = null, fromView = 'random') {
      setChromeVisible(false);
      const deck = Array.isArray(poolOverride) ? poolOverride : getRandomDrawPool();
      if (!deck.length) {
        setChromeVisible(true);
        notify('אין קלפים זמינים כרגע לשליפה.');
        return;
      }
      pendingSpreadPoolIds = deck.map(card => card.id);
      pendingSpreadSourceView = fromView;
      playArchetypeShuffleThen(openArchetypeTarotSpread);
    }

    function playArchetypeShuffleThen(callback) {
      const app = document.getElementById('app');
      if (!app) return;
      const layer = document.createElement('div');
      layer.className = 'archetype-shuffle-overlay';
      layer.setAttribute('dir', 'ltr');
      const cardStyle = `background-image:url('${ARCHETYPE_CARD_BACK}')`;
      const leftPack = Array.from({ length: 5 }, () => `<div class="archetype-shuffle-card" style="${cardStyle}"></div>`).join('');
      const rightPack = Array.from({ length: 5 }, () => `<div class="archetype-shuffle-card" style="${cardStyle}"></div>`).join('');
      layer.innerHTML = `
        <div class="archetype-shuffle-hub">
          <div class="archetype-shuffle-table-glow" aria-hidden="true"></div>
          <div class="archetype-shuffle-riffle">
            <div class="archetype-shuffle-pack left">${leftPack}</div>
            <div class="archetype-shuffle-pack right">${rightPack}</div>
          </div>
          <div class="archetype-shuffle-shine" aria-hidden="true"></div>
        </div>
        <p class="archetype-shuffle-caption">מערבב את החפיסה...</p>
      `;
      app.appendChild(layer);
      window.setTimeout(() => {
        layer.remove();
        callback();
      }, 1780);
    }

    function pickArchetypeSpreadCards(count) {
      const poolSource = pendingSpreadPoolIds.length
        ? CARDS.filter(card => pendingSpreadPoolIds.includes(card.id))
        : CARDS;
      const pool = [...poolSource].sort(() => Math.random() - 0.5);
      return pool.slice(0, Math.min(count, pool.length));
    }

    function openArchetypeTarotSpread() {
      setChromeVisible(false);
      const spreadCards = pickArchetypeSpreadCards(15);
      if (!spreadCards.length) return;
      const app = document.getElementById('app');
      if (!app) return;
      const layer = document.createElement('div');
      layer.className = 'archetype-spread-overlay';
      layer.setAttribute('dir', 'ltr');
      const viewportWidth = Math.max(320, window.innerWidth || 360);
      const viewportHeight = Math.max(560, window.innerHeight || 640);
      const stageWidth = Math.min(440, viewportWidth - 32);
      const stageHeight = Math.min(720, viewportHeight * 0.88);
      const isMobileSpread = viewportWidth <= 640;
      const angleStart = isMobileSpread ? -66 : -74;
      const angleEnd = isMobileSpread ? 66 : 74;
      const step = spreadCards.length > 1 ? (angleEnd - angleStart) / (spreadCards.length - 1) : 0;
      const maxAngleDeg = Math.max(Math.abs(angleStart), Math.abs(angleEnd));
      const maxAngleRad = maxAngleDeg * Math.PI / 180;
      const cardWidth = Math.min(viewportWidth * (isMobileSpread ? 0.22 : 0.20), isMobileSpread ? 82 : 92);
      const cardHeight = cardWidth * 1.5;
      const maxCardRotRad = Math.abs(maxAngleDeg * 0.56) * Math.PI / 180;
      const rotatedHalfWidth = (Math.abs(Math.cos(maxCardRotRad)) * cardWidth * 0.5) + (Math.abs(Math.sin(maxCardRotRad)) * cardHeight * 0.5);
      const horizontalSafeHalf = (stageWidth / 2) - rotatedHalfWidth - (isMobileSpread ? 10 : 8);
      const radiusByWidth = horizontalSafeHalf / Math.max(0.001, Math.sin(maxAngleRad));
      const radius = Math.max(150, Math.min(272, radiusByWidth, stageWidth * (isMobileSpread ? 0.44 : 0.56)));
      const centerX = isMobileSpread ? -22 : 0;
      const centerY = Math.max(72, Math.min(152, stageHeight * (isMobileSpread ? 0.19 : 0.24)));
      const dealStartX = -Math.max(126, stageWidth * 0.42);
      const dealStartY = Math.max(82, stageHeight * 0.16);
      const dealStartRot = -5;
      const cardsHtml = spreadCards.map((card, i) => {
        const angle = angleStart + (step * i);
        const rad = angle * Math.PI / 180;
        const x = centerX + Math.sin(rad) * radius;
        const y = centerY - Math.cos(rad) * radius;
        const rot = angle * 0.56;
        return `
          <div class="archetype-spread-card is-not-ready" data-index="${i}" data-card-id="${escapeHtml(card.id)}" data-x="${x.toFixed(2)}" data-y="${y.toFixed(2)}" data-rot="${rot.toFixed(2)}" style="--z:${60 + i}; transform: translate3d(${dealStartX}px, ${dealStartY}px, 0) rotate(${dealStartRot}deg);">
            <div class="archetype-spread-inner">
              <div class="archetype-spread-face back" style="background-image:url('${ARCHETYPE_CARD_BACK}'); background-color:#120b1d;">
                <div style="position:absolute; inset:6px; border:1px solid rgba(245, 220, 170, 0.42); border-radius:4px;"></div>
              </div>
              <div class="archetype-spread-face front"></div>
            </div>
          </div>
        `;
      }).join('');
      layer.innerHTML = `
        <div class="archetype-spread-stage is-dealing">
          <h3 class="archetype-spread-title">דחוף/דחפי קלף החוצה כדי לחשוף אותו<span class="archetype-spread-subtitle">גרור/גררי קלף החוצה מהקשת</span></h3>
          ${cardsHtml}
        </div>
      `;
      app.appendChild(layer);
      const stage = layer.querySelector('.archetype-spread-stage');
      let selected = false;
      const cards = Array.from(layer.querySelectorAll('.archetype-spread-card'));
      cards.forEach((el, i) => {
        const targetX = Number(el.dataset.x || 0);
        const targetY = Number(el.dataset.y || 0);
        const targetRot = Number(el.dataset.rot || 0);
        const delay = 36 * i;
        window.setTimeout(() => {
          el.style.transform = `translate3d(${targetX}px, ${targetY}px, 0) rotate(${targetRot}deg)`;
        }, delay);
        window.setTimeout(() => {
          el.classList.remove('is-not-ready');
        }, delay + 360);
      });
      window.setTimeout(() => {
        stage.classList.remove('is-dealing');
      }, 980);
      cards.forEach((el) => {
        const baseX = Number(el.dataset.x || 0);
        const baseY = Number(el.dataset.y || 0);
        const baseRot = Number(el.dataset.rot || 0);
        let pointerId = null;
        let startX = 0;
        let startY = 0;
        let outShift = 0;
        let dx = 0;
        let dy = 0;
        const applyTransform = (offsetX, offsetY, lift = 0, twist = 0) => {
          el.style.transform = `translate3d(${baseX + offsetX}px, ${baseY + offsetY - lift}px, 0) rotate(${baseRot + twist}deg)`;
        };
        const onDown = (ev) => {
          if (selected || el.classList.contains('is-not-ready')) return;
          pointerId = ev.pointerId;
          startX = ev.clientX;
          startY = ev.clientY;
          outShift = 0;
          dx = 0;
          dy = 0;
          el.classList.add('is-dragging');
          el.setPointerCapture(pointerId);
        };
        const onMove = (ev) => {
          if (pointerId == null || ev.pointerId !== pointerId || selected) return;
          dx = ev.clientX - startX;
          dy = ev.clientY - startY;
          const vx = baseX - centerX;
          const vy = baseY - centerY;
          const vlen = Math.hypot(vx, vy) || 1;
          const ux = vx / vlen;
          const uy = vy / vlen;
          outShift = Math.max(0, dx * ux + dy * uy);
          const damp = Math.min(outShift, 125);
          const offsetX = dx * 0.18 + (ux * damp);
          const offsetY = dy * 0.18 + (uy * damp);
          const twist = (dx * 0.02) + (baseRot > 0 ? 2 : -2);
          applyTransform(offsetX, offsetY, 6 + (damp * 0.07), twist);
        };
        const chooseCard = () => {
          selected = true;
          const cardId = el.dataset.cardId;
          const card = CARDS.find(c => String(c.id) === String(cardId));
          cards.forEach(c => { if (c !== el) c.style.opacity = '0.2'; });
          el.classList.remove('is-dragging');
          el.classList.add('is-chosen');
          const stageWidthPx = stage.clientWidth || 360;
          const stageHeightPx = stage.clientHeight || 620;
          const cardWidthPx = el.offsetWidth || 82;
          const cardHeightPx = el.offsetHeight || 123;
          const maxTargetWidthPx = Math.min(stageWidthPx * 0.72, 302);
          const maxTargetHeightPx = Math.min(stageHeightPx * 0.66, 462);
          const targetScale = Math.max(1.2, Math.min(maxTargetWidthPx / Math.max(1, cardWidthPx), maxTargetHeightPx / Math.max(1, cardHeightPx)));
          const targetCardWidth = cardWidthPx * targetScale;
          const targetCardHeight = cardHeightPx * targetScale;
          const anchorX = stageWidthPx * 0.5;
          const anchorY = stageHeightPx * 0.56;
          const targetLeft = (stageWidthPx - targetCardWidth) / 2;
          const targetTop = Math.max(18, Math.min(stageHeightPx * 0.14, stageHeightPx - targetCardHeight - 24));
          const targetX = targetLeft - anchorX - ((1 - targetScale) * cardWidthPx / 2);
          const targetY = targetTop - anchorY - ((1 - targetScale) * cardHeightPx / 2);
          el.style.transform = `translate3d(${targetX.toFixed(2)}px, ${targetY.toFixed(2)}px, 0) rotate(0deg) scale(${targetScale.toFixed(3)})`;
          window.setTimeout(() => el.classList.add('is-flipping'), 260);
          window.setTimeout(() => {
            layer.remove();
            if (card) renderArchetypeCard(card.id, pendingSpreadSourceView || 'random');
          }, 1280);
        };
        const onUp = (ev) => {
          if (pointerId == null || ev.pointerId !== pointerId || selected) return;
          el.classList.remove('is-dragging');
          const threshold = viewportWidth <= 640 ? 44 : 56;
          const dragDistance = Math.hypot(dx, dy);
          if (outShift > threshold || dragDistance > threshold + 18) {
            chooseCard();
          } else {
            el.style.transition = 'transform 0.28s cubic-bezier(0.2,0.8,0.2,1)';
            applyTransform(0, 0, 0, 0);
            window.setTimeout(() => { el.style.transition = ''; }, 300);
          }
          try { el.releasePointerCapture(pointerId); } catch (e) {}
          pointerId = null;
        };
        el.addEventListener('pointerdown', onDown);
        el.addEventListener('pointermove', onMove);
        el.addEventListener('pointerup', onUp);
        el.addEventListener('pointercancel', onUp);
      });
    }

    function toggleFavorite(id) {
      if (favorites.has(id)) favorites.delete(id);
      else favorites.add(id);
      saveState();
      if (archetypeView && archetypeView.cardId) return;
      setView(currentView);
    }

    function leaveArchetypeCard(targetView) {
      renderShellFrame();
      setAppFullscreen(false);
      setChromeVisible(true);
      if (targetView === 'all') setView('all');
      else if (targetView === 'custom') setView('custom');
      else setView('draw');
    }

    function toggleArchetypeFlip() {
      if (!archetypeView.cardId) return;
      archetypeView.flipped = !archetypeView.flipped;
      renderArchetypeCard(archetypeView.cardId, archetypeView.fromView);
    }

    function reshuffleArchetypeDraw() {
      if (archetypeView.fromView === 'custom') {
        startShuffleAndDraw(getCustomDeckPool(), 'custom');
      } else {
        startShuffleAndDraw(getRandomDrawPool(), 'random');
      }
    }

    function archetypePracticeWithoutDuplicateQuestion(practice, question) {
      const p = String(practice || '');
      const q = String(question || '').trim();
      if (!q) return p;
      return p.split('\n').filter(line => String(line || '').trim() !== q).join('\n').trim();
    }

    function archetypeParagraphBlocks(text) {
      return String(text || '')
        .split(/\n{2,}|\n/)
        .map(line => String(line || '').trim())
        .filter(Boolean)
        .map(line => `<p class="archetype-prose-p">${escapeHtml(line)}</p>`)
        .join('');
    }

    function renderArchetypeCard(cardId, fromView = 'random') {

      if (archetypeView.cardId !== cardId) {
        archetypeView = { cardId, fromView, flipped: false };

        archetypeView.fromView = fromView;
      }

      const art = IMAGE_RESOLVED[card.id] || IMAGE_MAP[card.id] || '';

      const app = document.getElementById('app');
      if (!app) return;
      setAppFullscreen(true);
      setChromeVisible(false);
      app.innerHTML = `

            <button class="btn" onclick="leaveArchetypeCard('${backTarget}')">חזרה</button>

              ${isFav ? '★ במועדפים' : '☆ הוספה למועדפים'}
            </button>
          </div>
          <div class="archetype-perspective" style="flex:1; min-height:0; display:flex; align-items:center; justify-content:center;">
            <div style="width:100%; max-width:26rem; margin:0 auto;">
              <div role="button" tabindex="0" onclick="toggleArchetypeFlip()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleArchetypeFlip();}" class="archetype-flip-inner ${archetypeView.flipped ? 'is-flipped' : ''}">
                <article class="archetype-face" style="background:#000;">
                  <div style="position:absolute; inset:0; background-repeat:no-repeat; background-position:center; background-size:contain; background-image:url('${frontBgUrl}');"></div>
                </article>
                <article class="archetype-face archetype-face-back">
                  <div class="archetype-booklet-scroll" style="height:100%; overflow-y:auto; padding:1rem 1.2rem 1.4rem;">
                    <h3 style="margin:0 0 .6rem; font-size:2rem; color:#f8ecd8; text-align:center;">${escapeHtml(card.name || '')}</h3>
                    <div style="margin-bottom:1rem; text-align:center;">
                      <div class="archetype-section-label">ממלכה</div>
                      <p class="archetype-prose-p">${escapeHtml(normalizeRealm(card.realm))}</p>
                      <div class="archetype-section-label">תדר</div>
                      <p class="archetype-prose-p">${escapeHtml(cardEnergy(card) || '')}</p>
                    </div>
                    <div class="archetype-section-label">מהות</div>
                    ${archetypeParagraphBlocks(card.essence)}
                    <div class="archetype-section-label">מתנה</div>
                    ${archetypeParagraphBlocks(card.gift)}
                    <div class="archetype-section-label">צל</div>
                    ${archetypeParagraphBlocks(card.shadow)}
                    <div class="archetype-section-label">פרקטיקה</div>
                    ${archetypeParagraphBlocks(practiceForBook)}
                    <div class="archetype-question-callout">${escapeHtml(card.question || '')}</div>
                  </div>
                </article>
              </div>
              <p class="meta" style="text-align:center; margin:.55rem 0 0;">לחיצה על הקלף חושפת את הצד השני</p>
              ${reshuffleBtn}
            </div>
          </div>
        </div>
      `;
    }

    function setView(view) {
      ensureShell();
      setAppFullscreen(false);
      setChromeVisible(true);
      currentView = view;
      ['draw', 'custom', 'all', 'about'].forEach(v => {
        const node = document.getElementById(`nav-${v}`);
        if (node) node.classList.toggle('active', v === view);
      });
      const host = document.getElementById('view');
      if (!host) return;
      if (view === 'draw') renderDrawView(host);
      else if (view === 'all') renderAllCardsView(host);
      else if (view === 'custom') renderCustomDeckView(host);
      else renderAboutView(host);
      saveState();
    }

    function renderDrawView(host) {
      host.innerHTML = `
        <div class="panel" style="min-height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; gap:0.8rem;">
          <h3 style="margin:0; font-size:1.35rem;">ערבוב ושליפה</h3>
          <p class="meta" style="max-width:34rem; margin:0;">דחוף/דחפי קלף החוצה מהקשת כדי לחשוף אותו.</p>
          <button class="btn" style="min-width:16rem;" onclick="startShuffleAndDraw()">התחל ערבוב ושליפה</button>
          <p class="meta" style="margin:0;">סה״כ קלפים זמינים: ${CARDS.length}</p>
        </div>
      `;
    }

    function renderAllCardsView(host) {
      const grouped = {};
      CARDS.forEach(card => {
        const realm = normalizeRealm(card.realm);
        if (!grouped[realm]) grouped[realm] = [];
        grouped[realm].push(card);
      });
      const realms = Object.keys(grouped);
      const rows = realms.length
        ? realms.map(realm => {
            const cards = grouped[realm].sort((a, b) => String(a.name || '').localeCompare(String(b.name || ''), 'he'));
            const cardsHtml = cards.map(card => `
              <div class="row" style="display:block; margin-bottom:0.45rem;">
                <div style="display:flex; align-items:center; justify-content:space-between; gap:0.6rem;">
                  <button
                    onclick="renderArchetypeCard('${escapeHtml(card.id)}', 'all')"
                    onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();renderArchetypeCard('${escapeHtml(card.id)}', 'all');}"
                    onpointerdown="startArchetypeListTap('${escapeHtml(card.id)}', event)"
                    onpointerup="finishArchetypeListTap('${escapeHtml(card.id)}', event)"
                    onpointercancel="cancelArchetypeListTap()"
                    ontouchstart="startArchetypeListTap('${escapeHtml(card.id)}', event)"
                    ontouchend="finishArchetypeListTap('${escapeHtml(card.id)}', event)"
                    ontouchcancel="cancelArchetypeListTap()"
                    class="touch-manipulation"
                    style="text-align:right; flex:1; background:transparent; border:0; color:inherit; cursor:pointer; font:inherit;"
                  >
                    <span style="font-weight:700;">${escapeHtml(card.name || '')}</span>
                  </button>
                  <button class="btn star-btn" onclick="event.stopPropagation(); toggleFavorite('${escapeHtml(card.id)}');">
                    ${favorites.has(card.id) ? '★' : '☆'}
                  </button>
                </div>
              </div>
            `).join('');
            return `
              <div style="padding-top:0.2rem;">
                <div class="group-title">${escapeHtml(realm)}</div>
                <div>${cardsHtml}</div>
              </div>
            `;
          }).join('')
        : `<div class="meta">אין קלפים להצגה כרגע.</div>`;
      host.innerHTML = `
        <div class="panel">
          ${rows}
        </div>
      `;
    }

    let archetypeListTapState = null;
    function startArchetypeListTap(cardId, ev) {
      const p = ev.touches && ev.touches[0] ? ev.touches[0] : ev;
      archetypeListTapState = {
        cardId,
        x: Number(p.clientX || 0),
        y: Number(p.clientY || 0),
        t: Date.now()
      };
    }

    function cancelArchetypeListTap() {
      archetypeListTapState = null;
    }

    function finishArchetypeListTap(cardId, ev) {
      if (!archetypeListTapState || archetypeListTapState.cardId !== cardId) return;
      const p = ev.changedTouches && ev.changedTouches[0] ? ev.changedTouches[0] : ev;
      const dx = Math.abs(Number(p.clientX || 0) - archetypeListTapState.x);
      const dy = Math.abs(Number(p.clientY || 0) - archetypeListTapState.y);
      const dt = Date.now() - archetypeListTapState.t;
      archetypeListTapState = null;
      if (dx > 10 || dy > 10 || dt > 450) return;
      renderArchetypeCard(cardId, 'all');
    }

    function renderCustomDeckView(host) {
      const realms = Array.from(new Set(CARDS.map(card => normalizeRealm(card.realm)))).sort((a, b) => a.localeCompare(b, 'he'));
      const selectedKeys = getSelectedDeckKeys();
      const selectedSet = new Set(selectedKeys);
      const counts = realms.reduce((acc, realm) => ({ ...acc, [realm]: CARDS.filter(c => normalizeRealm(c.realm) === realm).length }), {});
      const customPool = getCustomDeckPool();
      const row = (key, label, subtitle) => {
        const active = selectedSet.has(key);
        return `
          <button class="row ${active ? 'is-current' : ''}" data-deck-key="${escapeHtml(key)}" style="display:block; text-align:right;">
            <span>
              <strong>${escapeHtml(label)}</strong><br>
              <small>${escapeHtml(subtitle)}</small>
            </span>
            <small>${active ? '✓' : '□'}</small>
          </button>
        `;
      };
      host.innerHTML = `
        <div class="panel">
          <div class="filter-row">
            <button class="btn" id="deckSelectAll">בחר הכל</button>
            <button class="btn" id="deckClearAll">נקה הכל</button>
          </div>
          <div class="meta">בחר סט מועדפים ו/או ממלכות לשליפה מדויקת.</div>
          <div class="meta">קלפים זמינים בסט מותאם: ${customPool.length}</div>
          <div class="list" id="realmList">
            ${row('__favorites__', 'סט מועדפים', `${favorites.size} קלפים מסומנים כרגע`)}
            ${realms.map(realm => row(realm, realm, `${counts[realm] || 0} קלפים בממלכה זו`)).join('')}
          </div>
          <div class="filter-row" style="margin-top:0.75rem;">
            <button class="btn" id="customShuffleDraw" style="width:100%;">ערבוב ושליפה מהחפיסה המותאמת</button>
          </div>
        </div>
      `;
      const list = document.getElementById('realmList');
      if (list) {
        list.querySelectorAll('[data-deck-key]').forEach(btn => {
          btn.addEventListener('click', () => {
            const key = btn.dataset.deckKey;
            const next = new Set(getSelectedDeckKeys());
            if (next.has(key)) next.delete(key);
            else next.add(key);
            setSelectedDeckKeys(Array.from(next));
            setView('custom');
          });
        });
      }
      const selectAllBtn = document.getElementById('deckSelectAll');
      const clearAllBtn = document.getElementById('deckClearAll');
      const customDrawBtn = document.getElementById('customShuffleDraw');
      if (selectAllBtn) {
        selectAllBtn.addEventListener('click', () => {
          setSelectedDeckKeys(['__favorites__', ...realms]);
          setView('custom');
        });
      }
      if (clearAllBtn) {
        clearAllBtn.addEventListener('click', () => {
          setSelectedDeckKeys([]);
          setView('custom');
        });
      }
      if (customDrawBtn) {
        customDrawBtn.addEventListener('click', () => {
          startShuffleAndDraw(getCustomDeckPool(), 'custom');
        });
      }
    }

    function renderAboutView(host) {
      host.innerHTML = `
        <div class="panel">
          <h3>אודות ארכיטיפים של עונג</h3>
          <p class="about-note">מדריך קריאה מעשי ומעמיק, במבנה אקורדיון תואם לגרסת האנגלית.</p>
          <div class="about-stack">
            <details class="about-acc" open>
              <summary>לפני שמתחילים</summary>
              <div class="about-body">הקלפים הם הזמנה לתרגול חי: שליפה להפתעה, בניית חפיסה לפי ממלכה, וסימון מועדפים פעילים.\nהמטרה היא לא "תשובה נכונה", אלא חקירה של מה מהדהד בך עכשיו - רגשית, גופנית ודמיונית.</div>
            </details>
            <details class="about-acc">
              <summary>אור וצל</summary>
              <div class="about-body">יונג לימד שכל דמות של אור מטילה צל, וכל צל מסתיר בתוכו אור.\nבמלכה הזוהרת יכול לשכון גם צד רודני; בתמימות העדינה יכולה לחיות גם מפתה עזה. העבודה כאן אינה למחוק צדדים "לא נוחים", אלא להכיר בהם, לאהוב אותם, ולתת להם מקום מדויק ובטוח.\nהפנטזיות שאנחנו מתביישים בהן, הדחפים שאנחנו דוחקים, והרצונות שאנחנו מחביאים אפילו מעצמנו - לעיתים קרובות מחכים בדיוק שם, כדי שנפגוש אותם מתוך מודעות ולא מתוך הכחשה.</div>
            </details>
            <details class="about-acc">
              <summary>כוחו של דימוי</summary>
              <div class="about-body">למה צריך דימוי בכלל? כי אנחנו לא רק גוף - אנחנו גם סיפור, הקשר ומשמעות.\nאותה פעולה פיזית יכולה להיות משהו אחר לגמרי כשמצטרפת אליה זהות חיה: קשירה של ידיים היא פעולה; קשירה בתוך סיפור שבו אני שבויה שלך - היא עולם שלם.\nהדימוי מרחיב את החוויה מעבר לטכני, מפעיל דמיון, זיכרון רגשי ותשוקה יצירתית, והופך את אותו מגע למדויק, חי ובלתי נשכח.</div>
            </details>
            <details class="about-acc">
              <summary>לא תחפושת - התגלמות</summary>
              <div class="about-body">${aboutCopy('notDisguise')}</div>
            </details>
            <details class="about-acc">
              <summary>איך להשתמש בקלפים</summary>
              <div class="about-body">${aboutCopy('howToUse')}</div>
            </details>
            <details class="about-acc">
              <summary>עבודה עמוקה - שאלות חקירה</summary>
              <div class="about-body">אם מרגיש לך נכון להעמיק (לבד, בכתיבה, או בשיחה עם פרטנר/ית), אפשר לבחור קלף אחד ולתת לשאלות לעבוד בקצב שלך:\n• איזה רגשות הדמות מעוררת בי?\n• איזה רגשות היא מעוררת באחרים?\n• איך היא מתלבשת? באילו צבעים ומרקמים?\n• איך היא זזה ונושמת?\n• איפה היא מתעוררת לחיים (מרחב/זמן/הקשר)?\n• מה היא הכי רוצה עכשיו?\n• איך היא מבטאת מיניות וקצב?\n• מה המחיר כשאין לה מקום בחיים שלי?\n• איזו מתנה היא מביאה?\n• מה היא מבקשת מפרטנר/ית?\n• מהו המרחב הבטוח שלה?\n• מהו טקס הכניסה הקטן שלה?\n• מי הארכיטיפ המשלים שלה?\n\nתני לתשובות זמן. זו לא חקירה ולא מבחן - זו הזמנה. אם עולה רגש, זיכרון או תחושה בגוף, אפשר פשוט לתת להם מקום.</div>
            </details>
            <details class="about-acc">
              <summary>בטיחות ומודעות</summary>
              <div class="about-body">עבודה ארכיטיפית יכולה לגעת במקומות רגישים, בזיכרונות ובעומק רגשי. זה לא בהכרח מסוכן - אבל כן דורש כבוד.\nעקרונות בסיס: הסכמה מפורשת מראש, מילת ביטחון ברורה, וזכות עצירה מיידית בכל רגע ללא צורך בהסבר.\nמומלץ לעבד אחרי תרגול (כמה דקות שיחה, נשימה, כתיבה) כדי לאפשר למה שעלה להתייצב.\nסקרנות עדיפה על שיפוט; אין "ארכיטיפ נכון", יש חקירה קשובה ובטוחה.</div>
            </details>
            <details class="about-acc">
              <summary>הזמנה לתרגול</summary>
              <div class="about-body">${aboutCopy('invitation')}</div>
            </details>
          </div>
        </div>
      `;
    }

    function notify(message) {
      if (!toastEl) return;
      toastEl.textContent = String(message || '');
      toastEl.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toastEl.classList.remove('show');
      }, 2200);
    }

    function imageCandidates(src) {
      const s = String(src || '').trim();
      if (!s) return [];
      const dot = s.lastIndexOf('.');
      const base = dot > -1 ? s.slice(0, dot) : s;
      return [`${base}.webp`, `${base}.png`, `${base}.jpg`, `${base}.jpeg`];
    }

    function loadImage(src) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        const sep = src.includes('?') ? '&' : '?';
        img.src = `${src}${sep}v=${encodeURIComponent(MODULE_VERSION)}`;
      });
    }

    async function boot() {
      favorites = new Set(safeParse(FAVORITES_KEY, []));
      selectedRealms = new Set(safeParse(DECK_KEY, []));
      const prefs = safeParse(PREFS_KEY, {});
      favoritesOnly = Boolean(prefs && prefs.favoritesOnly);
      try {
        const res = await fetch(`../archetypes_he_data.json?v=${encodeURIComponent(MODULE_VERSION)}`, { cache: 'no-store' });
        if (!res.ok) throw new Error(`cards HTTP ${res.status}`);
        const data = await res.json();
        CARDS = normalizeCardsPayload(data);
      } catch {
        CARDS = [];
      }
      try {
        const res = await fetch(`./image-map.json?v=${encodeURIComponent(MODULE_VERSION)}`, { cache: 'no-store' });
        if (!res.ok) throw new Error(`image map HTTP ${res.status}`);
        const data = await res.json();
        const rows = Array.isArray(data.images) ? data.images : [];
        IMAGE_MAP = rows.reduce((acc, row) => {
          if (row && row.id && row.image) acc[row.id] = row.image;
          return acc;
        }, {});
      } catch {
        IMAGE_MAP = {};
      }
      try {
        const res = await fetch(`./about-copy-he.json?v=${encodeURIComponent(MODULE_VERSION)}`, { cache: 'no-store' });
        if (!res.ok) throw new Error(`about copy HTTP ${res.status}`);
        const payload = await res.json();
        if (payload && typeof payload === 'object') {
          ABOUT_COPY = { ...ABOUT_COPY_FALLBACK, ...payload };
        } else {
          ABOUT_COPY = { ...ABOUT_COPY_FALLBACK };
        }
      } catch {
        ABOUT_COPY = { ...ABOUT_COPY_FALLBACK };
      }
      const coverage = await probeImageCoverage();
      IMAGE_AVAILABLE = coverage.available;
      IMAGE_RESOLVED = coverage.resolved;
      current = null;
      const qp = new URLSearchParams(window.location.search);
      const requestedView = qp.get('initialView');
      const autoplayShuffle = qp.get('autoplayShuffle') === '1';
      const initialView = autoplayShuffle
        ? 'draw'
        : (['draw', 'custom', 'all', 'about'].includes(requestedView)
        ? requestedView
        : (['draw', 'custom', 'all', 'about'].includes(prefs.currentView) ? prefs.currentView : 'draw'));
      setView(initialView);
      if (autoplayShuffle && initialView === 'draw') {
        window.setTimeout(() => {
          startShuffleAndDraw();
        }, 120);
      }
    }

    async function probeImageCoverage() {
      const entries = Object.entries(IMAGE_MAP);
      const available = new Set();
      const resolved = {};
      await Promise.all(entries.map(async ([id, src]) => {
        const candidates = imageCandidates(src);
        for (const candidate of candidates) {
          // Try common extensions so asset uploads can be staged gradually.
          const ok = await loadImage(candidate);
          if (ok) {
            available.add(id);
            resolved[id] = candidate;
            break;
          }
        }
      }));
      return { available, resolved };
    }

    boot();
  </script>
</body>
