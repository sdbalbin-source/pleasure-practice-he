<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ארכיטיפים של עונג</title>
  <style>
    :root {
      --bg: #06050b;
      --panel: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.16);
      --text: #f4f2f8;
      --muted: #ccc7db;
      --accent: #b787ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: "Assistant", "Segoe UI", sans-serif; }
    .app { height: 100%; display: flex; flex-direction: column; padding: 1rem; gap: 0.8rem; }
    .top {
      display: flex; align-items: center; justify-content: space-between; gap: 0.6rem;
      border: 1px solid var(--border); border-radius: 0.9rem; background: var(--panel); padding: 0.65rem 0.8rem;
    }
    .top h1 { margin: 0; font-size: 1.2rem; font-weight: 700; }
    .btn {
      border: 1px solid var(--border); background: rgba(255,255,255,0.07); color: var(--text);
      border-radius: 0.7rem; padding: 0.5rem 0.8rem; cursor: pointer; font-size: 0.95rem;
    }
    .btn:hover { background: rgba(255,255,255,0.14); }
    .menu { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 0.5rem; }
    .menu .btn { font-weight: 600; }
    .menu .btn.active { background: rgba(183,135,255,0.27); border-color: rgba(183,135,255,0.5); }
    .view { flex: 1; min-height: 0; overflow: auto; }
    .grid { display: grid; gap: 0.8rem; grid-template-columns: minmax(280px, 440px) 1fr; }
    @media (max-width: 980px) { .menu { grid-template-columns: repeat(2, minmax(0,1fr)); } .grid { grid-template-columns: 1fr; } }
    .card-wrap, .panel {
      border: 1px solid var(--border); border-radius: 1rem; background: var(--panel);
      padding: 0.8rem; min-height: 0;
    }
    .flip { perspective: 1000px; width: 100%; aspect-ratio: 2 / 3; max-height: 72vh; margin: 0 auto; }
    .flip-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.25,1,0.5,1); }
    .flip-inner.flipped { transform: rotateY(180deg); }
    .face {
      position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 0.9rem; border: 1px solid rgba(183,135,255,0.38); overflow: hidden;
    }
    .front {
      background:
        radial-gradient(circle at 35% 25%, rgba(183,135,255,0.35), transparent 35%),
        radial-gradient(circle at 72% 74%, rgba(116,76,171,0.28), transparent 38%),
        linear-gradient(170deg, #1a1129, #0d0a13 70%);
      display: grid; place-items: center; text-align: center; padding: 1rem;
    }
    .front-art {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0;
      opacity: 0.96;
    }
    .front-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(8,6,14,0.78), rgba(8,6,14,0.12) 55%, rgba(8,6,14,0.62));
      z-index: 1;
    }
    .front-text { position: relative; z-index: 2; }
    .front h2 { margin: 0; font-size: 1.55rem; line-height: 1.25; font-weight: 700; }
    .front p { margin: 0.8rem 0 0; color: var(--muted); font-size: 0.95rem; }
    .back { transform: rotateY(180deg); background: linear-gradient(165deg, #0f0a16, #07050c 78%); display: flex; }
    .back-scroll { overflow: auto; padding: 0.9rem; width: 100%; }
    .back h3 { margin: 0 0 0.5rem; font-size: 1.3rem; color: #eadbff; }
    .meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 0.7rem; }
    .item { margin-bottom: 0.65rem; }
    .label { color: #cfa8ff; font-weight: 700; font-size: 0.9rem; }
    .value { color: #e8e5f0; font-size: 0.95rem; line-height: 1.55; white-space: pre-wrap; }
    .list { min-height: 0; overflow: auto; }
    .group-title { color: #dcb9ff; font-weight: 700; font-size: 0.94rem; margin: 0.55rem 0 0.3rem; padding-right: 0.2rem; }
    .row {
      width: 100%; text-align: right; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04);
      color: var(--text); border-radius: 0.7rem; padding: 0.45rem 0.6rem; margin-bottom: 0.35rem; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
    }
    .row small { color: var(--muted); font-size: 0.76rem; }
    .row:hover { background: rgba(255,255,255,0.11); }
    .star-btn { min-width: 2rem; padding: 0.25rem 0.4rem; }
    .filter-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
    .realm-option { display: flex; align-items: center; gap: 0.35rem; border: 1px solid var(--border); border-radius: 0.6rem; padding: 0.35rem 0.5rem; background: rgba(255,255,255,0.04); }
    .about-stack { display: grid; gap: 0.65rem; }
    .about-note { color: var(--muted); margin: 0 0 0.35rem; }
    .about-acc {
      border: 1px solid rgba(183,135,255,0.35);
      border-radius: 0.85rem;
      background: rgba(255,255,255,0.03);
      overflow: hidden;
    }
    .about-acc > summary {
      list-style: none;
      cursor: pointer;
      padding: 0.65rem 0.8rem;
      font-weight: 700;
      color: #efdfff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.6rem;
    }
    .about-acc > summary::-webkit-details-marker { display: none; }
    .about-acc > summary::before { content: '+'; color: #cfa8ff; font-size: 1.1rem; }
    .about-acc[open] > summary::before { content: '−'; }
    .about-body {
      padding: 0 0.8rem 0.8rem;
      color: #e8e5f0;
      line-height: 1.65;
      white-space: pre-wrap;
    }
    .status-chip {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(183,135,255,0.35);
      border-radius: 999px;
      padding: 0.2rem 0.6rem;
      margin-left: 0.35rem;
      background: rgba(183,135,255,0.12);
      font-size: 0.82rem;
      color: #eadbff;
    }
    .mono-box {
      margin-top: 0.6rem;
      border: 1px dashed rgba(183,135,255,0.35);
      border-radius: 0.65rem;
      padding: 0.55rem;
      background: rgba(13, 10, 22, 0.65);
      max-height: 180px;
      overflow: auto;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.8rem;
      line-height: 1.45;
      color: #dfd2f6;
      white-space: pre-wrap;
    }
    .spread-overlay {
      position: fixed; inset: 0; z-index: 30; background: rgba(4,3,8,0.82);
      display: none; align-items: center; justify-content: center; padding: 1rem;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .spread-overlay.show { display: flex; }
    .spread-wrap {
      width: min(980px, 100%); height: min(560px, 88vh); border: 1px solid var(--border); border-radius: 1rem;
      background: rgba(20,16,32,0.9); position: relative; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.45);
    }
    .spread-close { position: absolute; top: 0.65rem; left: 0.65rem; z-index: 3; }
    .spread-title { position: absolute; top: 0.8rem; right: 0.9rem; z-index: 2; font-size: 1rem; color: #eadbff; }
    .spread-stage { position: absolute; inset: 0; padding-top: 3rem; display: flex; align-items: center; justify-content: center; }
    .spread-card {
      position: absolute; width: clamp(120px, 20vw, 170px); aspect-ratio: 2 / 3; border-radius: 0.8rem;
      border: 1px solid rgba(255,255,255,0.28);
      background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)), url('./backside.png') center/cover no-repeat;
      box-shadow: 0 14px 40px rgba(0,0,0,0.34); cursor: grab; transform-origin: center 130%;
      transition: transform 360ms cubic-bezier(0.2, 0.9, 0.3, 1), box-shadow 260ms ease, filter 260ms ease;
      touch-action: none; user-select: none;
    }
    .spread-card:hover { filter: brightness(1.1); box-shadow: 0 18px 50px rgba(0,0,0,0.5); }
    .spread-card.chosen { z-index: 20 !important; transform: translate(-50%, -50%) scale(1.25) rotate(0deg) !important; box-shadow: 0 20px 70px rgba(130,80,220,0.55); filter: brightness(1.16); }
    .hint { position: absolute; bottom: 0.6rem; right: 0.9rem; color: var(--muted); font-size: 0.84rem; }
    @media (max-width: 720px) { .spread-wrap { height: min(520px, 86vh); } .spread-card { width: clamp(104px, 24vw, 132px); } }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <button class="btn" onclick="goBack()">חזרה לסטודיו</button>
      <h1>ארכיטיפים של עונג</h1>
      <button class="btn" onclick="setView('draw')">למסך שליפה</button>
    </div>
    <div class="menu">
      <button class="btn active" id="nav-draw" onclick="setView('draw')">Shuffle & Draw</button>
      <button class="btn" id="nav-custom" onclick="setView('custom')">Custom Deck</button>
      <button class="btn" id="nav-all" onclick="setView('all')">All Cards</button>
      <button class="btn" id="nav-about" onclick="setView('about')">About</button>
    </div>
    <div class="view" id="view"></div>
  </div>

  <div class="spread-overlay" id="spreadOverlay">
    <div class="spread-wrap">
      <button class="btn spread-close" onclick="closeSpread()">סגור</button>
      <div class="spread-title">ערבוב ושליפה - בחרי/בחר קלף מהפריסה</div>
      <div class="spread-stage" id="spreadStage"></div>
      <div class="hint">אפשר ללחוץ או למשוך קלף מהקשת</div>
    </div>
  </div>

  <script>
    const FAVORITES_KEY = 'archetype_he_favorites_v1';
    const DECK_KEY = 'archetype_he_deck_realms_v1';
    let CARDS = [];
    let IMAGE_MAP = {};
    let IMAGE_AVAILABLE = new Set();
    let IMAGE_RESOLVED = {};
    let current = null;
    let spreadCards = [];
    let dragState = null;
    let currentView = 'draw';
    let selectedRealms = new Set();
    let favoritesOnly = false;
    let favorites = new Set();
    const spreadOverlay = document.getElementById('spreadOverlay');
    const spreadStage = document.getElementById('spreadStage');

    function goBack() {
      if (window.parent && window.parent !== window) window.parent.postMessage({ type: 'he_module_back_home' }, '*');
      else window.location.href = '../index.html';
    }

    function normalizeRealm(v) {
      const t = String(v || '').trim();
      return t || 'ללא ממלכה';
    }

    function safeParse(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return fallback;
        return JSON.parse(raw);
      } catch {
        return fallback;
      }
    }

    function saveState() {
      localStorage.setItem(FAVORITES_KEY, JSON.stringify(Array.from(favorites)));
      localStorage.setItem(DECK_KEY, JSON.stringify(Array.from(selectedRealms)));
    }

    function getDeckCards() {
      let deck = CARDS.filter(card => selectedRealms.size ? selectedRealms.has(normalizeRealm(card.realm)) : true);
      if (favoritesOnly) deck = deck.filter(card => favorites.has(card.id));
      return deck;
    }

    function renderItem(label, value) {
      const v = String(value || '').trim();
      if (!v) return '';
      return `<div class="item"><div class="label">${label}</div><div class="value">${escapeHtml(v)}</div></div>`;
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function renderCard(card) {
      current = card;
      const host = document.getElementById('cardHost');
      if (!host || !card) return;
      const art = IMAGE_RESOLVED[card.id] || IMAGE_MAP[card.id] || '';
      const artHtml = art ? `<img src="${escapeHtml(art)}" alt="${escapeHtml(card.name || '')}" class="front-art" onerror="this.remove()">` : '';
      host.innerHTML = `
        <div class="flip">
          <div class="flip-inner" id="flipInner">
            <article class="face front">
              ${artHtml}
              <div class="front-overlay"></div>
              <div class="front-text">
                <h2>${escapeHtml(card.name || 'ללא שם')}</h2>
                <p>${escapeHtml(normalizeRealm(card.realm))} • ${escapeHtml(card.frequency || 'ללא תדר')}</p>
              </div>
            </article>
            <article class="face back">
              <div class="back-scroll">
                <h3>${escapeHtml(card.name || 'ללא שם')}</h3>
                <div class="meta">${escapeHtml(normalizeRealm(card.realm))} • ${escapeHtml(card.frequency || 'ללא תדר')}</div>
                ${renderItem('המהות', card.essence)}
                ${renderItem('המתנה', card.gift)}
                ${renderItem('הצל', card.shadow)}
                ${renderItem('הפרקטיקה', card.practice)}
                ${renderItem('השאלה', card.question)}
              </div>
            </article>
          </div>
        </div>
      `;
    }

    function toggleFlip() {
      const flipInner = document.getElementById('flipInner');
      if (flipInner) flipInner.classList.toggle('flipped');
    }

    function drawRandom() {
      const deck = getDeckCards();
      if (!deck.length) return;
      renderCard(deck[Math.floor(Math.random() * deck.length)]);
    }

    function shuffleArray(list) {
      const a = [...list];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function startShuffleAndDraw() {
      const deck = getDeckCards();
      if (!deck.length) return;
      spreadCards = shuffleArray(deck).slice(0, Math.min(7, deck.length));
      renderSpread();
      spreadOverlay.classList.add('show');
    }

    function closeSpread() {
      spreadOverlay.classList.remove('show');
      spreadStage.innerHTML = '';
      dragState = null;
    }

    function renderSpread() {
      spreadStage.innerHTML = '';
      const count = spreadCards.length;
      const step = count > 1 ? 50 / (count - 1) : 0;
      spreadCards.forEach((card, idx) => {
        const x = 25 + idx * step;
        const angle = -18 + idx * (36 / Math.max(1, count - 1));
        const y = 58 + Math.abs(idx - (count - 1) / 2) * 2.2;
        const el = document.createElement('button');
        el.type = 'button';
        el.className = 'spread-card';
        el.style.left = `${x}%`;
        el.style.top = `${y}%`;
        el.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;
        el.style.zIndex = String(10 + idx);
        el.addEventListener('click', () => chooseSpreadCard(card, el));
        el.addEventListener('pointerdown', (ev) => beginDrag(ev, card, el, angle));
        spreadStage.appendChild(el);
      });
    }

    function beginDrag(ev, card, el, baseAngle) {
      ev.preventDefault();
      el.setPointerCapture(ev.pointerId);
      dragState = { card, el, pointerId: ev.pointerId, startX: ev.clientX, startY: ev.clientY, baseAngle };
      el.addEventListener('pointermove', onDragMove);
      el.addEventListener('pointerup', onDragUp);
      el.addEventListener('pointercancel', onDragUp);
    }

    function onDragMove(ev) {
      if (!dragState || dragState.pointerId !== ev.pointerId) return;
      const dx = ev.clientX - dragState.startX;
      const dy = ev.clientY - dragState.startY;
      dragState.el.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) rotate(${dragState.baseAngle + dx * 0.05}deg)`;
      dragState.el.style.filter = 'brightness(1.13)';
    }

    function onDragUp(ev) {
      if (!dragState || dragState.pointerId !== ev.pointerId) return;
      const dx = ev.clientX - dragState.startX;
      const dy = ev.clientY - dragState.startY;
      const dist = Math.hypot(dx, dy);
      const { card, el } = dragState;
      el.releasePointerCapture(ev.pointerId);
      el.removeEventListener('pointermove', onDragMove);
      el.removeEventListener('pointerup', onDragUp);
      el.removeEventListener('pointercancel', onDragUp);
      dragState = null;
      if (dist > 42) chooseSpreadCard(card, el);
      else renderSpread();
    }

    function chooseSpreadCard(card, el) {
      const stageRect = spreadStage.getBoundingClientRect();
      el.classList.add('chosen');
      el.style.left = `${stageRect.width / 2}px`;
      el.style.top = `${stageRect.height / 2}px`;
      setTimeout(() => {
        closeSpread();
        renderCard(card);
      }, 360);
    }

    function toggleFavorite(id) {
      if (favorites.has(id)) favorites.delete(id);
      else favorites.add(id);
      saveState();
      setView(currentView);
    }

    function setView(view) {
      currentView = view;
      ['draw', 'custom', 'all', 'about'].forEach(v => {
        const node = document.getElementById(`nav-${v}`);
        if (node) node.classList.toggle('active', v === view);
      });
      const host = document.getElementById('view');
      if (!host) return;
      if (view === 'draw') renderDrawView(host);
      else if (view === 'all') renderAllCardsView(host);
      else if (view === 'custom') renderCustomDeckView(host);
      else renderAboutView(host);
    }

    function renderDrawView(host) {
      host.innerHTML = `
        <div class="grid">
          <div class="card-wrap"><div id="cardHost"></div></div>
          <div class="panel">
            <div class="filter-row">
              <button class="btn" onclick="startShuffleAndDraw()">ערבוב ושליפה</button>
              <button class="btn" onclick="drawRandom()">שליפה אקראית</button>
              <button class="btn" onclick="toggleFlip()">היפוך</button>
            </div>
            <div class="meta">גודל דק פעיל: ${getDeckCards().length} קלפים</div>
            <div class="list" id="drawList"></div>
          </div>
        </div>
      `;
      renderCard(current || getDeckCards()[0] || CARDS[0]);
      renderCompactList('drawList');
    }

    function renderCompactList(id) {
      const panel = document.getElementById(id);
      if (!panel) return;
      const deck = getDeckCards();
      if (!deck.length) {
        panel.innerHTML = '<div class="meta">אין קלפים בדק הנוכחי. עדכן בחירה ב-Custom Deck.</div>';
        return;
      }
      let html = '';
      deck.slice(0, 18).forEach(card => {
        const fav = favorites.has(card.id) ? '★' : '☆';
        html += `<button class="row" data-id="${escapeHtml(card.id)}"><span>${escapeHtml(card.name)}</span><small>${fav}</small></button>`;
      });
      panel.innerHTML = html;
      panel.querySelectorAll('.row').forEach(btn => {
        btn.addEventListener('click', () => {
          const card = deck.find(c => String(c.id) === String(btn.dataset.id));
          if (card) renderCard(card);
        });
      });
    }

    function renderAllCardsView(host) {
      const groups = new Map();
      CARDS.forEach(card => {
        const realm = normalizeRealm(card.realm);
        if (!groups.has(realm)) groups.set(realm, []);
        groups.get(realm).push(card);
      });
      const realms = Array.from(groups.keys()).sort((a, b) => a.localeCompare(b, 'he'));
      let html = '<div class="panel">';
      realms.forEach(realm => {
        html += `<div class="group-title">${escapeHtml(realm)} (${groups.get(realm).length})</div>`;
        groups.get(realm).forEach(card => {
          const fav = favorites.has(card.id) ? '★' : '☆';
          html += `
            <div class="row" data-open="${escapeHtml(card.id)}">
              <span>${escapeHtml(card.name)}</span>
              <span>
                <small>${escapeHtml(card.frequency || '')}</small>
                <button class="btn star-btn" data-fav="${escapeHtml(card.id)}">${fav}</button>
              </span>
            </div>
          `;
        });
      });
      html += '</div>';
      host.innerHTML = html;
      host.querySelectorAll('[data-open]').forEach(row => {
        row.addEventListener('click', (ev) => {
          if (ev.target && ev.target.matches('[data-fav]')) return;
          const card = CARDS.find(c => c.id === row.dataset.open);
          if (!card) return;
          current = card;
          setView('draw');
        });
      });
      host.querySelectorAll('[data-fav]').forEach(btn => {
        btn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          toggleFavorite(btn.dataset.fav);
        });
      });
    }

    function renderCustomDeckView(host) {
      const realms = Array.from(new Set(CARDS.map(card => normalizeRealm(card.realm)))).sort((a, b) => a.localeCompare(b, 'he'));
      const counts = realms.reduce((acc, realm) => ({ ...acc, [realm]: CARDS.filter(c => normalizeRealm(c.realm) === realm).length }), {});
      host.innerHTML = `
        <div class="panel">
          <div class="filter-row">
            <button class="btn" onclick="selectAllRealms()">בחר הכל</button>
            <button class="btn" onclick="clearRealms()">נקה הכל</button>
            <button class="btn" onclick="favoritesOnly = !favoritesOnly; setView('custom')">${favoritesOnly ? 'מועדפים בלבד: פעיל' : 'מועדפים בלבד: כבוי'}</button>
            <button class="btn" onclick="setView('draw')">החל ועבור לשליפה</button>
          </div>
          <div class="meta">סמן ממלכות לדק מותאם אישית. אם לא מסומן כלום - כל הקלפים בדק.</div>
          <div class="list" id="realmList"></div>
        </div>
      `;
      const list = document.getElementById('realmList');
      let html = '';
      realms.forEach(realm => {
        const checked = selectedRealms.has(realm) ? 'checked' : '';
        html += `
          <label class="realm-option">
            <input type="checkbox" data-realm="${escapeHtml(realm)}" ${checked}>
            <span>${escapeHtml(realm)} (${counts[realm]})</span>
          </label>
        `;
      });
      list.innerHTML = html;
      list.querySelectorAll('[data-realm]').forEach(input => {
        input.addEventListener('change', () => {
          const realm = input.dataset.realm;
          if (input.checked) selectedRealms.add(realm);
          else selectedRealms.delete(realm);
          saveState();
        });
      });
    }

    function selectAllRealms() {
      selectedRealms = new Set(CARDS.map(card => normalizeRealm(card.realm)));
      saveState();
      setView('custom');
    }

    function clearRealms() {
      selectedRealms = new Set();
      saveState();
      setView('custom');
    }

    function renderAboutView(host) {
      const expected = Object.keys(IMAGE_MAP).length;
      const available = IMAGE_AVAILABLE.size;
      const missing = Math.max(0, expected - available);
      const missingList = CARDS
        .filter(card => IMAGE_MAP[card.id] && !IMAGE_AVAILABLE.has(card.id))
        .map(card => IMAGE_MAP[card.id])
        .join('\n');
      host.innerHTML = `
        <div class="panel">
          <h3>About Archetypes of Pleasure</h3>
          <p class="about-note">קריאה מקדימה + סטטוס מודול עברי על אותה תשתית אנגלית.</p>
          <div class="about-stack">
            <details class="about-acc" open>
              <summary>לפני שמתחילים</summary>
              <div class="about-body">הקלפים כאן נועדו לחקירה רגשית-אנרגטית דרך דימויים ארכיטיפיים.\nאפשר לשלוף אקראית, לבנות דק מותאם לפי ממלכות, או לעבור על כל הקלפים ולסמן מועדפים.</div>
            </details>
            <details class="about-acc">
              <summary>אור וצל</summary>
              <div class="about-body">כל ארכיטיפ מחזיק גם מתנה וגם צל.\nהמטרה אינה לשפוט או "לתקן", אלא לזהות, לתת מקום, ולבחור איך לעבוד עם האנרגיה הזו באופן מודע ובטוח.</div>
            </details>
            <details class="about-acc">
              <summary>איך להשתמש בקלפים</summary>
              <div class="about-body">• לבד: לבחור קלף ולשאול מה הוא מעיר בך.\n• בזוג: לבחור קלף משותף ולתרגם אותו למשחק, שפה, וקצב.\n• כשיחה: להשתמש בקלף כדי לדבר על רצונות, גבולות ופנטזיות.</div>
            </details>
            <details class="about-acc">
              <summary>בטיחות ומודעות</summary>
              <div class="about-body">העבודה הארכיטיפית יכולה לפתוח תכנים עמוקים.\nתמיד בהסכמה, עם מילת ביטחון, ועם עיבוד קצר אחרי התרגול. סקרנות עדיפה על שיפוט.</div>
            </details>
            <details class="about-acc">
              <summary>סטטוס נכסים חזותיים</summary>
              <div class="about-body">מיפוי תמונות חזית מוכן.
<span class="status-chip">נדרש: ${expected}</span>
<span class="status-chip">ממופה: ${available}</span>
<span class="status-chip">חסר להשלמה: ${missing}</span>
\nהמערכת כבר מחפשת תמונות לפי image-map. ברגע שמעלים קבצים בפורמט המצופה - הכרטיסים יציגו חזית ויזואלית אוטומטית.</div>
              <div class="about-body">פורמטים נתמכים אוטומטית: <strong>.webp</strong>, <strong>.png</strong>, <strong>.jpg</strong>, <strong>.jpeg</strong></div>
              <div class="filter-row">
                <button class="btn" onclick="copyMissingImageList()">העתק רשימת קבצים חסרים</button>
              </div>
              <div class="mono-box" id="missingImageList">${escapeHtml(missingList || 'אין כרגע פריטים חסרים לפי המיפוי.')}</div>
            </details>
          </div>
        </div>
      `;
    }

    function copyMissingImageList() {
      const text = CARDS
        .filter(card => IMAGE_MAP[card.id] && !IMAGE_AVAILABLE.has(card.id))
        .map(card => IMAGE_MAP[card.id])
        .join('\n');
      const payload = text || 'אין כרגע קבצים חסרים לפי המיפוי.';
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(payload).then(() => alert('רשימת הקבצים הועתקה.')).catch(() => alert(payload));
      } else {
        alert(payload);
      }
    }

    function imageCandidates(src) {
      const s = String(src || '').trim();
      if (!s) return [];
      const dot = s.lastIndexOf('.');
      const base = dot > -1 ? s.slice(0, dot) : s;
      return [`${base}.webp`, `${base}.png`, `${base}.jpg`, `${base}.jpeg`];
    }

    function loadImage(src) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = `${src}?v=${Date.now()}`;
      });
    }

    async function boot() {
      favorites = new Set(safeParse(FAVORITES_KEY, []));
      selectedRealms = new Set(safeParse(DECK_KEY, []));
      try {
        const res = await fetch('../archetypes_he_data.json', { cache: 'no-store' });
        const data = await res.json();
        CARDS = Array.isArray(data.cards) ? data.cards : [];
      } catch {
        CARDS = [];
      }
      try {
        const res = await fetch('./image-map.json', { cache: 'no-store' });
        const data = await res.json();
        const rows = Array.isArray(data.images) ? data.images : [];
        IMAGE_MAP = rows.reduce((acc, row) => {
          if (row && row.id && row.image) acc[row.id] = row.image;
          return acc;
        }, {});
      } catch {
        IMAGE_MAP = {};
      }
      const coverage = await probeImageCoverage();
      IMAGE_AVAILABLE = coverage.available;
      IMAGE_RESOLVED = coverage.resolved;
      current = CARDS[0] || null;
      setView('draw');
    }

    async function probeImageCoverage() {
      const entries = Object.entries(IMAGE_MAP);
      const available = new Set();
      const resolved = {};
      await Promise.all(entries.map(async ([id, src]) => {
        const candidates = imageCandidates(src);
        for (const candidate of candidates) {
          // Try common extensions so asset uploads can be staged gradually.
          const ok = await loadImage(candidate);
          if (ok) {
            available.add(id);
            resolved[id] = candidate;
            break;
          }
        }
      }));
      return { available, resolved };
    }

    boot();
  </script>
</body>
</html>
