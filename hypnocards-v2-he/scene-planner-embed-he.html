<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scene Planner Embed HE</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: 0; background: #000; display: block; }
  </style>
</head>
<body>
  <iframe id="plannerFrame" title="מצפן התשוקות"></iframe>
  <script>
    const frame = document.getElementById('plannerFrame');
    const params = new URLSearchParams(window.location.search);
    const hashParams = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
    const sharedFromHash = hashParams.get('shared') || '';
    const shareIdFromHash = hashParams.get('shareId') || '';
    if (sharedFromHash && !params.get('shared')) {
      params.set('shared', sharedFromHash);
    }
    if (shareIdFromHash && !params.get('shareId')) {
      params.set('shareId', shareIdFromHash);
    }
    const src = `./planner-he/index.html?${params.toString()}`;
    frame.src = src;

    // Bridge planner <-> shell postMessage communication.
    window.addEventListener('message', (event) => {
      if (event.origin !== window.location.origin) return;
      if (event.source === frame.contentWindow) {
        // Forward planner events to shell parent.
        window.parent?.postMessage?.(event.data, window.location.origin);
      } else if (event.source === window.parent) {
        // Forward shell requests (e.g. planner_request_save) to planner iframe.
        frame.contentWindow?.postMessage?.(event.data, window.location.origin);
      }
    });
  </script>
</body>
</html>
