        function getRecordingFormat() {
            const probeAudio = document.createElement('audio');
            const candidates = [
                { mimeType: 'audio/webm;codecs=opus', ext: 'webm' },
                { mimeType: 'audio/mp4', ext: 'm4a' },
                { mimeType: 'audio/webm', ext: 'webm' },
                { mimeType: 'audio/ogg;codecs=opus', ext: 'ogg' }
            ];
            for (const format of candidates) {
                const canRecord = window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(format.mimeType);
                const canPlay = !format.mimeType || !!probeAudio.canPlayType(format.mimeType);
                if (canRecord && canPlay) {
                    return format;
                }
            }
            return { mimeType: '', ext: 'webm' };
        }

        function startRecordingMonitor(stream, btn) {
            try {
                monitorAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = monitorAudioContext.createMediaStreamSource(stream);
                monitorAnalyser = monitorAudioContext.createAnalyser();
                monitorAnalyser.fftSize = 256;
                monitorDataArray = new Uint8Array(monitorAnalyser.frequencyBinCount);
                source.connect(monitorAnalyser);

                const tick = () => {
                    if (!monitorAnalyser || !btn) return;
                    monitorAnalyser.getByteTimeDomainData(monitorDataArray);
                    let sum = 0;
                    for (let i = 0; i < monitorDataArray.length; i++) {
                        const v = (monitorDataArray[i] - 128) / 128;
                        sum += v * v;
                    }
                    const rms = Math.sqrt(sum / monitorDataArray.length);
                    const level = Math.min(1, rms * 4.5);
                    recordingPeakLevel = Math.max(recordingPeakLevel, level);
                    btn.style.setProperty('--rec-level', String(level.toFixed(3)));
                    monitorAnimationFrame = requestAnimationFrame(tick);
                };
                tick();
            } catch (e) {
                // Visualization is optional; ignore monitor failures.
            }
        }

        function stopRecordingMonitor(btn) {
            if (monitorAnimationFrame) cancelAnimationFrame(monitorAnimationFrame);
            monitorAnimationFrame = null;
            monitorDataArray = null;
            monitorAnalyser = null;
            if (monitorAudioContext) {
                monitorAudioContext.close().catch(() => {});
                monitorAudioContext = null;
            }
            if (btn) btn.style.removeProperty('--rec-level');
        }

        function toggleRecording() {
            AppState.isRecording = !AppState.isRecording;
            const btn = document.getElementById('recordBtn');

            if (AppState.isRecording) {
                // Start recording
                navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                })
                    .then(stream => {
                        recordingStream = stream;
                        recordingPeakLevel = 0;
                        audioChunks = [];
                        const format = getRecordingFormat();
                        recordingMimeType = format.mimeType;
                        recordingExtension = format.ext;
                        mediaRecorder = recordingMimeType ? new MediaRecorder(stream, { mimeType: recordingMimeType }) : new MediaRecorder(stream);
                        mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) audioChunks.push(e.data); };
                        mediaRecorder.start(250);

                        btn.classList.remove('bg-purple-600', 'text-white', 'shadow-[0_0_20px_rgba(147,51,234,0.3)]');
                        btn.classList.add('recording-pulse', 'recording-live', 'bg-red-500/10', 'border', 'border-red-500');
                        btn.innerHTML = '<i data-lucide="square"></i>';
                        lucide.createIcons();
                        startRecordingMonitor(stream, btn);
                    })
                    .catch(() => {
                        AppState.isRecording = false;
                        alert('Microphone access denied. Please allow microphone access and try again.');
                    });

            } else {
                // Stop and download
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.onstop = () => {
                        const blobType = recordingMimeType || mediaRecorder.mimeType || 'audio/webm';
                        const blob = new Blob(audioChunks, { type: blobType });
                        if (blob.size < 1024) {
                            alert('Recording is empty. Please check microphone permissions and try again.');
                            return;
                        }
                        const now = new Date();
                        const pad = n => String(n).padStart(2, '0');
                        const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
                        const timeStr = `${pad(now.getHours())}-${pad(now.getMinutes())}`;
                        const card = getCurrentCard();
                        const suggestedName = `${card.pattern} - ${AppState.currentTheme} - ${dateStr} ${timeStr}`
                            .replace(/[\\/:*?"<>|]/g, '')
                            .trim();
                        const chosenName = prompt('Name this recording:', suggestedName);
                        const safeName = (chosenName && chosenName.trim() ? chosenName.trim() : suggestedName)
                            .replace(/[\\/:*?"<>|]/g, '');

                        // Save metadata to archive
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            AppState.recordings.unshift({
                                id: Date.now(),
                                name: safeName,
                                extension: recordingExtension,
                                date: `${dateStr} ${pad(now.getHours())}:${pad(now.getMinutes())}`,
                                pattern: card.pattern,
                                theme: AppState.currentTheme,
                                mimeType: blobType,
                                audioDataUrl: reader.result
                            });
                            try {
                                localStorage.setItem('en_recordings_v1', JSON.stringify(AppState.recordings));
                            } catch (e) {
                                // If storage is full, keep metadata without embedded audio.
                                const latest = AppState.recordings[0];
                                if (latest) latest.audioDataUrl = null;
                                localStorage.setItem('en_recordings_v1', JSON.stringify(AppState.recordings));
                                alert('Saved recording metadata, but device storage is full for in-app playback.');
                            }
                            if (recordingPeakLevel < 0.03) {
                                alert('Very low microphone signal detected. If using Bluetooth earbuds/headset, switch the call/microphone source in your phone settings and try again.');
                            }
                        };
                        reader.readAsDataURL(blob);

                        // Stop all tracks
                        if (recordingStream) recordingStream.getTracks().forEach(t => t.stop());
                        recordingStream = null;
                    };
                    if (mediaRecorder.state === 'recording') {
                        try { mediaRecorder.requestData(); } catch (e) {}
                    }
                    mediaRecorder.stop();
                }

                btn.classList.add('bg-purple-600', 'text-white', 'shadow-[0_0_20px_rgba(147,51,234,0.3)]');
                btn.classList.remove('recording-pulse', 'recording-live', 'bg-red-500/10', 'border', 'border-red-500');
                btn.innerHTML = '<i data-lucide="mic"></i>';
                lucide.createIcons();
                stopRecordingMonitor(btn);
            }
        }

        function clearData() {
            if (confirm('This will delete all saved data including recordings.\nContinue?')) {
                localStorage.clear();
                location.reload();
            }
        }

        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredInstallPrompt = e;
            updateInstallButtons();
        });

        window.addEventListener('appinstalled', () => {
            deferredInstallPrompt = null;
            updateInstallButtons();
        });

        if ('serviceWorker' in navigator) {
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
            });

            window.addEventListener('load', () => {
                navigator.serviceWorker.register(`sw.js?v=${SW_BUILD}`).then(reg => {
                    const activateUpdate = () => {
                        if (reg.waiting) {
                            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                        }
                    };
                    if (reg.waiting) activateUpdate();
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        if (!newWorker) return;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                activateUpdate();
                            }
                        });
                    });
                }).catch(() => {});
            });
        }

        Promise.all([ensureCategoryInfoLoaded(), loadArchetypesData(), loadHypnoGuidebookData()]).finally(() => {
            renderWelcome();
        });

    </script>
</body>
</html>
