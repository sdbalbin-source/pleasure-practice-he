<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HypnoCards">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>HypnoCards - Master Edition V6</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* --- Core Styles --- */
        :root {
            --primary-bg: #000000;
            --card-glass: rgba(20, 20, 25, 0.95);
            --border-glass: rgba(255, 255, 255, 0.15);
        }

        body {   
            font-family: 'DM Mono', monospace;
            background-color: var(--primary-bg);   
            color: #e0e0e0;   
            overflow: hidden;   
            user-select: none;   
            -webkit-tap-highlight-color: transparent;   
        }
        .serif-font { font-family: 'Cormorant Garamond', serif; }
        
        /* --- Hypnotic Spiral Background --- */
        .hypno-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
            z-index: -2;
            background: #000;
        }

        .hypno-spiral {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150vmax;
            height: 150vmax;
            transform-origin: center;
            transform: translate(-50%, -50%);
            animation: spinSpiral 10s linear infinite;
            animation-play-state: running;
            will-change: transform;
            opacity: 0.78;
        }

        @keyframes spinSpiral {   
            from { transform: translate(-50%, -50%) rotate(0deg); }   
            to { transform: translate(-50%, -50%) rotate(-360deg); }   
        }
        
        /* Vignette */
        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 20%, black 85%);
            pointer-events: none;
            z-index: -1;
        }

        /* UI Elements */
        .glass-panel {
            background: var(--card-glass);   
            backdrop-filter: blur(20px);   
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);   
            box-shadow: 0 15px 50px 0 rgba(0, 0, 0, 0.8);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        button.glass-panel:hover {
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 15px 50px 0 rgba(0,0,0,0.8), 0 0 30px rgba(147, 51, 234, 0.15);
        }
        .module-home-card {
            text-align: center;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.11) 0%, rgba(255, 255, 255, 0.07) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 14px 36px rgba(0, 0, 0, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }
        .module-home-card h3 {
            letter-spacing: 0.01em;
        }
        .module-home-card p {
            max-width: 28ch;
            margin: 0.35rem auto 0;
        }

        /* Card Styles */
        .card-container { perspective: 1000px; width: 100%; height: 100%; position: relative; }
        .card-inner {   
            width: 100%; height: 100%; position: relative;   
            transition: transform 0.55s cubic-bezier(0.25, 1, 0.5, 1);
            transform-style: preserve-3d;   
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 1.5rem;   
            display: flex; flex-direction: column;   
            overflow: hidden;   
        }
        .card-face-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform: rotateY(180deg);
            border-radius: 1.5rem;
            display: flex; flex-direction: column;
            overflow: hidden;
            background: rgba(20,10,40,0.97);
            border: 4px solid #a855f7;
            box-shadow: 0 15px 50px 0 rgba(0,0,0,0.8);
        }

        /* Info button */
        .info-btn {
            position: absolute; top: 12px; right: 12px; z-index: 50;
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.5);
            font-family: 'DM Mono', monospace;
            font-size: 13px; font-style: italic; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .info-btn:hover { background: rgba(168,85,247,0.2); border-color: rgba(168,85,247,0.6); color: #c084fc; }
        
        /* Sticky Header */
        .card-header-fixed {
            flex: 0 0 auto;   
            padding: 2.5rem 1.5rem 1.5rem 1.5rem;   
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }

        /* Scroll Area */
        .card-scroll-area {
            flex: 1 1 auto;   
            min-height: 0;
            overflow-y: auto;   
            overflow-x: hidden;
            padding: 1.5rem;
            text-align: center;
            display: flex;
            flex-direction: column;
        }
        
        .card-content-wrapper {
            margin: auto 0;
            width: 100%;
        }
        
        /* Sticky Footer */
        .card-footer-fixed {
            flex: 0 0 auto;
            padding: 1rem;
            background: rgba(0,0,0,0.6);
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }

        /* Custom Scrollbar */
        .card-scroll-area::-webkit-scrollbar { width: 4px; }
        .card-scroll-area::-webkit-scrollbar-track { background: transparent; }
        .card-scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* Card content bold highlight */
        .card-content-text strong {
            font-style: italic;
            color: #c9a96e;
            font-weight: 700;
        }

        /* Archetypes: shuffle overlay (cross-cut + riffle merge) */
        .archetype-shuffle-overlay {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(ellipse 120% 80% at 50% 45%, rgba(35, 22, 48, 0.94) 0%, rgba(5, 4, 8, 0.97) 55%, #020103 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            overflow: hidden;
        }
        .archetype-shuffle-overlay::before {
            content: '';
            position: absolute;
            inset: -20%;
            background: radial-gradient(circle at 30% 20%, rgba(120, 60, 140, 0.12), transparent 45%),
                radial-gradient(circle at 70% 80%, rgba(60, 40, 90, 0.15), transparent 40%);
            pointer-events: none;
        }
        .archetype-shuffle-hub {
            position: relative;
            width: min(92vw, 360px);
            height: min(52vh, 280px);
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 900px;
        }
        .archetype-shuffle-table-glow {
            position: absolute;
            width: min(82vw, 320px);
            height: min(50vw, 190px);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 125, 0.24), transparent 70%);
            filter: blur(10px);
            opacity: 0.6;
        }
        .archetype-shuffle-riffle {
            position: relative;
            transform-style: preserve-3d;
            width: min(84vw, 330px);
            height: min(44vw, 190px);
            animation: archetypeRiffleGroup 1.75s cubic-bezier(0.45, 0, 0.2, 1) forwards;
        }
        .archetype-shuffle-pack {
            position: absolute;
            top: 50%;
            width: min(40vw, 130px);
            aspect-ratio: 2 / 3;
            transform-style: preserve-3d;
        }
        .archetype-shuffle-pack.left {
            left: 5%;
            transform: translateY(-50%) rotate(-11deg);
            animation: archetypePackLeft 1.75s cubic-bezier(0.45, 0, 0.2, 1) forwards;
        }
        .archetype-shuffle-pack.right {
            right: 5%;
            transform: translateY(-50%) rotate(11deg);
            animation: archetypePackRight 1.75s cubic-bezier(0.45, 0, 0.2, 1) forwards;
        }
        .archetype-shuffle-card {
            position: absolute;
            inset: 0;
            border-radius: 5px;
            background-size: cover;
            background-position: center;
            box-shadow:
                0 14px 36px rgba(0, 0, 0, 0.72),
                0 0 0 1px rgba(212, 175, 125, 0.22);
            transform-origin: 50% 90%;
        }
        .archetype-shuffle-pack.left .archetype-shuffle-card:nth-child(1) { --slot: -2; z-index: 2; animation: archetypeLeftCard1 1.75s ease-in-out forwards; }
        .archetype-shuffle-pack.left .archetype-shuffle-card:nth-child(2) { --slot: -1; z-index: 4; animation: archetypeLeftCard2 1.75s ease-in-out forwards; }
        .archetype-shuffle-pack.left .archetype-shuffle-card:nth-child(3) { --slot: 0; z-index: 6; animation: archetypeLeftCard3 1.75s ease-in-out forwards; }
        .archetype-shuffle-pack.left .archetype-shuffle-card:nth-child(4) { --slot: 1; z-index: 8; animation: archetypeLeftCard4 1.75s ease-in-out forwards; }
        .archetype-shuffle-pack.left .archetype-shuffle-card:nth-child(5) { --slot: 2; z-index: 10; animation: archetypeLeftCard5 1.75s ease-in-out forwards; }
        .archetype-shuffle-pack.right .archetype-shuffle-card:nth-child(1) { --slot: -2; z-index: 3; animation: archetypeRightCard1 1.75s ease-in-out forwards; }
        .archetype-shuffle-pack.right .archetype-shuffle-card:nth-child(2) { --slot: -1; z-index: 5; animation: archetypeRightCard2 1.75s ease-in-out forwards; }
        .archetype-shuffle-pack.right .archetype-shuffle-card:nth-child(3) { --slot: 0; z-index: 7; animation: archetypeRightCard3 1.75s ease-in-out forwards; }
        .archetype-shuffle-pack.right .archetype-shuffle-card:nth-child(4) { --slot: 1; z-index: 9; animation: archetypeRightCard4 1.75s ease-in-out forwards; }
        .archetype-shuffle-pack.right .archetype-shuffle-card:nth-child(5) { --slot: 2; z-index: 11; animation: archetypeRightCard5 1.75s ease-in-out forwards; }
        .archetype-shuffle-shine {
            position: absolute;
            width: min(70vw, 240px);
            height: min(70vw, 240px);
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(212, 175, 125, 0.35) 0%, transparent 65%);
            opacity: 0;
            animation: archetypeShuffleShine 1.75s ease-out forwards;
            filter: blur(16px);
        }
        .archetype-shuffle-caption {
            margin-top: 1.75rem;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem;
            letter-spacing: 0.08em;
            color: rgba(245, 230, 210, 0.88);
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.8);
        }
        @keyframes archetypeRiffleGroup {
            0% { transform: translateY(8px) scale(1); }
            30% { transform: translateY(0) scale(1.03); }
            72% { transform: translateY(-6px) scale(1.04); }
            100% { transform: translateY(0) scale(1); }
        }
        @keyframes archetypePackLeft {
            0% { transform: translateY(-50%) translateX(0) rotate(-11deg); }
            35% { transform: translateY(-50%) translateX(36px) rotate(-4deg); }
            68% { transform: translateY(-50%) translateX(80px) rotate(0deg); }
            100% { transform: translateY(-50%) translateX(58px) rotate(0deg); }
        }
        @keyframes archetypePackRight {
            0% { transform: translateY(-50%) translateX(0) rotate(11deg); }
            35% { transform: translateY(-50%) translateX(-36px) rotate(4deg); }
            68% { transform: translateY(-50%) translateX(-80px) rotate(0deg); }
            100% { transform: translateY(-50%) translateX(-58px) rotate(0deg); }
        }
        @keyframes archetypeLeftCard1 {
            0%, 22% { transform: translate3d(0, 10px, 1px) rotate(-3deg); }
            46% { transform: translate3d(30px, 0, 60px) rotate(3deg); }
            74% { transform: translate3d(66px, -14px, 120px) rotate(0deg); }
            100% { transform: translate3d(56px, -8px, 0) rotate(0deg); }
        }
        @keyframes archetypeLeftCard2 {
            0%, 22% { transform: translate3d(0, 5px, 2px) rotate(-2deg); }
            46% { transform: translate3d(34px, -2px, 64px) rotate(2deg); }
            74% { transform: translate3d(70px, -9px, 125px) rotate(0deg); }
            100% { transform: translate3d(58px, -5px, 0) rotate(0deg); }
        }
        @keyframes archetypeLeftCard3 {
            0%, 22% { transform: translate3d(0, 0, 3px) rotate(-1deg); }
            46% { transform: translate3d(38px, -4px, 68px) rotate(1deg); }
            74% { transform: translate3d(74px, -4px, 130px) rotate(0deg); }
            100% { transform: translate3d(60px, -2px, 0) rotate(0deg); }
        }
        @keyframes archetypeLeftCard4 {
            0%, 22% { transform: translate3d(0, -5px, 4px) rotate(1deg); }
            46% { transform: translate3d(42px, -6px, 72px) rotate(0deg); }
            74% { transform: translate3d(78px, 2px, 134px) rotate(0deg); }
            100% { transform: translate3d(62px, 2px, 0) rotate(0deg); }
        }
        @keyframes archetypeLeftCard5 {
            0%, 22% { transform: translate3d(0, -10px, 5px) rotate(2deg); }
            46% { transform: translate3d(46px, -8px, 76px) rotate(-1deg); }
            74% { transform: translate3d(82px, 7px, 138px) rotate(0deg); }
            100% { transform: translate3d(64px, 5px, 0) rotate(0deg); }
        }
        @keyframes archetypeRightCard1 {
            0%, 22% { transform: translate3d(0, -10px, 1px) rotate(3deg); }
            46% { transform: translate3d(-30px, -8px, 58px) rotate(-3deg); }
            74% { transform: translate3d(-66px, 7px, 118px) rotate(0deg); }
            100% { transform: translate3d(-56px, 5px, 0) rotate(0deg); }
        }
        @keyframes archetypeRightCard2 {
            0%, 22% { transform: translate3d(0, -5px, 2px) rotate(2deg); }
            46% { transform: translate3d(-34px, -6px, 62px) rotate(-2deg); }
            74% { transform: translate3d(-70px, 2px, 123px) rotate(0deg); }
            100% { transform: translate3d(-58px, 2px, 0) rotate(0deg); }
        }
        @keyframes archetypeRightCard3 {
            0%, 22% { transform: translate3d(0, 0, 3px) rotate(1deg); }
            46% { transform: translate3d(-38px, -4px, 66px) rotate(-1deg); }
            74% { transform: translate3d(-74px, -4px, 128px) rotate(0deg); }
            100% { transform: translate3d(-60px, -2px, 0) rotate(0deg); }
        }
        @keyframes archetypeRightCard4 {
            0%, 22% { transform: translate3d(0, 5px, 4px) rotate(-1deg); }
            46% { transform: translate3d(-42px, -2px, 70px) rotate(0deg); }
            74% { transform: translate3d(-78px, -9px, 132px) rotate(0deg); }
            100% { transform: translate3d(-62px, -5px, 0) rotate(0deg); }
        }
        @keyframes archetypeRightCard5 {
            0%, 22% { transform: translate3d(0, 10px, 5px) rotate(-2deg); }
            46% { transform: translate3d(-46px, 0, 74px) rotate(1deg); }
            74% { transform: translate3d(-82px, -14px, 136px) rotate(0deg); }
            100% { transform: translate3d(-64px, -8px, 0) rotate(0deg); }
        }
        @keyframes archetypeShuffleShine {
            0%, 74% { opacity: 0; transform: scale(0.6); }
            82% { opacity: 0.85; transform: scale(1.15); }
            100% { opacity: 0; transform: scale(1.4); }
        }

        /* Archetypes: tarot arc spread */
        .archetype-spread-overlay {
            position: fixed;
            inset: 0;
            z-index: 320;
            background: radial-gradient(ellipse 120% 90% at 50% 45%, rgba(40, 20, 52, 0.95), rgba(5, 4, 8, 0.98) 58%, #020103 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow: hidden;
        }
        .archetype-spread-stage {
            position: relative;
            width: min(100%, 440px);
            height: min(88vh, 720px);
        }
        .archetype-spread-stage.is-dealing .archetype-spread-card {
            transition: transform 0.62s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease;
        }
        .archetype-spread-card {
            position: absolute;
            left: 50%;
            top: 56%;
            width: min(20vw, 92px);
            aspect-ratio: 2 / 3;
            transform-style: preserve-3d;
            touch-action: none;
            cursor: grab;
            transition: transform 0.18s ease-out, filter 0.18s ease-out;
            z-index: var(--z, 1);
            will-change: transform;
        }
        .archetype-spread-card.is-not-ready { pointer-events: none; }
        .archetype-spread-card.is-dragging { cursor: grabbing; filter: brightness(1.14); }
        .archetype-spread-card.is-chosen {
            transition: transform 0.82s cubic-bezier(0.2, 0.9, 0.22, 1);
            z-index: 400 !important;
        }
        .archetype-spread-card.is-flipping .archetype-spread-inner {
            transform: rotateY(180deg);
        }
        .archetype-spread-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .archetype-spread-face {
            position: absolute;
            inset: 0;
            border-radius: 5px;
            overflow: hidden;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.62), 0 0 0 1px rgba(212, 175, 125, 0.24);
        }
        .archetype-spread-face.back {
            background-size: cover;
            background-position: center;
        }
        .archetype-spread-face.front {
            transform: rotateY(180deg);
            background: linear-gradient(165deg, #2a152f 0%, #160b1d 55%, #0b0610 100%);
            border: 1px solid rgba(212, 175, 125, 0.32);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0.55rem;
            font-family: 'Cormorant Garamond', serif;
            color: #f5e8d4;
            font-size: 0.9rem;
            line-height: 1.15;
        }
        .archetype-spread-title {
            position: absolute;
            top: 8%;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(248, 234, 214, 0.92);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.25rem;
            letter-spacing: 0.03em;
            padding: 0 1rem;
        }
        .archetype-spread-subtitle {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(212, 175, 125, 0.82);
            margin-top: 0.35rem;
        }
        @media (max-width: 640px) {
            .archetype-spread-stage {
                height: min(84vh, 620px);
            }
            .archetype-spread-card {
                width: min(22vw, 82px);
            }
            .archetype-spread-title {
                top: 4%;
                font-size: 1.1rem;
            }
            .archetype-spread-subtitle {
                font-size: 0.62rem;
            }
        }

        /* Archetypes: flip card (face / booklet) */
        .archetype-perspective { perspective: 1100px; }
        .archetype-flip-inner {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 3;
            max-height: min(68vh, 520px);
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
            transition: transform 0.65s cubic-bezier(0.25, 1, 0.5, 1);
            border-radius: 0.5rem;
        }
        .archetype-flip-inner.is-flipped { transform: rotateY(180deg); }
        .archetype-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform: rotateY(0deg) translateZ(0);
            border-radius: 0.5rem;
            overflow: hidden;
        }
        .archetype-face-back {
            transform: rotateY(180deg) translateZ(1px);
            background: linear-gradient(165deg, #1f0f1c 0%, #0a060c 55%, #070408 100%);
            border: 1px solid rgba(201, 169, 110, 0.28);
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.45);
            direction: ltr;
            text-align: center;
        }
        .archetype-booklet-scroll {
            direction: ltr;
            text-align: center;
        }
        .archetype-prose-p {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.98rem;
            line-height: 1.55;
            color: rgba(245, 240, 235, 0.92);
            margin-bottom: 0.85rem;
            text-align: center;
        }
        .archetype-section-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(212, 175, 125, 0.88);
            margin-bottom: 0.35rem;
            text-align: center;
        }
        .archetype-question-callout {
            margin-top: 1rem;
            padding: 0.85rem 1rem;
            border-radius: 0.75rem;
            background: rgba(88, 28, 74, 0.35);
            border: 1px solid rgba(168, 85, 247, 0.25);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            font-style: italic;
            color: #f3e8ff;
            text-align: center;
            line-height: 1.45;
        }
        /* Animations */
        .slide-out-left { animation: slideOutLeft 0.3s forwards; }
        .slide-in-right { animation: slideInRight 0.3s forwards; }
        .slide-out-right { animation: slideOutRight 0.3s forwards; }
        .slide-in-left { animation: slideInLeft 0.3s forwards; }
        
        @keyframes slideOutLeft { to { transform: translateX(-60px) rotate(-5deg); opacity: 0; } }
        @keyframes slideInRight { from { transform: translateX(60px) rotate(5deg); opacity: 0; } to { transform: translateX(0) rotate(0); opacity: 1; } }
        @keyframes slideOutRight { to { transform: translateX(60px) rotate(5deg); opacity: 0; } }
        @keyframes slideInLeft { from { transform: translateX(-60px) rotate(-5deg); opacity: 0; } to { transform: translateX(0) rotate(0); opacity: 1; } }

        /* Carousel items */
        .carousel-item {
            flex: 0 0 auto;
            transition: all 0.3s ease; opacity: 0.45; transform: scale(0.88);
            padding: 0.4rem 1rem; border-radius: 9999px; font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; color: white; white-space: nowrap;
            font-family: 'DM Mono', monospace;
            user-select: none;
        }
        .carousel-item:hover { opacity: 0.75; }
        .carousel-item.active {
            opacity: 1; transform: scale(1.05);
            border-color: currentColor; background: rgba(255,255,255,0.1);
            font-weight: bold; box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }

        /* Card side nav arrows */
        .card-nav-arrow {
            width: 44px;
            transition: color 0.2s ease, opacity 0.2s ease;
            opacity: 0.9;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .card-nav-arrow i {
            pointer-events: none;
            transition: transform 0.2s ease, color 0.2s ease;
        }
        .card-nav-arrow:hover i { color: rgba(255,255,255,0.7) !important; }
        .card-nav-arrow:active i { transform: scale(0.92); }
        @media (min-width: 768px) {
            .card-nav-arrow { width: 56px; }
        }

        /* Tooltips */
        [data-tip] { position: relative; }
        [data-tip]::after {
            content: attr(data-tip);
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%; transform: translateX(-50%);
            background: rgba(20,10,40,0.97);
            color: #e9d5ff; font-size: 0.68rem;
            font-family: 'DM Mono', monospace;
            white-space: nowrap; padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid rgba(168,85,247,0.35);
            pointer-events: none; opacity: 0;
            transition: opacity 0.25s 0.6s; z-index: 200;
        }
        [data-tip]:hover::after { opacity: 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .recording-pulse { animation: pulseRed 1.5s infinite; color: #ef4444; border-color: #ef4444; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .recording-live {
            --rec-level: 0.15;
            box-shadow:
                0 0 0 calc(5px + (var(--rec-level) * 18px)) rgba(239, 68, 68, calc(0.08 + var(--rec-level) * 0.22)),
                0 0 0 calc(12px + (var(--rec-level) * 34px)) rgba(239, 68, 68, calc(0.03 + var(--rec-level) * 0.16));
            transform: scale(calc(1 + (var(--rec-level) * 0.05)));
            transition: box-shadow 90ms linear, transform 90ms linear;
        }

        /* Dual examples divider */
        .example-divider {
            width: 40%; height: 1px;
            background: linear-gradient(to right, transparent, rgba(168,85,247,0.4), transparent);
            margin: 0.8rem auto;
        }
        .mask-linear { mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); }
    </style>
</head>
<body>
    <div class="hypno-container">
        <!-- SVG Classic Spiral -->
        <svg class="hypno-spiral" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <path fill="none" stroke="#2e1065" stroke-width="8" stroke-linecap="round"
                d="M100,100   
                   m0,0  
                   a4,4 0 0 1 4,4  
                   a8,8 0 0 1 -8,8  
                   a12,12 0 0 1 -12,-12  
                   a16,16 0 0 1 16,-16  
                   a20,20 0 0 1 20,20  
                   a24,24 0 0 1 -24,24  
                   a28,28 0 0 1 -28,-28  
                   a32,32 0 0 1 32,-32  
                   a36,36 0 0 1 36,36  
                   a40,40 0 0 1 -40,40  
                   a44,44 0 0 1 -44,-44  
                   a48,48 0 0 1 48,-48  
                   a52,52 0 0 1 52,52  
                   a56,56 0 0 1 -56,56  
                   a60,60 0 0 1 -60,-60  
                   a64,64 0 0 1 64,-64  
                   a68,68 0 0 1 68,68  
                   a72,72 0 0 1 -72,72  
                   a76,76 0 0 1 -76,-76  
                   a80,80 0 0 1 80,-80  
                   a84,84 0 0 1 84,84

                "

    </div>
    <div class="vignette"></div>

    <div id="app" class="h-screen w-full max-w-md mx-auto relative flex flex-col"></div>

    <script>
        // --- 1. State Management ---
        // Fixed theme order
        const THEME_ORDER = ['Freedom','Joy','Mischief','Playfulness','Safety & Trust','Relaxation','Pleasure','Desire','Sexy','Wildness'];
        const DEFAULT_EXCLUDED_CATEGORIES = ['Deepeners', 'Convincers', 'Triggers', 'Pleasure Metaphors'];
        const CANONICAL_ORIGIN = 'https://hypnocards-eng.pages.dev';
        const APP_BUILD = 'build-canonical-2026-04-22-planner-about-full-adaptation';
        const SW_BUILD = '2026-04-22-42';

        const AppState = {
            rawRows: [],          
            cards: [],            
            activeDeck: [],       
            categories: [],       
            themes: [],           
              
            currentIndex: 0,
            currentTheme: 'Relaxation',
            isRecording: false,
              
            recordings: JSON.parse(localStorage.getItem('en_recordings_v1')) || [],
            archetypeFavorites: JSON.parse(localStorage.getItem('archetype_favorites_v1')) || [],
            archetypeView: { cardId: null, fromView: 'random', flipped: false },
            selectedArchetypeDeckKeys: JSON.parse(localStorage.getItem('archetype_deck_keys_v1') || '[]'),
            pendingArchetypePoolIds: [],
            plannerSessions: JSON.parse(localStorage.getItem('planner_sessions_v1') || '[]'),
              
            selectedCategories: []
        };
        let deferredInstallPrompt = null;
        const ARCHETYPE_MODULE_TITLE = 'Archetypes of Pleasure';
        const ARCHETYPE_CARD_BACK = 'archetypes/archetype-card-back.webp';
        let ARCHETYPES_DATA = [];
        let HYPNO_GUIDEBOOK_DATA = { intro: [], categories: [] };

        function normalizeCategoryKey(category) {
            return String(category || '').trim().replace(/\s+/g, ' ').toLowerCase();
        }

        const DEFAULT_CATEGORY_INFO = {
            "Anticipation Builder": { "pattern": "In a moment... / Imagine how it will feel when...", "description": "Creates positive expectation in the guided person's mind for something about to happen. Uses sensory language and vivid imagery to paint a picture of the desired experience. The guided person begins to believe in and therefore help create the forthcoming sensation." },
            "Presuppositions": { "pattern": "You already know... / I wonder if you'll notice... / Whether X or Y...", "description": "Embeds assumptions into language so that the guided person accepts a premise without consciously evaluating it. The suggestion is wrapped inside a question or statement that takes the desired outcome for granted, reducing resistance by making the experience seem inevitable rather than imposed." },
            "Directing Awareness": { "pattern": "Notice... / You can become aware of... / As you pay attention to...", "description": "Gently guides the guided person's attention toward a specific sensation, feeling, or experience. Rather than commanding, it uses phrases like notice or become aware of to invite focused presence. This anchors the suggestion to something real and immediate, making it feel natural and self-discovered." },
            "Engaging the Imagination": { "pattern": "Imagine... / Pretend... / What if...? / As if...", "description": "Activates the guided person's imaginative capacity to create vivid mental imagery. By using metaphors and sensory descriptions, the guide helps the guided person experience something as real and tangible even if it begins as fantasy." },
            "Language Softeners": { "pattern": "Maybe... / Perhaps... / If you'd like... / You might...", "description": "Transforms direct commands into gentle invitations, reducing resistance from the conscious mind. It makes the suggestion feel like a free choice rather than a demand." },
            "Cause and Effect": { "pattern": "Because X... Y / As X... so Y / The more X... the more Y", "description": "Links two ideas or experiences with a logical cause and effect relationship. The mind accepts the connection and begins to produce the desired outcome as a consequence of something already happening." },
            "Complex Equivalence": { "pattern": "X means Y / Doing X is the same as Y / This is like...", "description": "Creates equivalence between two separate things, fusing them into one meaning. When the guided person does or experiences one thing, it automatically carries the meaning of another." },
            "Spectrum of Necessity": { "pattern": "You must... / You need to... / It's so right to...", "description": "Creates a sense of importance, urgency, or rightness around an experience or action. It frames the move toward the desired state as necessary and aligned." },
            "Negation": { "pattern": "You don't have to... / There's no need to... / Not yet...", "description": "Suggests an idea by appearing to deny it. Because the mind must process the concept to understand its negation, the image still enters the unconscious while resistance stays low." },
            "Amplification": { "pattern": "Imagine a dial / As X rises... / With each [breath / step / number]...", "description": "Intensifies and expands a sensation or experience that is already present. Uses scale and movement metaphors to guide deeper or stronger states." },
            "Addressing the Subconscious": { "pattern": "Your unconscious mind... / The deeper part of you... / I'm speaking now to...", "description": "Communicates directly with the guided person's unconscious mind, bypassing rational filtering and inviting involuntary responses." },
            "Empowerment and Integration Statements": { "pattern": "You are... / You carry within you... / This experience is yours...", "description": "Affirms inner strength and helps integrate what was felt during trance into the guided person's self concept so the experience continues beyond the session." },
            "Triggers": { "pattern": "Every time I / only I say [word]... you feel...", "description": "Creates anchors between a specific word, sound, or gesture and a state. Once established, the trigger can reactivate the feeling quickly." },
            "Deepeners": { "pattern": "With each step / number / breath... going deeper...", "description": "Moves the guided person from lighter trance into progressively deeper focus and relaxation, often through counting, breathing, and downward metaphors." },
            "Convincers": { "pattern": "Notice how your [body part] begins to [involuntary response]...", "description": "Uses involuntary physical responses as felt evidence that trance is working, increasing trust and deepening the experience." },
            "Pleasure Metaphors": { "pattern": "Like [sensory metaphor]... feel [desired sensation]...", "description": "Uses rich sensory metaphors to evoke embodied visceral experiences below rational analysis and awaken sensation directly." },
            "Action Accelerator": { "pattern": "Verb + now / automatically / effortlessly", "description": "Uses strong active verbs and immediacy words such as now, automatically, and effortlessly to trigger present moment response without conscious deliberation." }
        };

        function normalizeCategoryInfoMap(rawInfo) {
            const normalized = {};
            if (!rawInfo || typeof rawInfo !== 'object') return normalized;
            Object.entries(rawInfo).forEach(([rawCategory, rawValue]) => {
                const category = normalizeCategoryKey(rawCategory);
                if (!category) return;
                const value = rawValue || {};
                normalized[category] = {
                    pattern: String(value.pattern || '').trim(),
                    description: String(value.description || '').trim()
                };
            });
            return normalized;
        }

        function attachCategoryInfoToCards(cards, infoMap) {
            const normalizedInfo = normalizeCategoryInfoMap(infoMap || {});
            return (cards || []).map(card => {
                const info = normalizedInfo[normalizeCategoryKey(card.category)] || {};
                return {
                    ...card,
                    infoPattern: String(info.pattern || '').trim(),
                    infoDescription: String(info.description || '').trim()
                };
            });
        }

        function mergeCategoryInfoMaps(baseInfo, overrideInfo) {
            const base = normalizeCategoryInfoMap(baseInfo || {});
            const override = normalizeCategoryInfoMap(overrideInfo || {});
            const merged = { ...base };
            Object.keys(override).forEach(category => {
                const baseEntry = base[category] || {};
                const overrideEntry = override[category] || {};
                merged[category] = {
                    pattern: String(overrideEntry.pattern || baseEntry.pattern || '').trim(),
                    description: String(overrideEntry.description || baseEntry.description || '').trim()
                };
            });
            return merged;
        }

        async function ensureCategoryInfoLoaded() {
            const existingInfo = normalizeCategoryInfoMap(CATEGORY_INFO);
            const hasExistingInfo = Object.keys(existingInfo).length > 0;
            let savedInfo = {};
            try {
                savedInfo = normalizeCategoryInfoMap(JSON.parse(localStorage.getItem('en_category_info_v1') || '{}'));
            } catch (e) {}

            if (!hasExistingInfo && Object.keys(savedInfo).length > 0) {
                CATEGORY_INFO = mergeCategoryInfoMaps(DEFAULT_CATEGORY_INFO, savedInfo);
            }

            try {
                const response = await fetch('cards_data.json', { cache: 'no-store' });
                if (!response.ok) return;
                const data = await response.json();
                const fetchedInfo = normalizeCategoryInfoMap(data.category_info || {});
                if (Object.keys(fetchedInfo).length > 0) {
                    CATEGORY_INFO = mergeCategoryInfoMaps(DEFAULT_CATEGORY_INFO, mergeCategoryInfoMaps(savedInfo, fetchedInfo));
                    AppState.cards = attachCategoryInfoToCards(AppState.cards, CATEGORY_INFO);
                    AppState.activeDeck = attachCategoryInfoToCards(AppState.activeDeck, CATEGORY_INFO);
                    try { localStorage.setItem('en_category_info_v1', JSON.stringify(CATEGORY_INFO)); } catch (e) {}
                    try { localStorage.setItem('en_cards_data_v1', JSON.stringify(AppState.cards)); } catch (e) {}
                }
            } catch (e) {}
        }

        // --- 2. The Parsing Engine ---
        function processCSV(data) {
            const cleanData = data.map(row => {
                const newRow = {};
                Object.keys(row).forEach(k => newRow[k.trim()] = row[k]);
                return newRow;
            });

            // Separate CATEGORY_INFO rows from card rows (robust to spaces/case)
            const categoryInfoRows = cleanData.filter(r => String(r.ID || '').trim().toUpperCase() === 'CATEGORY_INFO');
            const cardRows = cleanData.filter(r => String(r.ID || '').trim().toUpperCase() !== 'CATEGORY_INFO');

            // Build CATEGORY_INFO lookup from CSV data
            // Columns: ID=CATEGORY_INFO, Category=name, Pattern=PatternLabel, Content=Description
            CATEGORY_INFO = normalizeCategoryInfoMap(DEFAULT_CATEGORY_INFO);
            categoryInfoRows.forEach(r => {
                const cat = normalizeCategoryKey(r.Category);
                if (cat) {
                    CATEGORY_INFO[cat] = {
                        pattern: (r.Pattern || '').trim(),
                        description: (r.Content || '').trim()
                    };
                }
            });

            AppState.rawRows = cardRows;

            // Extract Unique Themes
            const themesSet = new Set();
            const skipThemes = new Set(['Dynamic', 'Static', 'General', '']);
            cleanData.forEach(row => {
                if (row.Theme && row.Theme.trim().length > 1 && !skipThemes.has(row.Theme.trim()))
                    themesSet.add(row.Theme.trim());
            });
            AppState.themes = THEME_ORDER.filter(t => themesSet.has(t));
            // Add any themes from CSV not in our order list
            themesSet.forEach(t => { if (!AppState.themes.includes(t)) AppState.themes.push(t); });
            if (AppState.themes.length === 0) AppState.themes = [...THEME_ORDER];

            // Extract Categories
            const catsMap = new Map();
            cleanData.forEach(row => {
                const catName = row.Category ? row.Category.trim() : 'General';
                if (!catsMap.has(catName)) {
                    catsMap.set(catName, row.Color || '#A0A0A0');
                }
            });
            AppState.categories = Array.from(catsMap).map(([name, color]) => ({name, color}));

            // Aggregation Logic - group by Pattern, variations by Theme
            const cardsMap = new Map();
            
            cleanData.forEach(row => {
                const pattern = row.Pattern ? row.Pattern.trim() : null;
                if (!pattern) return;

                const mapKey = pattern;

                if (!cardsMap.has(mapKey)) {
                    cardsMap.set(mapKey, {
                        id: row.ID,   
                        pattern: pattern,
                        category: row.Category || 'General',
                        color: row.Color || catsMap.get(row.Category) || '#fff',
                        variations: {},   
                        staticContent: null
                    });
                }

                const card = cardsMap.get(mapKey);
                const theme = row.Theme ? row.Theme.trim() : 'General';
                const content = row.Content;

                if (theme === 'General' || theme === 'Dynamic' || theme === 'Static' || !theme) {
                    card.staticContent = card.staticContent ? card.staticContent + "<br><br>" + content : content;
                } else {
                    if (card.variations[theme]) {
                        card.variations[theme] += "<br><br>" + content;
                    } else {
                        card.variations[theme] = content;
                    }
                }
            });

            AppState.cards = attachCategoryInfoToCards(Array.from(cardsMap.values()), CATEGORY_INFO);
              
            try {
                localStorage.setItem('en_cards_data_v1', JSON.stringify(AppState.cards));
                localStorage.setItem('en_themes_data_v1', JSON.stringify(AppState.themes));
                localStorage.setItem('en_cats_data_v1', JSON.stringify(AppState.categories));
                localStorage.setItem('en_category_info_v1', JSON.stringify(CATEGORY_INFO));
            } catch (e) { console.warn("Storage quota exceeded"); }

            alert(`Loaded successfully!\n${AppState.cards.length} unique patterns detected.`);
            renderModeSelect();
        }

        function loadFromStorage() {
            const savedCards = localStorage.getItem('en_cards_data_v1');
            if (savedCards) {
                try {
                    AppState.cards = JSON.parse(savedCards);
                    const savedThemes = JSON.parse(localStorage.getItem('en_themes_data_v1') || '[]');
                    // Always apply fixed order
                    AppState.themes = THEME_ORDER.filter(t => savedThemes.includes(t));
                    savedThemes.forEach(t => { if (!AppState.themes.includes(t)) AppState.themes.push(t); });
                    if (AppState.themes.length === 0) AppState.themes = [...THEME_ORDER];
                    AppState.categories = JSON.parse(localStorage.getItem('en_cats_data_v1') || '[]');
                    CATEGORY_INFO = mergeCategoryInfoMaps(
                        DEFAULT_CATEGORY_INFO,
                        JSON.parse(localStorage.getItem('en_category_info_v1') || '{}')
                    );
                    AppState.cards = attachCategoryInfoToCards(AppState.cards, CATEGORY_INFO);
                    return true;
                } catch(e) { return false; }
            }
            return false;
        }

        // --- 3. Core Logic Helpers ---

        function renderMarkdown(text) {
            if (!text) return '';
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        }

        function escapeHtmlArchetype(s) {
            if (s == null || s === '') return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function archetypeParagraphBlocks(text) {
            if (!text) return '';
            return String(text)
                .split(/\n\n+/)
                .map(block => block.trim())
                .filter(Boolean)
                .map(block => {
                    const lines = block.split('\n').map(l => escapeHtmlArchetype(l.trim())).join('<br/>');
                    return `<p class="archetype-prose-p">${lines}</p>`;
                })
                .join('');
        }

        function archetypePracticeWithoutDuplicateQuestion(practice, question) {
            if (practice == null || practice === '') return '';
            const q = question == null ? '' : String(question).replace(/\s+/g, ' ').trim();
            if (!q) return String(practice);
            const blocks = String(practice)
                .split(/\n\n+/)
                .map(b => b.trim())
                .filter(Boolean);
            if (blocks.length === 0) return String(practice);
            const last = blocks[blocks.length - 1].replace(/\s+/g, ' ').trim();
            const norm = s => s.replace(/^["'\s]+|["'\s.?]+$/g, '').toLowerCase();
            const flat = s => String(s).replace(/\s+/g, ' ').trim().replace(/\?+$/g, '').toLowerCase();
            if (last === q || flat(last) === flat(q) || norm(last) === norm(q)) {
                blocks.pop();
            }
            return blocks.join('\n\n');
        }

        function pruneArchetypeFavorites() {
            const valid = new Set(ARCHETYPES_DATA.map(c => c.id));
            const next = (AppState.archetypeFavorites || []).filter(id => valid.has(id));
            if (next.length !== AppState.archetypeFavorites.length) {
                AppState.archetypeFavorites = next;
                try { localStorage.setItem('archetype_favorites_v1', JSON.stringify(next)); } catch (e) {}
            }
        }

        function getArchetypeRealms() {
            const seen = new Set();
            const realms = [];
            ARCHETYPES_DATA.forEach(card => {
                const r = String(card.realm || '').trim();
                if (!r || seen.has(r)) return;
                seen.add(r);
                realms.push(r);
            });
            return realms;
        }

        function toggleArchetypeDeckKey(key) {
            if (AppState.selectedArchetypeDeckKeys.includes(key)) {
                AppState.selectedArchetypeDeckKeys = AppState.selectedArchetypeDeckKeys.filter(k => k !== key);
            } else {
                AppState.selectedArchetypeDeckKeys.push(key);
            }
            try { localStorage.setItem('archetype_deck_keys_v1', JSON.stringify(AppState.selectedArchetypeDeckKeys)); } catch (e) {}
            renderArchetypeDeckBuilder();
        }

        function selectAllArchetypeDeckKeys() {
            AppState.selectedArchetypeDeckKeys = ['__favorites__', ...getArchetypeRealms()];
            try { localStorage.setItem('archetype_deck_keys_v1', JSON.stringify(AppState.selectedArchetypeDeckKeys)); } catch (e) {}
            renderArchetypeDeckBuilder();
        }

        function clearAllArchetypeDeckKeys() {
            AppState.selectedArchetypeDeckKeys = [];
            try { localStorage.setItem('archetype_deck_keys_v1', JSON.stringify(AppState.selectedArchetypeDeckKeys)); } catch (e) {}
            renderArchetypeDeckBuilder();
        }

        function getCustomArchetypePool() {
            const keys = new Set(AppState.selectedArchetypeDeckKeys || []);
            const includeFavorites = keys.has('__favorites__');
            const selectedRealms = new Set((AppState.selectedArchetypeDeckKeys || []).filter(k => k !== '__favorites__'));
            const idSet = new Set();
            if (includeFavorites) {
                AppState.archetypeFavorites.forEach(id => idSet.add(id));
            }
            ARCHETYPES_DATA.forEach(card => {
                if (selectedRealms.has(String(card.realm || '').trim())) {
                    idSet.add(card.id);
                }
            });
            return ARCHETYPES_DATA.filter(c => idSet.has(c.id));
        }

        function startArchetypeSpreadDraw(pool, fromView) {
            if (!pool || !pool.length) {
                alert('No cards found for this custom selection. Please choose at least one realm or favorites.');
                return;
            }
            AppState.pendingArchetypePoolIds = pool.map(c => c.id);
            AppState.archetypeView = { cardId: null, fromView, flipped: false };
            playArchetypeShuffleThen(openArchetypeTarotSpread);
        }

        async function loadArchetypesData() {
            try {
                const r = await fetch('archetypes_data.json', { cache: 'no-store' });
                if (!r.ok) return;
                const data = await r.json();
                if (Array.isArray(data) && data.length) {
                    ARCHETYPES_DATA = data;
                    pruneArchetypeFavorites();
                }
            } catch (e) {}
        }

        async function loadHypnoGuidebookData() {
            try {
                const r = await fetch('hypno_guidebook_data.json', { cache: 'no-store' });
                if (!r.ok) return;
                const data = await r.json();
                if (data && Array.isArray(data.intro) && Array.isArray(data.categories)) {
                    HYPNO_GUIDEBOOK_DATA = data;
                }
            } catch (e) {}
        }

        function toggleArchetypeFlip() {
            AppState.archetypeView.flipped = !AppState.archetypeView.flipped;
            if (AppState.archetypeView.cardId) {
                renderArchetypeCard(AppState.archetypeView.cardId, AppState.archetypeView.fromView);
            }
        }

        function playArchetypeShuffleThen(callback) {
            const app = document.getElementById('app');
            const layer = document.createElement('div');
            layer.className = 'archetype-shuffle-overlay';
            layer.setAttribute('dir', 'ltr');
            const cardStyle = `background-image:url('${ARCHETYPE_CARD_BACK}')`;
            const leftPack = Array.from({ length: 5 }, () => `<div class="archetype-shuffle-card" style="${cardStyle}"></div>`).join('');
            const rightPack = Array.from({ length: 5 }, () => `<div class="archetype-shuffle-card" style="${cardStyle}"></div>`).join('');
            layer.innerHTML = `
                <div class="archetype-shuffle-hub">
                    <div class="archetype-shuffle-table-glow" aria-hidden="true"></div>
                    <div class="archetype-shuffle-riffle">
                        <div class="archetype-shuffle-pack left">${leftPack}</div>
                        <div class="archetype-shuffle-pack right">${rightPack}</div>
                    </div>
                    <div class="archetype-shuffle-shine" aria-hidden="true"></div>

        function openArchetypeTarotSpread() {
            const app = document.getElementById('app');
            const layer = document.createElement('div');
            layer.className = 'archetype-spread-overlay';
            layer.setAttribute('dir', 'ltr');
            const spreadCards = pickArchetypeSpreadCards(15);
            if (!spreadCards.length) return;
            const viewportWidth = Math.max(320, window.innerWidth || 360);
            const viewportHeight = Math.max(560, window.innerHeight || 640);
            const stageWidth = Math.min(440, viewportWidth - 32);
            const stageHeight = Math.min(720, viewportHeight * 0.88);
            const isMobileSpread = viewportWidth <= 640;
            const angleStart = isMobileSpread ? -66 : -74;
            const angleEnd = isMobileSpread ? 66 : 74;
            const step = spreadCards.length > 1 ? (angleEnd - angleStart) / (spreadCards.length - 1) : 0;
            const maxAngleDeg = Math.max(Math.abs(angleStart), Math.abs(angleEnd));
            const maxAngleRad = maxAngleDeg * Math.PI / 180;
            const cardWidth = Math.min(viewportWidth * (isMobileSpread ? 0.22 : 0.20), isMobileSpread ? 82 : 92);
            const cardHeight = cardWidth * 1.5;
            const maxCardRotRad = Math.abs(maxAngleDeg * 0.56) * Math.PI / 180;
            const rotatedHalfWidth =
                (Math.abs(Math.cos(maxCardRotRad)) * cardWidth * 0.5) +
                (Math.abs(Math.sin(maxCardRotRad)) * cardHeight * 0.5);
            const horizontalSafeHalf = (stageWidth / 2) - rotatedHalfWidth - (isMobileSpread ? 10 : 8);
            const radiusByWidth = horizontalSafeHalf / Math.max(0.001, Math.sin(maxAngleRad));
            const radius = Math.max(150, Math.min(272, radiusByWidth, stageWidth * (isMobileSpread ? 0.44 : 0.56)));
            const centerX = isMobileSpread ? -22 : 0;
            const centerY = Math.max(72, Math.min(152, stageHeight * (isMobileSpread ? 0.19 : 0.24)));
            const dealStartX = -Math.max(126, stageWidth * 0.42);
            const dealStartY = Math.max(82, stageHeight * 0.16);
            const dealStartRot = -5;
            const cardsHtml = spreadCards.map((card, i) => {
                const angle = angleStart + (step * i);
                const rad = angle * Math.PI / 180;
                const x = centerX + Math.sin(rad) * radius;
                const y = centerY - Math.cos(rad) * radius;
                const rot = angle * 0.56;
                return `
                    <div class="archetype-spread-card is-not-ready" data-index="${i}" data-card-id="${card.id}" data-x="${x.toFixed(2)}" data-y="${y.toFixed(2)}" data-rot="${rot.toFixed(2)}" style="--z:${60 + i}; transform: translate3d(${dealStartX}px, ${dealStartY}px, 0) rotate(${dealStartRot}deg);">
                        <div class="archetype-spread-inner">
                            <div class="archetype-spread-face back" style="background-image:url('${ARCHETYPE_CARD_BACK}')"></div>
                            <div class="archetype-spread-face front"></div>
                        </div>
                    </div>
                `;
            }).join('');
            layer.innerHTML = `
                <div class="archetype-spread-stage is-dealing">
                    <h3 class="archetype-spread-title">Push a card out to reveal it<span class="archetype-spread-subtitle">Drag any card outward from the arc</span></h3>
                    ${cardsHtml}
                </div>
            `;
            app.appendChild(layer);
            const stage = layer.querySelector('.archetype-spread-stage');

            let selected = false;
            const stageRect = layer.getBoundingClientRect();
            const originX = stageRect.left + stageRect.width / 2;
            const originY = stageRect.top + stageRect.height * 0.7;
            const cards = Array.from(layer.querySelectorAll('.archetype-spread-card'));

            cards.forEach((el, i) => {
                const targetX = Number(el.dataset.x || 0);
                const targetY = Number(el.dataset.y || 0);
                const targetRot = Number(el.dataset.rot || 0);
                const delay = 36 * i;
                window.setTimeout(() => {
                    el.style.transform = `translate3d(${targetX}px, ${targetY}px, 0) rotate(${targetRot}deg)`;
                }, delay);
                window.setTimeout(() => {
                    el.classList.remove('is-not-ready');
                }, delay + 360);
            });
            window.setTimeout(() => {
                stage.classList.remove('is-dealing');
            }, 980);

            cards.forEach((el) => {
                const baseX = Number(el.dataset.x || 0);
                const baseY = Number(el.dataset.y || 0);
                const baseRot = Number(el.dataset.rot || 0);
                let pointerId = null;
                let startX = 0;
                let startY = 0;
                let outShift = 0;
                let dx = 0;
                let dy = 0;

                const applyTransform = (offsetX, offsetY, lift = 0, twist = 0) => {
                    el.style.transform = `translate3d(${baseX + offsetX}px, ${baseY + offsetY - lift}px, 0) rotate(${baseRot + twist}deg)`;
                };

                const onDown = (ev) => {
                    if (selected || el.classList.contains('is-not-ready')) return;
                    pointerId = ev.pointerId;
                    startX = ev.clientX;
                    startY = ev.clientY;
                    outShift = 0;
                    dx = 0;
                    dy = 0;
                    el.classList.add('is-dragging');
                    el.setPointerCapture(pointerId);
                };

                const onMove = (ev) => {
                    if (pointerId == null || ev.pointerId !== pointerId || selected) return;
                    dx = ev.clientX - startX;
                    dy = ev.clientY - startY;
                    const cardCenterX = originX + baseX;
                    const cardCenterY = originY + baseY;
                    const vx = cardCenterX - originX;
                    const vy = cardCenterY - originY;
                    const vlen = Math.hypot(vx, vy) || 1;
                    const ux = vx / vlen;
                    const uy = vy / vlen;
                    outShift = Math.max(0, dx * ux + dy * uy);
                    const damp = Math.min(outShift, 125);
                    const offsetX = dx * 0.18 + (ux * damp);
                    const offsetY = dy * 0.18 + (uy * damp);
                    const twist = (dx * 0.02) + (baseRot > 0 ? 2 : -2);
                    applyTransform(offsetX, offsetY, 6 + (damp * 0.07), twist);
                };

                const chooseCard = () => {
                    selected = true;
                    const cardId = el.dataset.cardId;
                    cards.forEach(c => { if (c !== el) c.style.opacity = '0.2'; });
                    el.classList.remove('is-dragging');
                    el.classList.add('is-chosen');
                    const stageWidthPx = stage.clientWidth || 360;
                    const stageHeightPx = stage.clientHeight || 620;
                    const cardWidthPx = el.offsetWidth || 82;
                    const cardHeightPx = el.offsetHeight || 123;
                    const maxTargetWidthPx = Math.min(stageWidthPx * 0.72, 302);
                    const maxTargetHeightPx = Math.min(stageHeightPx * 0.66, 462);
                    const targetScale = Math.max(
                        1.2,
                        Math.min(
                            maxTargetWidthPx / Math.max(1, cardWidthPx),
                            maxTargetHeightPx / Math.max(1, cardHeightPx)
                        )
                    );
                    const targetCardWidth = cardWidthPx * targetScale;
                    const targetCardHeight = cardHeightPx * targetScale;
                    const anchorX = stageWidthPx * 0.5;   // .archetype-spread-card left:50%
                    const anchorY = stageHeightPx * 0.56; // .archetype-spread-card top:56%
                    const targetLeft = (stageWidthPx - targetCardWidth) / 2;
                    const targetTop = Math.max(18, Math.min(stageHeightPx * 0.14, stageHeightPx - targetCardHeight - 24));
                    // Compensate for transform-origin center so scaled card lands exactly at target slot.
                    const targetX = targetLeft - anchorX - ((1 - targetScale) * cardWidthPx / 2);
                    const targetY = targetTop - anchorY - ((1 - targetScale) * cardHeightPx / 2);
                    el.style.transform = `translate3d(${targetX.toFixed(2)}px, ${targetY.toFixed(2)}px, 0) rotate(0deg) scale(${targetScale.toFixed(3)})`;
                    window.setTimeout(() => el.classList.add('is-flipping'), 260);
                    window.setTimeout(() => {
                        layer.remove();
                        renderArchetypeCard(cardId, AppState.archetypeView.fromView || 'random');
                    }, 1280);
                };

                const onUp = (ev) => {
                    if (pointerId == null || ev.pointerId !== pointerId || selected) return;
                    el.classList.remove('is-dragging');
                    const threshold = 66;
                    if (outShift > threshold) {
                        chooseCard();
                    } else {
                        el.style.transition = 'transform 0.28s cubic-bezier(0.2,0.8,0.2,1)';
                        applyTransform(0, 0, 0, 0);
                        window.setTimeout(() => { el.style.transition = ''; }, 300);
                    }
                    try { el.releasePointerCapture(pointerId); } catch (e) {}
                    pointerId = null;
                };

                el.addEventListener('pointerdown', onDown);
                el.addEventListener('pointermove', onMove);
                el.addEventListener('pointerup', onUp);
                el.addEventListener('pointercancel', onUp);
            });
        }

            else if (card.staticContent) return card.staticContent;
            else {
                const keys = Object.keys(card.variations || {});
                if (keys.length > 0) content = card.variations[keys[0]];
            }
            if (!content) return "No content found for this theme.";

            if (Array.isArray(content)) {

            return content;

            function renderGuideParagraph(text, accentColor) {
                const trimmed = (text || '').trim();
                if (!trimmed) return '';
                if (headingLikeLines.has(trimmed)) {
                    return `<p class="text-violet-100 serif-font text-[1.02rem] font-bold tracking-wide">${toEmphasizedInline(trimmed)}</p>`;
                }
                if (/^Method \d+:/.test(trimmed)) {
                    return `<p class="text-fuchsia-100 serif-font text-[0.96rem] font-bold">${toEmphasizedInline(trimmed)}</p>`;
                }
                if (/^\d+\.\s/.test(trimmed)) {
                    return `<p class="text-violet-100 serif-font text-[1.02rem] font-bold">${toEmphasizedInline(trimmed)}</p>`;
                }
                if (trimmed.startsWith('→')) {
                    return `<p class="serif-font text-[1rem] leading-relaxed pl-3 border-l-2" style="border-color:${accentColor}; color:#e5e7eb">${toEmphasizedInline(trimmed)}</p>`;
                }
                if (trimmed.startsWith('⚠')) {
                    return `<p class="serif-font text-[1rem] leading-relaxed p-3 rounded-xl bg-amber-500/10 border border-amber-400/35 text-amber-100">${toEmphasizedInline(trimmed)}</p>`;
                }
                if (/^".*"$/.test(trimmed)) {
                    return `<p class="serif-font text-[1rem] leading-relaxed italic text-gray-200/95">${toEmphasizedInline(trimmed)}</p>`;
                }
                return `<p class="text-gray-300 serif-font text-[1rem] leading-relaxed">${toEmphasizedInline(trimmed)}</p>`;
            }
            const introSections = [];
            let currentSection = null;
            let seenFirstFoundationTitle = false;
            intro.forEach(line => {
                if (foundationTitles.includes(line)) {
                    seenFirstFoundationTitle = true;
                    currentSection = { title: line, content: [] };
                    introSections.push(currentSection);
                    return;
                }
                if (!seenFirstFoundationTitle) {
                    return;
                }
                if (!currentSection) {
                    currentSection = { title: 'A Note Before You Begin', content: noteBeforeYouBeginFallback.slice() };
                    introSections.push(currentSection);
                }
                currentSection.content.push(line);
            });
            const noteSection = introSections.find(section => section.title === 'A Note Before You Begin');
            if (!noteSection || !noteSection.content || !noteSection.content.length) {
                introSections.unshift({ title: 'A Note Before You Begin', content: noteBeforeYouBeginFallback.slice() });
            }
            const foundationsHtml = introSections.length
                ? introSections.map((section, sectionIndex) => {
                    const sectionColor = sectionIndex % 2 ? '#7c3aed' : '#a855f7';

                    return `

            const newId = `planner-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;

        function listPlannerSessions() {
            try {
                const parsed = JSON.parse(localStorage.getItem('planner_sessions_v1') || '[]');
                if (!Array.isArray(parsed)) return [];
                return parsed
                    .filter(s =>
                        s &&
                        typeof s === 'object' &&
                        typeof s.id === 'string' &&
                        typeof s.title === 'string' &&
                        typeof s.createdAt === 'string' &&
                        typeof s.updatedAt === 'string' &&
                        s.plannerState &&
                        typeof s.plannerState === 'object'
                    )
                    .sort((a, b) => String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')));
            } catch (_) {
                return [];
            }
        }

        function savePlannerSessions(sessions) {
            const clean = Array.isArray(sessions) ? sessions.slice(0, 100) : [];
            localStorage.setItem('planner_sessions_v1', JSON.stringify(clean));
            AppState.plannerSessions = clean;
        }

        function loadPlannerSession(sessionId) {
            return listPlannerSessions().find(s => s.id === sessionId) || null;
        }

        function deletePlannerSessionById(sessionId) {
            const sessions = listPlannerSessions().filter(s => s.id !== sessionId);
            savePlannerSessions(sessions);
            return sessions;
        }

            const d = new Date(String(iso || ''));
            if (Number.isNaN(d.getTime())) return String(iso || '');
            return d.toLocaleString();

            const snap = s && s.summarySnapshot && typeof s.summarySnapshot === 'object' ? s.summarySnapshot : {};

            const role = roleRaw ? ({ dom: 'Dom', sub: 'Sub', switch: 'Switch' }[roleRaw] || roleRaw) : '—';
            const durationNum = Number(snap.duration || 0);
            const duration = Number.isFinite(durationNum) && durationNum > 0 ? `${durationNum} min` : '—';
            return `Role: ${role} • Duration: ${duration}`;
        }

        function formatPlaybackTime(seconds) {
            const s = Number.isFinite(seconds) ? Math.max(0, Math.floor(seconds)) : 0;
            const m = String(Math.floor(s / 60)).padStart(2, '0');
            const r = String(s % 60).padStart(2, '0');
            return `${m}:${r}`;
        }

        function updatePlaybackUi(recordingId) {
            if (!playbackAudio || playbackRecordingId !== recordingId) return;
            const progress = document.getElementById('playerProgress');
            const cur = document.getElementById('playerTimeCurrent');
            const total = document.getElementById('playerTimeTotal');
            if (progress && playbackAudio.duration) {
                progress.value = String((playbackAudio.currentTime / playbackAudio.duration) * 100);
            }
            if (cur) cur.textContent = formatPlaybackTime(playbackAudio.currentTime);
            if (total) total.textContent = formatPlaybackTime(playbackAudio.duration);
            playbackRaf = requestAnimationFrame(() => updatePlaybackUi(recordingId));
        }

        function stopPlaybackUi() {
            if (playbackRaf) cancelAnimationFrame(playbackRaf);
            playbackRaf = null;
            const btn = document.getElementById('playerPlayPauseBtn');
            if (btn) btn.textContent = '▶';
        }

        function openRecordingPlayer(recordingId) {
            const rec = AppState.recordings.find(r => r.id === recordingId);
            if (!rec || !rec.audioDataUrl) {
                alert('This recording does not have playable audio data.');
                return;
            }

            if (!playbackAudio || playbackRecordingId !== recordingId) {
                if (playbackAudio) playbackAudio.pause();
                stopPlaybackUi();
                playbackAudio = new Audio(rec.audioDataUrl);
                playbackRecordingId = recordingId;
                playbackAudio.addEventListener('loadedmetadata', () => {
                    const total = document.getElementById(`timeTotal-${recordingId}`);
                    if (total) total.textContent = formatPlaybackTime(playbackAudio.duration);
                });
                playbackAudio.addEventListener('ended', () => {
                    stopPlaybackUi();
                    const progress = document.getElementById('playerProgress');
                    const cur = document.getElementById('playerTimeCurrent');
                    if (progress) progress.value = '0';
                    if (cur) cur.textContent = '00:00';
                });

            const app = document.getElementById('app');
            if (!playbackModalOpen) {
                const modal = document.createElement('div');
                modal.id = 'recordingPlayerModal';
                modal.className = 'fixed inset-0 z-[300] bg-black/70 flex items-end justify-center';

        let mediaRecorder = null;
