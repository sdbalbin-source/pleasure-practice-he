<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HypnoCards">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>HypnoCards - Master Edition V6</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* --- Core Styles --- */
        :root {
            --primary-bg: #000000;
            --card-glass: rgba(20, 20, 25, 0.95);
            --border-glass: rgba(255, 255, 255, 0.15);
        }

        body {   
            font-family: 'DM Mono', monospace;
            background-color: var(--primary-bg);   
            color: #e0e0e0;   
            overflow: hidden;   
            user-select: none;   
            -webkit-tap-highlight-color: transparent;   
        }
        .serif-font { font-family: 'Cormorant Garamond', serif; }
        
        /* --- Hypnotic Spiral Background --- */
        .hypno-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
            z-index: -2;
            background: #000;
        }

        .hypno-spiral {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150vmax;
            height: 150vmax;
            transform-origin: center;
            transform: translate(-50%, -50%);
            animation: spinSpiral 15s linear infinite;
            opacity: 0.6;
        }

        @keyframes spinSpiral {   
            from { transform: translate(-50%, -50%) rotate(0deg); }   
            to { transform: translate(-50%, -50%) rotate(-360deg); }   
        }
        
        /* Vignette */
        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 20%, black 85%);
            pointer-events: none;
            z-index: -1;
        }

        /* UI Elements */
        .glass-panel {
            background: var(--card-glass);   
            backdrop-filter: blur(20px);   
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);   
            box-shadow: 0 15px 50px 0 rgba(0, 0, 0, 0.8);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        button.glass-panel:hover {
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 15px 50px 0 rgba(0,0,0,0.8), 0 0 30px rgba(147, 51, 234, 0.15);
        }

        /* Card Styles */
        .card-container { perspective: 1000px; width: 100%; height: 100%; position: relative; }
        .card-inner {   
            width: 100%; height: 100%; position: relative;   
            transition: transform 0.55s cubic-bezier(0.25, 1, 0.5, 1);
            transform-style: preserve-3d;   
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 1.5rem;   
            display: flex; flex-direction: column;   
            overflow: hidden;   
        }
        .card-face-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform: rotateY(180deg);
            border-radius: 1.5rem;
            display: flex; flex-direction: column;
            overflow: hidden;
            background: rgba(20,10,40,0.97);
            border: 4px solid #a855f7;
            box-shadow: 0 15px 50px 0 rgba(0,0,0,0.8);
        }

        /* Info button */
        .info-btn {
            position: absolute; top: 12px; right: 12px; z-index: 50;
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.5);
            font-family: 'DM Mono', monospace;
            font-size: 13px; font-style: italic; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .info-btn:hover { background: rgba(168,85,247,0.2); border-color: rgba(168,85,247,0.6); color: #c084fc; }
        
        /* Sticky Header */
        .card-header-fixed {
            flex: 0 0 auto;   
            padding: 2.5rem 1.5rem 1.5rem 1.5rem;   
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }

        /* Scroll Area */
        .card-scroll-area {
            flex: 1 1 auto;   
            min-height: 0;
            overflow-y: auto;   
            overflow-x: hidden;
            padding: 1.5rem;
            text-align: center;
            display: flex;
            flex-direction: column;
        }
        
        .card-content-wrapper {
            margin: auto 0;
            width: 100%;
        }
        
        /* Sticky Footer */
        .card-footer-fixed {
            flex: 0 0 auto;
            padding: 1rem;
            background: rgba(0,0,0,0.6);
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }

        /* Custom Scrollbar */
        .card-scroll-area::-webkit-scrollbar { width: 4px; }
        .card-scroll-area::-webkit-scrollbar-track { background: transparent; }
        .card-scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* Card content bold highlight */
        .card-content-text strong {
            font-style: italic;
            color: #c9a96e;
            font-weight: 700;
        }

        /* Animations */
        .slide-out-left { animation: slideOutLeft 0.3s forwards; }
        .slide-in-right { animation: slideInRight 0.3s forwards; }
        .slide-out-right { animation: slideOutRight 0.3s forwards; }
        .slide-in-left { animation: slideInLeft 0.3s forwards; }
        
        @keyframes slideOutLeft { to { transform: translateX(-60px) rotate(-5deg); opacity: 0; } }
        @keyframes slideInRight { from { transform: translateX(60px) rotate(5deg); opacity: 0; } to { transform: translateX(0) rotate(0); opacity: 1; } }
        @keyframes slideOutRight { to { transform: translateX(60px) rotate(5deg); opacity: 0; } }
        @keyframes slideInLeft { from { transform: translateX(-60px) rotate(-5deg); opacity: 0; } to { transform: translateX(0) rotate(0); opacity: 1; } }

        /* Carousel items */
        .carousel-item {
            flex: 0 0 auto;
            transition: all 0.3s ease; opacity: 0.45; transform: scale(0.88);
            padding: 0.4rem 1rem; border-radius: 9999px; font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; color: white; white-space: nowrap;
            font-family: 'DM Mono', monospace;
            user-select: none;
        }
        .carousel-item:hover { opacity: 0.75; }
        .carousel-item.active {
            opacity: 1; transform: scale(1.05);
            border-color: currentColor; background: rgba(255,255,255,0.1);
            font-weight: bold; box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }

        /* Card side nav arrows */
        .card-nav-arrow {
            width: 44px;
            transition: color 0.2s ease, opacity 0.2s ease;
            opacity: 0.9;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .card-nav-arrow i {
            pointer-events: none;
            transition: transform 0.2s ease, color 0.2s ease;
        }
        .card-nav-arrow:hover i { color: rgba(255,255,255,0.7) !important; }
        .card-nav-arrow:active i { transform: scale(0.92); }
        @media (min-width: 768px) {
            .card-nav-arrow { width: 56px; }
        }

        /* Tooltips */
        [data-tip] { position: relative; }
        [data-tip]::after {
            content: attr(data-tip);
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%; transform: translateX(-50%);
            background: rgba(20,10,40,0.97);
            color: #e9d5ff; font-size: 0.68rem;
            font-family: 'DM Mono', monospace;
            white-space: nowrap; padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid rgba(168,85,247,0.35);
            pointer-events: none; opacity: 0;
            transition: opacity 0.25s 0.6s; z-index: 200;
        }
        [data-tip]:hover::after { opacity: 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .recording-pulse { animation: pulseRed 1.5s infinite; color: #ef4444; border-color: #ef4444; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .recording-live {
            --rec-level: 0.15;
            box-shadow:
                0 0 0 calc(5px + (var(--rec-level) * 18px)) rgba(239, 68, 68, calc(0.08 + var(--rec-level) * 0.22)),
                0 0 0 calc(12px + (var(--rec-level) * 34px)) rgba(239, 68, 68, calc(0.03 + var(--rec-level) * 0.16));
            transform: scale(calc(1 + (var(--rec-level) * 0.05)));
            transition: box-shadow 90ms linear, transform 90ms linear;
        }

        /* Dual examples divider */
        .example-divider {
            width: 40%; height: 1px;
            background: linear-gradient(to right, transparent, rgba(168,85,247,0.4), transparent);
            margin: 0.8rem auto;
        }
        .mask-linear { mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); }
    </style>
</head>
<body>
    <div class="hypno-container">
        <!-- SVG Classic Spiral -->
        <svg class="hypno-spiral" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <path fill="none" stroke="#2e1065" stroke-width="8" stroke-linecap="round"
                d="M100,100   
                   m0,0  
                   a4,4 0 0 1 4,4  
                   a8,8 0 0 1 -8,8  
                   a12,12 0 0 1 -12,-12  
                   a16,16 0 0 1 16,-16  
                   a20,20 0 0 1 20,20  
                   a24,24 0 0 1 -24,24  
                   a28,28 0 0 1 -28,-28  
                   a32,32 0 0 1 32,-32  
                   a36,36 0 0 1 36,36  
                   a40,40 0 0 1 -40,40  
                   a44,44 0 0 1 -44,-44  
                   a48,48 0 0 1 48,-48  
                   a52,52 0 0 1 52,52  
                   a56,56 0 0 1 -56,56  
                   a60,60 0 0 1 -60,-60  
                   a64,64 0 0 1 64,-64  
                   a68,68 0 0 1 68,68  
                   a72,72 0 0 1 -72,72  
                   a76,76 0 0 1 -76,-76  
                   a80,80 0 0 1 80,-80  
                   a84,84 0 0 1 84,84  
                   a88,88 0 0 1 -88,88  
                   a92,92 0 0 1 -92,-92  
                   a96,96 0 0 1 96,-96  
                   a100,100 0 0 1 100,100  
                "
            />
        </svg>
    </div>
    <div class="vignette"></div>

    <div id="app" class="h-screen w-full max-w-md mx-auto relative flex flex-col"></div>

    <script>
        // --- 1. State Management ---
        // Fixed theme order
        const THEME_ORDER = ['Freedom','Joy','Mischief','Playfulness','Safety & Trust','Relaxation','Pleasure','Desire','Sexy','Wildness'];
        const DEFAULT_EXCLUDED_CATEGORIES = ['Deepeners', 'Convincers', 'Triggers', 'Pleasure Metaphors'];
        const CANONICAL_ORIGIN = 'https://hypnocards-eng.pages.dev';
        const APP_BUILD = 'build-canonical-2026-04-21-02';
        const SW_BUILD = '2026-04-21-02';

        const AppState = {
            rawRows: [],          
            cards: [],            
            activeDeck: [],       
            categories: [],       
            themes: [],           
              
            currentIndex: 0,
            currentTheme: 'Relaxation',
            isRecording: false,
              
            recordings: JSON.parse(localStorage.getItem('en_recordings_v1')) || [],
              
            selectedCategories: []
        };
        let deferredInstallPrompt = null;

        function normalizeCategoryKey(category) {
            return String(category || '').trim().replace(/\s+/g, ' ').toLowerCase();
        }

        const DEFAULT_CATEGORY_INFO = {
            "Anticipation Builder": { "pattern": "In a moment... / Imagine how it will feel when...", "description": "Creates positive expectation in the guided person's mind for something about to happen. Uses sensory language and vivid imagery to paint a picture of the desired experience. The guided person begins to believe in and therefore help create the forthcoming sensation." },
            "Presuppositions": { "pattern": "You already know... / I wonder if you'll notice... / Whether X or Y...", "description": "Embeds assumptions into language so that the guided person accepts a premise without consciously evaluating it. The suggestion is wrapped inside a question or statement that takes the desired outcome for granted, reducing resistance by making the experience seem inevitable rather than imposed." },
            "Directing Awareness": { "pattern": "Notice... / You can become aware of... / As you pay attention to...", "description": "Gently guides the guided person's attention toward a specific sensation, feeling, or experience. Rather than commanding, it uses phrases like notice or become aware of to invite focused presence. This anchors the suggestion to something real and immediate, making it feel natural and self-discovered." },
            "Engaging the Imagination": { "pattern": "Imagine... / Pretend... / What if...? / As if...", "description": "Activates the guided person's imaginative capacity to create vivid mental imagery. By using metaphors and sensory descriptions, the guide helps the guided person experience something as real and tangible even if it begins as fantasy." },
            "Language Softeners": { "pattern": "Maybe... / Perhaps... / If you'd like... / You might...", "description": "Transforms direct commands into gentle invitations, reducing resistance from the conscious mind. It makes the suggestion feel like a free choice rather than a demand." },
            "Cause and Effect": { "pattern": "Because X... Y / As X... so Y / The more X... the more Y", "description": "Links two ideas or experiences with a logical cause and effect relationship. The mind accepts the connection and begins to produce the desired outcome as a consequence of something already happening." },
            "Complex Equivalence": { "pattern": "X means Y / Doing X is the same as Y / This is like...", "description": "Creates equivalence between two separate things, fusing them into one meaning. When the guided person does or experiences one thing, it automatically carries the meaning of another." },
            "Spectrum of Necessity": { "pattern": "You must... / You need to... / It's so right to...", "description": "Creates a sense of importance, urgency, or rightness around an experience or action. It frames the move toward the desired state as necessary and aligned." },
            "Negation": { "pattern": "You don't have to... / There's no need to... / Not yet...", "description": "Suggests an idea by appearing to deny it. Because the mind must process the concept to understand its negation, the image still enters the unconscious while resistance stays low." },
            "Amplification": { "pattern": "Imagine a dial / As X rises... / With each [breath / step / number]...", "description": "Intensifies and expands a sensation or experience that is already present. Uses scale and movement metaphors to guide deeper or stronger states." },
            "Addressing the Subconscious": { "pattern": "Your unconscious mind... / The deeper part of you... / I'm speaking now to...", "description": "Communicates directly with the guided person's unconscious mind, bypassing rational filtering and inviting involuntary responses." },
            "Empowerment and Integration Statements": { "pattern": "You are... / You carry within you... / This experience is yours...", "description": "Affirms inner strength and helps integrate what was felt during trance into the guided person's self concept so the experience continues beyond the session." },
            "Triggers": { "pattern": "Every time I / only I say [word]... you feel...", "description": "Creates anchors between a specific word, sound, or gesture and a state. Once established, the trigger can reactivate the feeling quickly." },
            "Deepeners": { "pattern": "With each step / number / breath... going deeper...", "description": "Moves the guided person from lighter trance into progressively deeper focus and relaxation, often through counting, breathing, and downward metaphors." },
            "Convincers": { "pattern": "Notice how your [body part] begins to [involuntary response]...", "description": "Uses involuntary physical responses as felt evidence that trance is working, increasing trust and deepening the experience." },
            "Pleasure Metaphors": { "pattern": "Like [sensory metaphor]... feel [desired sensation]...", "description": "Uses rich sensory metaphors to evoke embodied visceral experiences below rational analysis and awaken sensation directly." },
            "Action Accelerator": { "pattern": "Verb + now / automatically / effortlessly", "description": "Uses strong active verbs and immediacy words such as now, automatically, and effortlessly to trigger present moment response without conscious deliberation." }
        };

        function normalizeCategoryInfoMap(rawInfo) {
            const normalized = {};
            if (!rawInfo || typeof rawInfo !== 'object') return normalized;
            Object.entries(rawInfo).forEach(([rawCategory, rawValue]) => {
                const category = normalizeCategoryKey(rawCategory);
                if (!category) return;
                const value = rawValue || {};
                normalized[category] = {
                    pattern: String(value.pattern || '').trim(),
                    description: String(value.description || '').trim()
                };
            });
            return normalized;
        }

        function attachCategoryInfoToCards(cards, infoMap) {
            const normalizedInfo = normalizeCategoryInfoMap(infoMap || {});
            return (cards || []).map(card => {
                const info = normalizedInfo[normalizeCategoryKey(card.category)] || {};
                return {
                    ...card,
                    infoPattern: String(info.pattern || '').trim(),
                    infoDescription: String(info.description || '').trim()
                };
            });
        }

        function mergeCategoryInfoMaps(baseInfo, overrideInfo) {
            const base = normalizeCategoryInfoMap(baseInfo || {});
            const override = normalizeCategoryInfoMap(overrideInfo || {});
            const merged = { ...base };
            Object.keys(override).forEach(category => {
                const baseEntry = base[category] || {};
                const overrideEntry = override[category] || {};
                merged[category] = {
                    pattern: String(overrideEntry.pattern || baseEntry.pattern || '').trim(),
                    description: String(overrideEntry.description || baseEntry.description || '').trim()
                };
            });
            return merged;
        }

        async function ensureCategoryInfoLoaded() {
            const existingInfo = normalizeCategoryInfoMap(CATEGORY_INFO);
            const hasExistingInfo = Object.keys(existingInfo).length > 0;
            let savedInfo = {};
            try {
                savedInfo = normalizeCategoryInfoMap(JSON.parse(localStorage.getItem('en_category_info_v1') || '{}'));
            } catch (e) {}

            if (!hasExistingInfo && Object.keys(savedInfo).length > 0) {
                CATEGORY_INFO = mergeCategoryInfoMaps(DEFAULT_CATEGORY_INFO, savedInfo);
            }

            try {
                const response = await fetch('cards_data.json', { cache: 'no-store' });
                if (!response.ok) return;
                const data = await response.json();
                const fetchedInfo = normalizeCategoryInfoMap(data.category_info || {});
                if (Object.keys(fetchedInfo).length > 0) {
                    CATEGORY_INFO = mergeCategoryInfoMaps(DEFAULT_CATEGORY_INFO, mergeCategoryInfoMaps(savedInfo, fetchedInfo));
                    AppState.cards = attachCategoryInfoToCards(AppState.cards, CATEGORY_INFO);
                    AppState.activeDeck = attachCategoryInfoToCards(AppState.activeDeck, CATEGORY_INFO);
                    try { localStorage.setItem('en_category_info_v1', JSON.stringify(CATEGORY_INFO)); } catch (e) {}
                    try { localStorage.setItem('en_cards_data_v1', JSON.stringify(AppState.cards)); } catch (e) {}
                }
            } catch (e) {}
        }

        // --- 2. The Parsing Engine ---
        function processCSV(data) {
            const cleanData = data.map(row => {
                const newRow = {};
                Object.keys(row).forEach(k => newRow[k.trim()] = row[k]);
                return newRow;
            });

            // Separate CATEGORY_INFO rows from card rows (robust to spaces/case)
            const categoryInfoRows = cleanData.filter(r => String(r.ID || '').trim().toUpperCase() === 'CATEGORY_INFO');
            const cardRows = cleanData.filter(r => String(r.ID || '').trim().toUpperCase() !== 'CATEGORY_INFO');

            // Build CATEGORY_INFO lookup from CSV data
            // Columns: ID=CATEGORY_INFO, Category=name, Pattern=PatternLabel, Content=Description
            CATEGORY_INFO = normalizeCategoryInfoMap(DEFAULT_CATEGORY_INFO);
            categoryInfoRows.forEach(r => {
                const cat = normalizeCategoryKey(r.Category);
                if (cat) {
                    CATEGORY_INFO[cat] = {
                        pattern: (r.Pattern || '').trim(),
                        description: (r.Content || '').trim()
                    };
                }
            });

            AppState.rawRows = cardRows;

            // Extract Unique Themes
            const themesSet = new Set();
            const skipThemes = new Set(['Dynamic', 'Static', 'General', '']);
            cleanData.forEach(row => {
                if (row.Theme && row.Theme.trim().length > 1 && !skipThemes.has(row.Theme.trim()))
                    themesSet.add(row.Theme.trim());
            });
            AppState.themes = THEME_ORDER.filter(t => themesSet.has(t));
            // Add any themes from CSV not in our order list
            themesSet.forEach(t => { if (!AppState.themes.includes(t)) AppState.themes.push(t); });
            if (AppState.themes.length === 0) AppState.themes = [...THEME_ORDER];

            // Extract Categories
            const catsMap = new Map();
            cleanData.forEach(row => {
                const catName = row.Category ? row.Category.trim() : 'General';
                if (!catsMap.has(catName)) {
                    catsMap.set(catName, row.Color || '#A0A0A0');
                }
            });
            AppState.categories = Array.from(catsMap).map(([name, color]) => ({name, color}));

            // Aggregation Logic — group by Pattern, variations by Theme
            const cardsMap = new Map();
            
            cleanData.forEach(row => {
                const pattern = row.Pattern ? row.Pattern.trim() : null;
                if (!pattern) return;

                const mapKey = pattern;

                if (!cardsMap.has(mapKey)) {
                    cardsMap.set(mapKey, {
                        id: row.ID,   
                        pattern: pattern,
                        category: row.Category || 'General',
                        color: row.Color || catsMap.get(row.Category) || '#fff',
                        variations: {},   
                        staticContent: null
                    });
                }

                const card = cardsMap.get(mapKey);
                const theme = row.Theme ? row.Theme.trim() : 'General';
                const content = row.Content;

                if (theme === 'General' || theme === 'Dynamic' || theme === 'Static' || !theme) {
                    card.staticContent = card.staticContent ? card.staticContent + "<br><br>" + content : content;
                } else {
                    if (card.variations[theme]) {
                        card.variations[theme] += "<br><br>" + content;
                    } else {
                        card.variations[theme] = content;
                    }
                }
            });

            AppState.cards = attachCategoryInfoToCards(Array.from(cardsMap.values()), CATEGORY_INFO);
              
            try {
                localStorage.setItem('en_cards_data_v1', JSON.stringify(AppState.cards));
                localStorage.setItem('en_themes_data_v1', JSON.stringify(AppState.themes));
                localStorage.setItem('en_cats_data_v1', JSON.stringify(AppState.categories));
                localStorage.setItem('en_category_info_v1', JSON.stringify(CATEGORY_INFO));
            } catch (e) { console.warn("Storage quota exceeded"); }

            alert(`Loaded successfully!\n${AppState.cards.length} unique patterns detected.`);
            renderModeSelect();
        }

        function loadFromStorage() {
            const savedCards = localStorage.getItem('en_cards_data_v1');
            if (savedCards) {
                try {
                    AppState.cards = JSON.parse(savedCards);
                    const savedThemes = JSON.parse(localStorage.getItem('en_themes_data_v1') || '[]');
                    // Always apply fixed order
                    AppState.themes = THEME_ORDER.filter(t => savedThemes.includes(t));
                    savedThemes.forEach(t => { if (!AppState.themes.includes(t)) AppState.themes.push(t); });
                    if (AppState.themes.length === 0) AppState.themes = [...THEME_ORDER];
                    AppState.categories = JSON.parse(localStorage.getItem('en_cats_data_v1') || '[]');
                    CATEGORY_INFO = mergeCategoryInfoMaps(
                        DEFAULT_CATEGORY_INFO,
                        JSON.parse(localStorage.getItem('en_category_info_v1') || '{}')
                    );
                    AppState.cards = attachCategoryInfoToCards(AppState.cards, CATEGORY_INFO);
                    return true;
                } catch(e) { return false; }
            }
            return false;
        }

        // --- 3. Core Logic Helpers ---

        function renderMarkdown(text) {
            if (!text) return '';
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        }

        function isIos() {
            return /iphone|ipad|ipod/i.test(navigator.userAgent);
        }

        function isAndroid() {
            return /android/i.test(navigator.userAgent);
        }

        function isCanonicalOrigin() {

            if (deferredInstallPrompt) {

                return;

        function startSession(mode) {
            if (mode === 'all') {
                AppState.activeDeck = AppState.cards
                    .filter(c => !DEFAULT_EXCLUDED_CATEGORIES.includes(c.category))
                    .sort(() => Math.random() - 0.5);
                  
                if (AppState.activeDeck.length === 0) {
                    AppState.activeDeck = [...AppState.cards].sort(() => Math.random() - 0.5);
                }

            } else if (mode === 'custom') {
                if (AppState.selectedCategories.length === 0) return alert("Please select at least one category.");
                AppState.activeDeck = AppState.cards
                    .filter(c => AppState.selectedCategories.includes(c.category))
                    .sort(() => Math.random() - 0.5);
            }
              
            if (AppState.activeDeck.length === 0) return alert("No cards found for this selection.");
              
            AppState.currentIndex = 0;
            AppState.currentTheme = 'Relaxation';
              
            document.getElementById('app').innerHTML = '';
            renderPlayer();
            ensureCategoryInfoLoaded().then(() => updatePlayerContent());
        }

        function getCurrentCard() {
            return AppState.activeDeck[AppState.currentIndex];
        }

        function getCardContent(card, theme) {
            let content = null;
            if (card.variations && card.variations[theme]) content = card.variations[theme];
            else if (card.variations && card.variations['Relaxation']) content = card.variations['Relaxation'];
            else if (card.staticContent) return card.staticContent;
            else {
                const keys = Object.keys(card.variations || {});
                if (keys.length > 0) content = card.variations[keys[0]];
            }
            if (!content) return "No content found for this theme.";
            // If array of 2 examples, join with divider
            if (Array.isArray(content)) {
                return content.map((ex, i) => ex).join('\n\n<div class="example-divider"></div>\n\n');
            }
            return content;
        }

                            <button id="recordBtn" onclick="toggleRecording()" data-tip="Record your practice" class="p-5 rounded-full bg-purple-600 text-white shadow-[0_0_20px_rgba(147,51,234,0.3)] transition-all transform hover:scale-105 active:scale-95" style="min-width:60px;min-height:60px">
                                <i data-lucide="mic"></i>
                            </button>
                              
                            <button onclick="nextCard()" data-tip="Next card" class="p-4 rounded-full bg-white/5 hover:bg-white/10 text-gray-300 active:scale-95 transition" style="min-width:52px;min-height:52px"><i data-lucide="chevron-right"></i></button>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            }

            updatePlayerContent();
            setupKeyboard();
            setupSwipe();
        }

        function setupKeyboard() {
            document.onkeydown = function(e) {
                if (e.key === 'ArrowRight') nextCard();
                if (e.key === 'ArrowLeft')  prevCard();
                if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    const scrollArea = document.querySelector('.card-scroll-area');
                    if (scrollArea) scrollArea.scrollBy({ top: e.key === 'ArrowDown' ? 80 : -80, behavior: 'smooth' });
                }
            };
        }

        function setupSwipe() {
            const area = document.getElementById('player-view');
            if (!area) return;
            let startX = 0, startY = 0;
            area.addEventListener('touchstart', e => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }, { passive: true });
            area.addEventListener('touchend', e => {
                const dx = e.changedTouches[0].clientX - startX;
                const dy = e.changedTouches[0].clientY - startY;
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
                    dx < 0 ? nextCard() : prevCard();
                }
            }, { passive: true });
        }

        // --- Theme strip (arrow navigation, infinite wrap) ---
        function buildThemeStrip(card) {
            const strip = document.getElementById('themeStrip');
            if (!strip) return;
            const themes = AppState.themes;
            const n = themes.length;
            const activeIdx = themes.indexOf(AppState.currentTheme);

            strip.innerHTML = '';

            // Show prev, active, next — always 3 items, active in center
            [-1, 0, 1].forEach(offset => {
                const idx = ((activeIdx + offset) % n + n) % n;
                const t = themes[idx];
                const isActive = offset === 0;

                const div = document.createElement('div');
                div.className = 'carousel-item' + (isActive ? ' active' : '');
                div.dataset.theme = t;
                div.textContent = t;
                div.onclick = () => setTheme(t);

                if (isActive && card) {
                    div.style.borderColor = card.color;
                    div.style.color = card.color;
                    div.style.backgroundColor = 'rgba(255,255,255,0.08)';
                    div.style.boxShadow = `0 0 12px ${card.color}40`;
                    div.style.opacity = '1';
                    div.style.transform = 'scale(1.08)';
                    div.style.fontWeight = 'bold';
                }

                strip.appendChild(div);
            });
        }

        function shiftTheme(dir) {
            const themes = AppState.themes;
            const n = themes.length;
            const activeIdx = themes.indexOf(AppState.currentTheme);
            const newIdx = ((activeIdx + dir) % n + n) % n;
            setTheme(themes[newIdx]);
        }

        function updatePlayerContent(options = {}) {
            const preserveFlip = !!options.preserveFlip;
            // Reset flip when changing cards
            if (!preserveFlip && cardFlipped) {
                cardFlipped = false;
                const inner = document.getElementById('cardInner');
                if (inner) inner.classList.remove('flipped');
            }

            const card = getCurrentCard();
            const rawContent = getCardContent(card, AppState.currentTheme);
            const content = renderMarkdown(rawContent);

            document.getElementById('cardPattern').innerText = card.pattern;
            document.getElementById('cardCategory').innerText = card.category;
            document.getElementById('cardCategory').style.color = card.color;
            document.getElementById('cardFace').style.borderColor = card.color;
              
            const contentDiv = document.getElementById('cardContentText');
            contentDiv.innerHTML = content;

            // Update back face
            const info = {
                pattern: String(card.infoPattern || '').trim(),
                description: String(card.infoDescription || '').trim()
            };
            const backCategoryName = document.getElementById('backCategoryName');
            const backPattern = document.getElementById('backPattern');
            const backDescription = document.getElementById('backDescription');
            backCategoryName.innerText = card.category || 'General';
            backPattern.innerText = (info && info.pattern) ? info.pattern : 'No pattern structure is available for this category yet.';
            backDescription.innerText = (info && info.description) ? info.description : 'Category notes are not available yet. You can still use the front side examples for guided practice.';

            document.getElementById('counter').innerText = `${AppState.currentIndex + 1} / ${AppState.activeDeck.length}`;
            buildThemeStrip(card);
        }

        // --- 5. Interaction Handlers ---

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const csv = e.target.result;
                Papa.parse(csv, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        processCSV(results.data);
                    }
                });
            };
            reader.readAsText(file);
        }

        function setTheme(theme) {
            AppState.currentTheme = theme;
              
            const contentDiv = document.getElementById('cardContentText');
            contentDiv.style.opacity = '0';
            contentDiv.style.transform = 'translateY(5px)';
              
            setTimeout(() => {
                updatePlayerContent();
                contentDiv.style.transition = 'all 0.3s ease';
                contentDiv.style.opacity = '1';
                contentDiv.style.transform = 'translateY(0)';
            }, 150);
        }

        function nextCard() {
            const cardInner = document.querySelector('.card-face');
            cardInner.classList.add('slide-out-left');
              
            setTimeout(() => {
                AppState.currentIndex = (AppState.currentIndex + 1) % AppState.activeDeck.length;
                updatePlayerContent();
                  
                cardInner.classList.remove('slide-out-left');
                cardInner.classList.add('slide-in-right');
                setTimeout(() => cardInner.classList.remove('slide-in-right'), 300);
            }, 250);
        }

        function prevCard() {
            const cardInner = document.querySelector('.card-face');
            cardInner.classList.add('slide-out-right');
              
            setTimeout(() => {
                AppState.currentIndex = (AppState.currentIndex - 1 + AppState.activeDeck.length) % AppState.activeDeck.length;
                updatePlayerContent();

                cardInner.classList.remove('slide-out-right');
                cardInner.classList.add('slide-in-left');
                setTimeout(() => cardInner.classList.remove('slide-in-left'), 300);
            }, 250);
        }

        function toggleCategory(catName) {
            if (AppState.selectedCategories.includes(catName)) {
                AppState.selectedCategories = AppState.selectedCategories.filter(c => c !== catName);
            } else {
                AppState.selectedCategories.push(catName);
            }
        }

        function selectAllCategories() {
            AppState.selectedCategories = AppState.categories.map(c => c.name);
            document.querySelectorAll('input[type="checkbox"][value]').forEach(cb => {
                cb.checked = true;
            });
        }

        function clearAllCategories() {
            AppState.selectedCategories = [];
            document.querySelectorAll('input[type="checkbox"][value]').forEach(cb => {
                cb.checked = false;
            });
        }

        let mediaRecorder = null;
        let audioChunks = [];
        let recordingStream = null;
        let recordingMimeType = '';
        let recordingExtension = 'webm';
        let monitorAudioContext = null;
        let monitorAnalyser = null;
        let monitorDataArray = null;
        let monitorAnimationFrame = null;

        function getRecordingFormat() {
            const candidates = [
                { mimeType: 'audio/webm;codecs=opus', ext: 'webm' },
                { mimeType: 'audio/mp4', ext: 'm4a' },
                { mimeType: 'audio/webm', ext: 'webm' },
                { mimeType: 'audio/ogg;codecs=opus', ext: 'ogg' }
            ];
            for (const format of candidates) {
                if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(format.mimeType)) {
                    return format;
                }
            }
            return { mimeType: '', ext: 'webm' };
        }

        function startRecordingMonitor(stream, btn) {
            try {
                monitorAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = monitorAudioContext.createMediaStreamSource(stream);
                monitorAnalyser = monitorAudioContext.createAnalyser();
                monitorAnalyser.fftSize = 256;
                monitorDataArray = new Uint8Array(monitorAnalyser.frequencyBinCount);
                source.connect(monitorAnalyser);

                const tick = () => {
                    if (!monitorAnalyser || !btn) return;
                    monitorAnalyser.getByteTimeDomainData(monitorDataArray);
                    let sum = 0;
                    for (let i = 0; i < monitorDataArray.length; i++) {
                        const v = (monitorDataArray[i] - 128) / 128;
                        sum += v * v;
                    }
                    const rms = Math.sqrt(sum / monitorDataArray.length);
                    const level = Math.min(1, rms * 4.5);
                    btn.style.setProperty('--rec-level', String(level.toFixed(3)));
                    monitorAnimationFrame = requestAnimationFrame(tick);
                };
                tick();
            } catch (e) {
                // Visualization is optional; ignore monitor failures.
            }
        }

        function stopRecordingMonitor(btn) {
            if (monitorAnimationFrame) cancelAnimationFrame(monitorAnimationFrame);
            monitorAnimationFrame = null;
            monitorDataArray = null;
            monitorAnalyser = null;
            if (monitorAudioContext) {
                monitorAudioContext.close().catch(() => {});
                monitorAudioContext = null;
            }
            if (btn) btn.style.removeProperty('--rec-level');
        }

        function toggleRecording() {
            AppState.isRecording = !AppState.isRecording;
            const btn = document.getElementById('recordBtn');

            if (AppState.isRecording) {
                // Start recording
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        recordingStream = stream;
                        audioChunks = [];
                        const format = getRecordingFormat();
                        recordingMimeType = format.mimeType;
                        recordingExtension = format.ext;
                        mediaRecorder = recordingMimeType ? new MediaRecorder(stream, { mimeType: recordingMimeType }) : new MediaRecorder(stream);
                        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                        mediaRecorder.start();

                        btn.classList.remove('bg-purple-600', 'text-white', 'shadow-[0_0_20px_rgba(147,51,234,0.3)]');
                        btn.classList.add('recording-pulse', 'recording-live', 'bg-red-500/10', 'border', 'border-red-500');
                        btn.innerHTML = '<i data-lucide="square"></i>';
                        lucide.createIcons();
                        startRecordingMonitor(stream, btn);
                    })
                    .catch(() => {
                        AppState.isRecording = false;
                        alert('Microphone access denied. Please allow microphone access and try again.');
                    });

            } else {
                // Stop and download
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.onstop = () => {
                        const blobType = recordingMimeType || mediaRecorder.mimeType || 'audio/webm';
                        const blob = new Blob(audioChunks, { type: blobType });
                        if (blob.size === 0) {
                            alert('Recording is empty. Please check microphone permissions and try again.');
                            return;
                        }
                        const now = new Date();
                        const pad = n => String(n).padStart(2, '0');
                        const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
                        const timeStr = `${pad(now.getHours())}-${pad(now.getMinutes())}`;
                        const card = getCurrentCard();
                        const suggestedName = `${card.pattern} - ${AppState.currentTheme} - ${dateStr} ${timeStr}`
                            .replace(/[\\/:*?"<>|]/g, '')
                            .trim();
                        const chosenName = prompt('Name this recording:', suggestedName);
                        const safeName = (chosenName && chosenName.trim() ? chosenName.trim() : suggestedName)
                            .replace(/[\\/:*?"<>|]/g, '');
                        const filename = `${safeName}.${recordingExtension}`;

                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = filename;
                        a.click();
                        URL.revokeObjectURL(url);

                        // Save metadata to archive
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            AppState.recordings.unshift({
                                id: Date.now(),
                                name: safeName,
                                date: `${dateStr} ${pad(now.getHours())}:${pad(now.getMinutes())}`,
                                pattern: card.pattern,
                                theme: AppState.currentTheme,
                                mimeType: blobType,
                                audioDataUrl: reader.result
                            });
                            try {
                                localStorage.setItem('en_recordings_v1', JSON.stringify(AppState.recordings));
                            } catch (e) {
                                // If storage is full, keep metadata without embedded audio.
                                const latest = AppState.recordings[0];
                                if (latest) latest.audioDataUrl = null;
                                localStorage.setItem('en_recordings_v1', JSON.stringify(AppState.recordings));
                                alert('Saved recording metadata, but device storage is full for in-app playback. File was still downloaded.');
                            }
                        };
                        reader.readAsDataURL(blob);

                        // Stop all tracks
                        if (recordingStream) recordingStream.getTracks().forEach(t => t.stop());
                        recordingStream = null;
                    };
                    mediaRecorder.stop();
                }

                btn.classList.add('bg-purple-600', 'text-white', 'shadow-[0_0_20px_rgba(147,51,234,0.3)]');
                btn.classList.remove('recording-pulse', 'recording-live', 'bg-red-500/10', 'border', 'border-red-500');
                btn.innerHTML = '<i data-lucide="mic"></i>';
                lucide.createIcons();
                stopRecordingMonitor(btn);
            }
        }

        function clearData() {
            if (confirm('This will delete all saved data including recordings.\nContinue?')) {
                localStorage.clear();
                location.reload();
            }
        }

        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredInstallPrompt = e;
            updateInstallButtons();
        });

        window.addEventListener('appinstalled', () => {
            deferredInstallPrompt = null;
            updateInstallButtons();
        });

        if ('serviceWorker' in navigator) {
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
            });

            window.addEventListener('load', () => {
                navigator.serviceWorker.register(`sw.js?v=${SW_BUILD}`).then(reg => {
                    const activateUpdate = () => {
                        if (reg.waiting) {
                            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                        }
                    };
                    if (reg.waiting) activateUpdate();
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        if (!newWorker) return;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                activateUpdate();
                            }
                        });
                    });
                }).catch(() => {});
            });
        }

        ensureCategoryInfoLoaded().finally(() => {
            renderWelcome();
        });

    </script>
